<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>WAWA 코칭센터</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Malgun Gothic",sans-serif;font-size:13px;background:#f5f6fa;color:#222;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}
.layout{display:flex;height:100vh;}
.sidebar{width:200px;background:#fff;border-right:1px solid #eee;display:flex;flex-direction:column;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.header{background:#fff;border-bottom:1px solid #eee;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.content{flex:1;overflow-y:auto;padding:24px;}
.card{background:#fff;border-radius:12px;border:1px solid #eee;padding:20px 24px;margin-bottom:20px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.scard{border-radius:12px;padding:16px 20px;}
.tab-btn{padding:7px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;font-size:12px;}
.tab-btn.on{background:#1a2a4a;color:#fff;font-weight:700;}
.subj-btn{padding:3px 8px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#444;font-size:11px;}
.subj-btn.on{background:#1a2a4a;color:#fff;}
.stu-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;border-left:3px solid transparent;}
.stu-item:hover{background:#f9f9f9;}
.stu-item.on{background:#f0f4ff;border-left-color:#1a2a4a;}
.badge{display:inline-block;border-radius:6px;padding:2px 8px;background:#e8f0fe;color:#4f8ef7;font-size:11px;}
.gbadge{display:inline-block;border-radius:20px;padding:2px 10px;color:#fff;font-weight:700;font-size:12px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:14px;padding:28px;width:360px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.fl{font-size:12px;color:#666;display:block;margin-bottom:4px;}
.fi{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:12px;}
.bp{padding:8px 18px;border-radius:8px;border:none;background:#1a2a4a;color:#fff;font-weight:600;}
.bc{padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;}
.bs{padding:3px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:11px;}
.bd{padding:3px 10px;border-radius:6px;border:1px solid #fdd;background:#fff5f5;font-size:11px;color:#f74f4f;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:9px 10px;text-align:left;color:#888;font-weight:600;border-bottom:1px solid #eee;background:#f8f9fb;}
td{padding:10px;border-bottom:1px solid #f5f5f5;}
.pb{background:#f0f0f0;border-radius:4px;height:8px;}
.pf{background:#1a2a4a;border-radius:4px;height:8px;}
.action-btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;color:#fff;}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div style="padding:14px 16px;border-bottom:1px solid #eee;">
      <div style="background:#FF6D00;color:#fff;border-radius:8px;padding:10px;font-weight:700;font-size:14px;text-align:center;margin-bottom:12px;">WAWA<br><span style="font-size:9px;font-weight:400;">코칭센터</span></div>
      <div style="font-size:11px;color:#888;margin-bottom:4px;">선생님</div>
      <select class="fi" style="margin-bottom:0;" onchange="setTeacher(this.value)">
        <option>전체 선생님</option>
        <option>장한성 선생님</option>
        <option>이하림 선생님</option>
        <option>양원철 선생님</option>
        <option>박수권 선생님</option>
      </select>
    </div>
    <div style="padding:12px 16px 8px;">
      <div style="font-size:11px;color:#888;margin-bottom:6px;">학년</div>
      <div id="gradeBtns" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;"></div>
      <div style="font-size:11px;color:#888;margin-bottom:6px;">과목</div>
      <div id="sbjBtns" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
    </div>
    <div id="stuCount" style="padding:8px 16px 4px;font-size:11px;color:#888;">학생 (0명)</div>
    <div id="stuList" style="flex:1;overflow-y:auto;"></div>
    <div style="padding:10px 16px;">
      <button onclick="openModal('addStu')" style="width:100%;padding:8px;border-radius:8px;border:1px dashed #bbb;background:transparent;font-size:12px;color:#666;">+ 학생 추가</button>
    </div>
    <div style="padding:4px 16px 10px;text-align:center;">
      <span id="stDot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#4caf50;margin-right:4px;"></span>
      <span id="stTxt" style="font-size:10px;color:#4caf50;">연결 중...</span>
    </div>
  </div>
  <div class="main">
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="hName" style="font-size:18px;font-weight:700;">-</span>
        <span id="hInfo" style="font-size:12px;color:#888;background:#f5f6fa;border-radius:6px;padding:3px 8px;"></span>
        <span id="hTeacher" style="font-size:12px;color:#888;"></span>
      </div>
      <div id="tabBtns" style="display:flex;gap:6px;"></div>
    </div>
    <div id="mainContent" class="content"></div>
  </div>
</div>
<div id="modalBg" class="modal-bg" style="display:none;">
  <div id="modalBox" class="modal"></div>
</div>
<script>
var NAVY="#1a2a4a", GOLD="#d4af37";
var SUBJECTS=["전체","국어","영어","수학","과학"];
var TEACHERS=["장한성 선생님","이하림 선생님","양원철 선생님","박수권 선생님"];
var GRADES=["초1","초2","초3","초4","초5","초6","중1","중2","중3","고1","고2","고3"];
var GC={A:"#4f8ef7",B:"#7c6fcd",C:"#f7a94f",D:"#f74f4f"};
var PID="wawa-coaching", AKEY="AIzaSyARSCvWy-4rPONDUbmecpbI1_rePtI65IU";
var BASE="https://firestore.googleapis.com/v1/projects/"+PID+"/databases/(default)/documents";
var students=[], exams={}, unitExams={}, selectedId=null, subjectFilter="전체", activeTab="상세";
var mgmtLevel="전체", statLevel="초등", statSubLevel="", teacherFilter="전체 선생님", gradeFilter="전체";
var myChart=null, unitChart=null, statChart=null, savedMsg="", savedUnitMsg="";

function gc(g){return GC[g]||"#aaa";}
function scoreGrade(s){return s>=85?"A":s>=70?"B":s>=55?"C":"D";}
function avg(a){return a.length?a.reduce(function(s,x){return s+x;},0)/a.length:0;}
function gl(g){return g.startsWith("초")?"초등":g.startsWith("중")?"중학":"고등";}
function toScore(e){return Math.round(e.correct/e.total*100);}
function toClsScore(e){return e.classAvg>0?Math.round(e.classAvg/e.total*100):0;}

function setStatus(msg,color){
  document.getElementById("stTxt").textContent=msg;
  document.getElementById("stTxt").style.color=color;
  document.getElementById("stDot").style.background=color;
}

function fsGet(col){
  return fetch(BASE+"/"+col+"?key="+AKEY+"&pageSize=300")
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.documents)return[];
      return d.documents.map(function(doc){
        var id=doc.name.split("/").pop();
        var f=doc.fields||{}, o={id:id};
        Object.keys(f).forEach(function(k){
          var v=f[k];
          if(v.integerValue!==undefined)o[k]=Number(v.integerValue);
          else if(v.doubleValue!==undefined)o[k]=Number(v.doubleValue);
          else if(v.stringValue!==undefined)o[k]=v.stringValue;
        });
        return o;
      });
    });
}

function fsPatch(col,id,data){
  var fields={};
  Object.keys(data).forEach(function(k){
    var v=data[k];
    if(typeof v==="number")fields[k]={integerValue:v};
    else fields[k]={stringValue:String(v||"")};
  });
  return fetch(BASE+"/"+col+"/"+id+"?key="+AKEY,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields:fields})});
}

function fsDel(col,id){return fetch(BASE+"/"+col+"/"+id+"?key="+AKEY,{method:"DELETE"});}

function loadData(){
  return Promise.all([fsGet("students"),fsGet("exams"),fsGet("unitExams")])
    .then(function(results){
      students=results[0];
      if(!selectedId&&students.length)selectedId=students[0].id;
      exams={};
      results[1].forEach(function(ex){
        if(!exams[ex.studentId])exams[ex.studentId]=[];
        exams[ex.studentId].push(ex);
      });
      unitExams={};
      results[2].forEach(function(ex){
        if(!unitExams[ex.studentId])unitExams[ex.studentId]=[];
        unitExams[ex.studentId].push(ex);
      });
      setStatus("실시간 저장 중","#4caf50");
      render();
    }).catch(function(){setStatus("연결 오류","#f74f4f");});
}

function render(){renderSidebar();renderHeader();renderMain();}

function renderSidebar(){
  var filtered=students.filter(function(s){
    var tOk=teacherFilter==="전체 선생님"||s.teacher===teacherFilter;
    var sOk=subjectFilter==="전체"||s.subject===subjectFilter;
    var gOk=gradeFilter==="전체"||s.grade===gradeFilter;
    return tOk&&sOk&&gOk;
  });

  // 학년 버튼 - 현재 선생님/과목 필터에 해당하는 학년만 표시
  var availGrades=["전체"];
  students.forEach(function(s){
    var tOk=teacherFilter==="전체 선생님"||s.teacher===teacherFilter;
    var sOk=subjectFilter==="전체"||s.subject===subjectFilter;
    if(tOk&&sOk&&availGrades.indexOf(s.grade)===-1)availGrades.push(s.grade);
  });
  availGrades.sort(function(a,b){
    if(a==="전체")return -1;if(b==="전체")return 1;
    var order=["초1","초2","초3","초4","초5","초6","중1","중2","중3","고1","고2","고3"];
    return order.indexOf(a)-order.indexOf(b);
  });
  document.getElementById("gradeBtns").innerHTML=availGrades.map(function(g){
    return '<button class="subj-btn'+(gradeFilter===g?" on":"")+'" onclick="setGrade(\''+g+'\')">'+g+'</button>';
  }).join("");

  document.getElementById("sbjBtns").innerHTML=SUBJECTS.map(function(s){
    return '<button class="subj-btn'+(subjectFilter===s?" on":"")+'" onclick="setSubject(\''+s+'\')">'+s+'</button>';
  }).join("");
  document.getElementById("stuCount").textContent="학생 ("+filtered.length+"명)";
  document.getElementById("stuList").innerHTML=filtered.map(function(s){
    var ex=exams[s.id]||[];
    var lat=ex.length?[].concat(ex).sort(function(a,b){return b.date.localeCompare(a.date);})[0]:null;
    var score=lat?toScore(lat)+"점":"-";
    return '<div class="stu-item'+(selectedId===s.id?" on":"")+'" onclick="selectStudent(\''+s.id+'\')">'+
      '<div><div style="font-weight:'+(selectedId===s.id?700:400)+';">'+s.name+'</div>'+
      '<div style="font-size:10px;color:#888;">'+s.grade+' · '+s.subject+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:4px;">'+
      '<span style="font-size:11px;color:#4f8ef7;font-weight:600;">'+score+'</span>'+
      '<button onclick="event.stopPropagation();delStudent(\''+s.id+'\')" style="border:none;background:none;color:#ccc;font-size:14px;">×</button>'+
      '</div></div>';
  }).join("");
}

function renderHeader(){
  var s=students.find(function(x){return x.id===selectedId;});
  document.getElementById("hName").textContent=s?s.name:"-";
  document.getElementById("hInfo").textContent=s?s.grade+" · "+s.subject:"";
  document.getElementById("hTeacher").textContent=s?s.teacher:"";
  document.getElementById("tabBtns").innerHTML=["상세","단원평가","보고서","관리","통계"].map(function(t){
    return '<button class="tab-btn'+(activeTab===t?" on":"")+'" onclick="setTab(\''+t+'\')">'+t+'</button>';
  }).join("");
}

function renderMain(){
  if(myChart){myChart.destroy();myChart=null;}
  if(unitChart){unitChart.destroy();unitChart=null;}
  if(statChart){statChart.destroy();statChart=null;}
  var mc=document.getElementById("mainContent");
  var s=students.find(function(x){return x.id===selectedId;});
  var exList=(exams[selectedId]||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var uList=(unitExams[selectedId]||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var latest=exList[exList.length-1];
  var myAvg=exList.length?Math.round(avg(exList.map(toScore)))+"점":"-";
  var clsAvg=exList.length?Math.round(avg(exList.map(toClsScore)))+"점":"-";
  var latestScore=latest?toScore(latest)+"점":"-";
  if(activeTab==="상세")mc.innerHTML=renderDetail(exList,latest,myAvg,clsAvg,latestScore);
  else if(activeTab==="단원평가")mc.innerHTML=renderUnit(s,uList);
  else if(activeTab==="보고서")mc.innerHTML=renderReport(s,exList,latest,myAvg,clsAvg,latestScore);
  else if(activeTab==="관리")mc.innerHTML=renderMgmt();
  else if(activeTab==="통계")mc.innerHTML=renderStat();
  if(activeTab==="상세"&&exList.length)setTimeout(function(){drawChart(exList);},50);
  if(activeTab==="단원평가"&&uList.length)setTimeout(function(){drawUnitChart(uList);},50);
  if(activeTab==="통계")setTimeout(drawStatChart,50);
}

function renderUnit(s,uList){
  if(!s)return'<div style="text-align:center;color:#bbb;padding:60px;">학생을 선택해주세요</div>';
  var uAvg=uList.length?Math.round(avg(uList.map(toScore)))+"점":"-";
  var uClsAvg=uList.length?Math.round(avg(uList.map(toClsScore)))+"점":"-";
  var uLatest=uList[uList.length-1];
  var html='<div class="grid4">';
  [{l:"최근 단원평가",v:uLatest?toScore(uLatest)+"점":"-",bg:"#fff",bd:"#ddd"},
   {l:"평균 점수",v:uAvg,bg:"#fffbec",bd:"#f5d97a"},
   {l:"학급 평균",v:uClsAvg,bg:"#f0f4ff",bd:"#a0b4f7"},
   {l:"단원 수",v:uList.length+"개",bg:"#fff",bd:"#ddd"}
  ].forEach(function(c){
    html+='<div class="scard" style="background:'+c.bg+';border:1px solid '+c.bd+';">'+
      '<div style="font-size:11px;color:#888;margin-bottom:8px;">'+c.l+'</div>'+
      '<div style="font-size:22px;font-weight:700;">'+c.v+'</div></div>';
  });
  html+='</div>';
  html+='<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:16px;">단원별 점수 추이</div>';
  html+=uList.length?'<canvas id="unitChart" height="90"></canvas>':'<div style="text-align:center;color:#bbb;padding:40px;">단원평가 기록이 없습니다</div>';
  html+='</div>';
  html+='<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'+
    '<span style="font-weight:700;font-size:14px;">단원평가 기록</span>'+
    '<button class="bp" onclick="openModal(\'addUnit\')" style="padding:7px 16px;font-size:12px;">+ 단원평가 추가</button></div>';
  html+='<table><thead><tr><th>날짜</th><th>과목</th><th>단원명</th><th>점수</th><th>학급평균</th><th>평균대비</th><th>등급</th><th></th></tr></thead><tbody>';
  [].concat(uList).reverse().forEach(function(e){
    var sc=toScore(e), cs=toClsScore(e), d=sc-cs;
    html+='<tr><td>'+e.date+'</td><td><span class="badge">'+e.subject+'</span></td>'+
      '<td style="font-weight:500;">'+e.name+'</td>'+
      '<td style="color:'+NAVY+';font-weight:600;">'+sc+'점</td>'+
      '<td style="color:'+GOLD+';font-weight:600;">'+(cs>0?cs+"점":"-")+'</td>'+
      '<td style="color:'+(d>=0?"#4f8ef7":"#f74f4f")+';font-weight:600;">'+(cs>0?(d>0?"+"+d+"점":d+"점"):"-")+'</td>'+
      '<td><span class="gbadge" style="background:'+gc(e.grade)+'">'+e.grade+'</span></td>'+
      '<td style="white-space:nowrap;">'+
      '<button class="bs" onclick="openModal(\'editUnit\',\''+e.id+'\')" style="margin-right:4px;">수정</button>'+
      '<button class="bd" onclick="delUnit(\''+e.id+'\')">삭제</button></td></tr>';
  });
  if(!uList.length)html+='<tr><td colspan="8" style="text-align:center;color:#bbb;padding:30px;">단원평가 기록이 없습니다</td></tr>';
  html+='</tbody></table></div>';

  // 선생님 피드백
  html+='<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'+
    '<span style="font-weight:700;font-size:14px;">선생님 피드백</span>'+
    '<button class="bp" id="genUnitBtn" onclick="generateUnitMsg()" style="padding:7px 16px;font-size:12px;">✦ 자동 생성</button></div>'+
    '<textarea id="unitMsgArea" rows="5" placeholder="단원평가 피드백을 작성하세요." onchange="savedUnitMsg=this.value" oninput="savedUnitMsg=this.value" style="width:100%;padding:12px;border:1px solid #eee;border-radius:10px;font-size:13px;resize:vertical;line-height:1.7;">'+savedUnitMsg+'</textarea>'+
    '</div>'+
    '<div style="text-align:center;color:#888;font-size:12px;margin:8px 0 16px;">와와코칭학원 · '+s.teacher+'</div>'+
    '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">'+
    '<button class="action-btn" onclick="convertUnitMsg()" style="background:#1a2a4a;">✉ 문자변환</button>'+
    '<button class="action-btn" onclick="saveUnitTxt()" style="background:#4f8ef7;">📄 TXT</button>'+
    '<button class="action-btn" onclick="doPrintUnit()" style="background:#f7a94f;">🖨 프린트 / PDF</button>'+
    '</div>';
  return html;
}

function drawUnitChart(uList){
  var ctx=document.getElementById("unitChart");if(!ctx)return;
  var n=uList.length;
  var barThick=n<=2?80:n<=4?60:n<=6?45:35;
  unitChart=new Chart(ctx,{type:"bar",data:{
    labels:uList.map(function(e){return e.name;}),
    datasets:[
      {label:"내 점수",data:uList.map(toScore),backgroundColor:NAVY+"cc",borderRadius:4,barThickness:barThick},
      {label:"학급평균",data:uList.map(toClsScore),backgroundColor:GOLD+"99",borderRadius:4,barThickness:barThick}
    ]
  },options:{
    responsive:true,
    plugins:{legend:{labels:{font:{size:11}}}},
    scales:{
      x:{ticks:{font:{size:11}},grid:{display:false}},
      y:{beginAtZero:true,max:100,ticks:{callback:function(v){return v+"점";}}}
    },
    layout:{padding:{left:20,right:20}}
  }});
}

function renderDetail(exList,latest,myAvg,clsAvg,latestScore){
  var html='<div class="grid4">';
  [{l:"최근 점수",v:latestScore,bg:"#fff",bd:"#ddd"},
   {l:"내 평균 점수",v:myAvg,bg:"#fffbec",bd:"#f5d97a"},
   {l:"학급 평균",v:clsAvg,bg:"#f0f4ff",bd:"#a0b4f7"},
   {l:"시험 횟수",v:exList.length+"회",bg:"#fff",bd:"#ddd"}
  ].forEach(function(c){
    html+='<div class="scard" style="background:'+c.bg+';border:1px solid '+c.bd+';">'+
      '<div style="font-size:11px;color:#888;margin-bottom:8px;">'+c.l+'</div>'+
      '<div style="font-size:22px;font-weight:700;">'+c.v+'</div></div>';
  });
  html+='</div><div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:16px;">점수 추이</div>';
  html+=exList.length?'<canvas id="myChart" height="90"></canvas>':'<div style="text-align:center;color:#bbb;padding:40px;">시험 기록이 없습니다</div>';
  html+='</div><div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'+
    '<span style="font-weight:700;font-size:14px;">시험 기록</span>'+

function renderStat(){
  var lvls=statLevel==="초등"?["초1","초2","초3","초4","초5","초6"]:statLevel==="중학"?["중1","중2","중3"]:["고1","고2","고3"];

    return{grade:g,count:ss.length,avg:ax.length?Math.round(avg(ax.map(toScore))):0};
  }).filter(function(d){return d.count>0;});
  var cur=statSubLevel||(sd[0]?sd[0].grade:"");

    var ex=exams[s.id]||[];

      av:ex.length?avg(ex.map(toScore)):0,

  });

    sd.forEach(function(d){
      html+='<button style="padding:5px 12px;border-radius:8px;border:1px solid #ddd;background:'+(cur===d.grade?"#e8f0fe":"#fff")+';color:'+(cur===d.grade?NAVY:"#555")+';cursor:pointer;font-size:12px;" onclick="setStatSub(\''+d.grade+'\')">'+d.grade+'</button>';
    });
    html+='</div>';
  }
  html+='</div><div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:20px;">';
  sd.forEach(function(d){
    html+='<div class="card" style="min-width:160px;flex:1 1 140px;margin-bottom:0;">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:8px;">'+
      '<span style="font-weight:700;font-size:14px;">'+d.grade+'</span>'+
      '<span style="font-size:11px;color:#888;">'+d.count+'명</span></div>'+
      '<div style="font-size:26px;font-weight:700;color:'+NAVY+';">'+d.avg+'점</div>'+
      '<div style="font-size:11px;color:#888;margin-top:4px;">평균 점수</div></div>';
  });
  html+='</div><div class="card">'+
    '<div style="font-weight:700;font-size:14px;margin-bottom:14px;">학년별 평균 비교</div>'+
    '<canvas id="statChart" height="80"></canvas></div>'+
    '<div class="card" style="padding:0;margin-top:20px;">'+
    '<div style="padding:10px 16px;border-bottom:1px solid #f0f0f0;font-weight:700;font-size:13px;">'+cur+' 학생 현황 ('+subs.length+'명)</div>'+
    '<table><thead><tr><th>순위</th><th>이름</th><th>학년</th><th>과목</th><th>담당</th><th>평균 점수</th></tr></thead><tbody>';
  subs.forEach(function(s,i){
    html+='<tr><td style="color:#888;">'+(i+1)+'</td><td style="font-weight:500;">'+s.name+'</td>'+
      '<td>'+s.grade+'</td><td><span class="badge">'+s.subject+'</span></td>'+
      '<td style="color:#555;">'+s.teacher+'</td>'+
      '<td style="color:'+GOLD+';font-weight:600;">'+s.avs+'</td></tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

window.saveUnit=function(eid){

window.generateUnitMsg=function(){
  var s=students.filter(function(x){return x.id===selectedId;})[0];
  var uList=(unitExams[selectedId]||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  if(!s){alert("학생을 선택해주세요!");return;}
  if(!uList.length){alert("단원평가 기록이 없습니다.");return;}
  var btn=document.getElementById("genUnitBtn");
  if(btn)btn.textContent="생성 중...";
  var latest=uList[uList.length-1];

        max_tokens:1000,
        messages:[{
          role:"user",
          content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
            {type:"text",text:prompt}
          ]
        }]
      })
    }).then(function(r){return r.json();})
    .then(function(data){
      var text=data.content?data.content.map(function(c){return c.text||"";}).join(""):"분석에 실패했습니다.";
      if(area){area.value=text;savedMsg=text;}
      if(status)status.textContent="✅ 분석 완료!";
    }).catch(function(err){
      console.error(err);
      if(area)area.value="시험지 분석 중 오류가 발생했습니다. 다시 시도해주세요.";
      if(status)status.textContent="❌ 오류 발생";
    });
  };
  reader.onerror=function(){
    alert("파일을 읽는 중 오류가 발생했습니다.");
  };
  reader.readAsDataURL(file);
};

window.convertMsg=function(){
  var msg=document.getElementById("msgArea");
  if(!msg||!msg.value.trim()){alert("메시지를 먼저 작성해주세요!");return;}
  if(navigator.clipboard){
    navigator.clipboard.writeText("[와와코칭학원]\n"+msg.value).then(function(){alert("클립보드에 복사됐어요!");});
  }
};

window.saveTxt=function(){
  var msg=document.getElementById("msgArea");
  if(!msg||!msg.value.trim()){alert("메시지를 먼저 작성해주세요!");return;}
  var s=students.filter(function(x){return x.id===selectedId;})[0];
  var blob=new Blob(["[와와코칭학원 보고서]\n"+(s?s.name:"")+" 학생\n\n"+msg.value],{type:"text/plain;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=(s?s.name:"")+"_보고서.txt";a.click();
};
