<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WAWA 코칭센터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--accent:#7c3aed;--bg:#eef0f8;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--green:#059669;--red:#dc2626;--blue:#2563eb;--gold:#f59e0b;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}
.layout{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:250px;background:linear-gradient(180deg,#0a0f1e,#111827 60%,#1a2340);display:flex;flex-direction:column;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sb-brand{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.sb-logo{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0a0f1e;flex-shrink:0;}
.sb-title{font-size:15px;font-weight:800;color:#fff;}
.sb-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.12em;}
.sb-stats{display:flex;gap:6px;padding:10px 12px 4px;}
.sb-stat{flex:1;background:rgba(255,255,255,.06);border-radius:10px;padding:8px 6px;text-align:center;}
.sb-stat-n{font-size:18px;font-weight:900;}
.sn-g{color:#34d399;}.sn-r{color:#fca5a5;}.sn-gold{color:#fbbf24;}
.sb-stat-l{font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;}
.sb-tabs{display:flex;gap:4px;padding:8px 12px 0;}
.sb-tab{flex:1;padding:7px;border-radius:8px;border:1px solid transparent;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.ta{background:rgba(52,211,153,.15);color:rgba(52,211,153,.6);}
.ta.on{background:rgba(52,211,153,.3);color:#34d399;border-color:rgba(52,211,153,.4);}
.tp{background:rgba(239,68,68,.1);color:rgba(239,68,68,.5);}
.tp.on{background:rgba(239,68,68,.25);color:#fca5a5;border-color:rgba(239,68,68,.35);}
.sb-sec{padding:8px 12px 0;}
.sb-lbl{font-size:9px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.sb-sel{width:100%;padding:7px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:12px;outline:none;}
.sb-sel option{background:#1a2340;}
.sb-sbj-btns{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.sbj-btn{padding:3px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;cursor:pointer;}
.sbj-btn.on{background:#f59e0b;border-color:#f59e0b;color:#0a0f1e;}
.sb-sort{display:flex;gap:5px;padding:8px 12px 4px;}
.sort-btn{flex:1;padding:5px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:10px;font-weight:600;cursor:pointer;}
.sort-btn.on{background:rgba(255,255,255,.12);color:#fff;}
.sb-count{padding:4px 14px;font-size:11px;color:rgba(255,255,255,.3);}
.sb-list{flex:1;overflow-y:auto;padding:2px 10px 4px;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);}
.sb-item{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;border-radius:10px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .15s;}
.sb-item:hover{background:rgba(255,255,255,.05);}
.sb-item.sel{background:rgba(124,58,237,.25);border-color:rgba(124,58,237,.3);}
.sb-item.pi{border-color:rgba(239,68,68,.15);}
.sb-item.pi.sel{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.35);}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.dot-a{background:#34d399;}.dot-p{background:#ef4444;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);}
.sb-meta{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.sb-pi{margin-top:4px;padding:4px 8px;background:rgba(239,68,68,.12);border-radius:6px;border-left:2px solid rgba(239,68,68,.4);}
.sb-pi-d{font-size:10px;color:#fca5a5;font-weight:600;}
.sb-pi-r{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.sb-avg{font-size:12px;font-weight:700;color:rgba(255,255,255,.5);white-space:nowrap;}
.sb-more{background:none;border:none;color:rgba(255,255,255,.2);font-size:13px;padding:2px 5px;border-radius:4px;}
.sb-more:hover{background:rgba(255,255,255,.08);color:#fff;}
.sb-bot{padding:8px 12px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:5px;flex-wrap:wrap;}
.sb-btn{flex:1;padding:7px;border-radius:8px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:11px;font-weight:600;cursor:pointer;min-width:60px;}
.sb-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.sb-btn-p{padding:7px 10px;border-radius:8px;border:none;background:rgba(239,68,68,.15);color:#fca5a5;font-size:11px;font-weight:600;cursor:pointer;}
.sb-btn-bak{background:rgba(245,158,11,.2)!important;color:#fbbf24!important;}
.sb-btn-rst{background:rgba(59,130,246,.2)!important;color:#93c5fd!important;}
.header{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:64px;}
.h-name{font-size:17px;font-weight:800;}
.h-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.h-right{display:flex;align-items:center;gap:8px;}
.h-tabs{display:flex;gap:3px;background:#ede9fe;padding:3px;border-radius:10px;}
.h-tab{padding:6px 18px;border-radius:7px;border:none;background:transparent;color:#7c3aed;font-size:12px;font-weight:600;opacity:.6;cursor:pointer;}
.h-tab.on{background:#fff;color:#5b21b6;opacity:1;}
.btn-save{padding:8px 14px;background:linear-gradient(135deg,#0a0f1e,#1e2d4a);color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-ov{padding:8px 14px;background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;}
.content{flex:1;overflow-y:auto;padding:28px 0;background:var(--bg);}
.ci{max-width:900px;margin:0 auto;padding:0 28px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:#d4d8e8;border-radius:3px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;}
.welcome-icon{font-size:52px;opacity:.12;}
.welcome-text{font-size:14px;font-weight:500;color:var(--muted);}
.sc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.sc{border-radius:16px;padding:22px;position:relative;overflow:hidden;color:#fff;}
.sc1{background:linear-gradient(135deg,#1d4ed8,#3b82f6);}
.sc2{background:linear-gradient(135deg,#b45309,#f59e0b);}
.sc3{background:linear-gradient(135deg,#6d28d9,#a78bfa);}
.sc::before{content:'';position:absolute;top:-28px;right:-28px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07);}
.sc-lbl{font-size:10px;opacity:.68;margin-bottom:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.sc-val{font-size:34px;font-weight:900;line-height:1;}
.sc-unit{font-size:14px;opacity:.6;margin-left:3px;}
.sc-sub{font-size:10px;opacity:.42;margin-top:7px;}
.card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.card-title{font-size:13px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:3px;height:15px;background:linear-gradient(to bottom,#7c3aed,#f59e0b);border-radius:2px;flex-shrink:0;}
.pb{background:linear-gradient(135deg,#1c0a0a,#2d1515);border:1px solid rgba(239,68,68,.3);border-radius:16px;padding:22px 28px;margin-bottom:16px;display:flex;align-items:center;gap:20px;}
.pb-info{flex:1;}
.pb-title{font-size:16px;font-weight:800;color:#fca5a5;margin-bottom:4px;}
.pb-meta{font-size:12px;color:rgba(255,255,255,.4);}
.pb-reason{font-size:13px;color:rgba(255,255,255,.6);margin-top:6px;padding:8px 12px;background:rgba(255,255,255,.05);border-radius:8px;}
.pb-ret{font-size:12px;color:#fbbf24;margin-top:6px;font-weight:600;}
.pb-acts{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.btn-resume{padding:10px 20px;background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-ep{padding:8px 16px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;}
.hi{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;}
.hi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hi-p{background:#fee2e2;}.hi-r{background:#d1fae5;}
.ef{display:flex;gap:6px;margin-bottom:14px;}
.ef-btn{padding:5px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.ef-btn.on{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.ef-btn.academy.on{background:#059669;border-color:#059669;}
.ef-btn.school.on{background:#2563eb;border-color:#2563eb;}
.ei{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;}
.ei-date{font-size:10px;color:var(--muted);width:76px;flex-shrink:0;}
.ei-bar{height:4px;border-radius:2px;background:#f1f5f9;margin-top:5px;overflow:hidden;}
.ei-bar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,#7c3aed,#f59e0b);}
.etb{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0;}
.etb-a{background:#d1fae5;color:#065f46;}.etb-s{background:#dbeafe;color:#1d4ed8;}
.gb{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.gA{background:#059669;}.gB{background:#2563eb;}.gC{background:#d97706;}.gD{background:#ea580c;}.gF{background:#dc2626;}
.ea{display:flex;gap:3px;}
.eeb,.edb{background:none;border:none;padding:5px 7px;border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;}
.eeb:hover{background:#ede9fe;color:#7c3aed;}.edb:hover{background:#fee2e2;color:#dc2626;}
.add-form{background:linear-gradient(135deg,#f8f9ff,#f0f2fc);border:2px dashed #c4b5fd;border-radius:12px;padding:16px 18px;margin-top:12px;}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.fi{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;color:var(--text);}
.fi:focus{border-color:#7c3aed;}
.fs{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;color:var(--text);}
.btn-p{padding:8px 20px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-g{padding:8px 14px;background:#fff;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-g:hover{border-color:#7c3aed;color:#7c3aed;}
.btn-d{padding:8px 14px;background:#fff;color:#dc2626;border:1.5px solid #fca5a5;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.rh{background:linear-gradient(135deg,#0a0f1e,#1e2d4a,#2d1b69);border-radius:20px;padding:28px;margin-bottom:18px;position:relative;overflow:hidden;}
.rh::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.3),transparent 70%);pointer-events:none;}
.rh-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.rh-logo{display:flex;align-items:center;gap:9px;}
.rh-li{width:32px;height:32px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#0a0f1e;}
.rh-badge{background:rgba(124,58,237,.28);color:#a78bfa;border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;}
.rh-date{font-size:10px;color:rgba(255,255,255,.22);}
.rh-name{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;}
.rh-sub{font-size:12px;color:rgba(255,255,255,.38);margin-bottom:20px;}
.rh-scores{display:flex;gap:10px;flex-wrap:wrap;}
.rh-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:13px 20px;}
.rh-box-l{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;font-weight:700;text-transform:uppercase;}
.rh-box-v{font-size:23px;font-weight:900;color:#fff;}
.gold{color:#fbbf24;}.green{color:#34d399;}.blue{color:#60a5fa;}
.chart-wrap{height:220px;margin:4px 0;}
.ri{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;}
.ri-score{font-size:19px;font-weight:900;margin-left:auto;}
.msg-btn{display:flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.msg-ta{width:100%;min-height:160px;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:12px;line-height:1.9;resize:vertical;outline:none;background:#fafbff;color:var(--text);}
.msg-ta:focus{border-color:#7c3aed;}
.msg-copy{padding:8px 14px;background:#fff;border:1.5px solid var(--border);border-radius:9px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;}
.rfoot{text-align:center;padding:14px;color:var(--muted);font-size:10px;}
.ov-fb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ov-fg{display:flex;gap:3px;background:#f1f5f9;padding:3px;border-radius:10px;}
.ov-btn{padding:5px 13px;border-radius:7px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.ov-btn.on{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ov-table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border);}
.ov-table th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);background:#f8f9fc;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;}
.ov-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.ov-table tr:last-child td{border-bottom:none;}
.ov-table tr:hover td{background:#fafbff;}
.ov-eb{padding:4px 10px;border:1.5px solid var(--border);border-radius:7px;background:#fff;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;display:block;width:100%;margin-bottom:4px;text-align:center;}
.ov-eb:hover{border-color:#7c3aed;color:#7c3aed;}
.sc-card{display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:4px;background:#f8f9fc;border-radius:10px;border:1px solid #e8eaf0;flex-wrap:wrap;}
.sc-badge{background:#7c3aed;color:#fff;border-radius:7px;padding:2px 10px;font-size:12px;font-weight:700;white-space:nowrap;}
.sc-tc{font-size:12px;color:#444;font-weight:600;}
.sc-avg{font-size:13px;font-weight:800;color:#0f172a;}
.sc-savg{font-size:12px;font-weight:700;color:#2563eb;}
.gb-sm{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.ps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.ps-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:18px;text-align:center;}
.ps-num{font-size:28px;font-weight:900;margin-bottom:4px;}
.ps-lbl{font-size:11px;color:var(--muted);}
.pi-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:12px;border:1px solid rgba(239,68,68,.2);margin-bottom:8px;background:linear-gradient(135deg,#fff,#fff5f5);}
.pi-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:blink 1.5s ease-in-out infinite;}
.pi-info{flex:1;}
.pi-name{font-size:14px;font-weight:700;}
.pi-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.pi-tag{display:inline-block;margin-top:5px;padding:3px 10px;background:#fee2e2;color:#dc2626;border-radius:6px;font-size:11px;font-weight:600;}
.pi-ret{display:inline-block;margin-top:5px;margin-left:6px;padding:3px 10px;background:#fef3c7;color:#d97706;border-radius:6px;font-size:11px;font-weight:600;}
.pi-days{font-size:22px;font-weight:900;color:#ef4444;white-space:nowrap;}
.pi-dl{font-size:10px;color:var(--muted);text-align:center;}
.btn-rs-sm{padding:7px 14px;background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:20px;padding:28px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.modal-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;font-size:14px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.mi{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;margin-bottom:12px;color:var(--text);}
.mi:focus{border-color:#7c3aed;}
.ml{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-btn{flex:1;padding:9px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);}
.type-btn.on{border-color:#7c3aed;color:#7c3aed;background:#ede9fe;}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(12px);background:#111827;color:#fff;padding:11px 22px;border-radius:12px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">W</div>
      <div><div class="sb-title">WAWA</div><div class="sb-sub">코 칭 센 터</div></div>
    </div>
    <div class="sb-stats" id="sb-stats"></div>
    <div class="sb-tabs">
      <button class="sb-tab ta on" id="tab-a" onclick="setSbTab('active')">✅ 재원</button>
      <button class="sb-tab tp" id="tab-p" onclick="setSbTab('paused')">⏸ 휴회</button>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">선생님</div>
      <select class="sb-sel" id="sb-tc-sel" onchange="SB.tcF=this.value;renderSidebar()"><option value="all">전체 선생님</option></select>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">과목</div>
      <div class="sb-sbj-btns" id="sb-sbj-btns"></div>
    </div>
    <div class="sb-sort">
      <button class="sort-btn on" id="sb-sort-grade" onclick="setSbSort('grade')">학년순</button>
      <button class="sort-btn" id="sb-sort-name" onclick="setSbSort('name')">이름순</button>
      <button class="sort-btn" id="sb-sort-date" onclick="setSbSort('date')">날짜순</button>
    </div>
    <div class="sb-count" id="sb-count"></div>
    <div class="sb-list" id="sb-list"></div>
    <div class="sb-bot">
      <button class="sb-btn" onclick="openAddStudent()">＋ 학생</button>
      <button class="sb-btn" onclick="openAddTeacher()">＋ 강사</button>
      <button class="sb-btn-p" onclick="showPausedOv()">휴회현황</button>
    </div>
    <div class="sb-bot" style="padding-top:0;border-top:none;">
      <button class="sb-btn sb-btn-bak" onclick="exportData()">💾 백업</button>
      <button class="sb-btn sb-btn-rst" onclick="importData()">📂 복원</button>
    </div>
  </div>
  <div class="main">
    <div class="header">
      <div>
        <div class="h-name" id="h-name">WAWA 코칭센터</div>
        <div class="h-meta" id="h-meta">강사 → 학생 → 과목을 선택하세요</div>
      </div>
      <div class="h-right">
        <div class="h-tabs" id="h-tabs" style="display:none;">
          <button class="h-tab on" id="tab-detail" onclick="setTab('detail')">상세</button>
          <button class="h-tab" id="tab-report" onclick="setTab('report')">보고서</button>
        </div>
        <button class="btn-save" id="save-btn" style="display:none;" onclick="saveImg()">📥 저장</button>
        <button class="btn-ov" onclick="showOverview()">👥 전체 현황</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="welcome"><div class="welcome-icon">📊</div><div class="welcome-text">왼쪽에서 학생과 과목을 선택하세요</div></div>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>
<script>
// ── 데이터 로드 (절대 초기화 안함) ──
var S = {
  teachers: JSON.parse(localStorage.getItem('wawa_teachers')||'[]'),
  students: JSON.parse(localStorage.getItem('wawa_students')||'[]'),
  exams: JSON.parse(localStorage.getItem('wawa_exams')||'[]'),
  pauseHistory: JSON.parse(localStorage.getItem('wawa_pause_history')||'[]'),
  sel: null, tab: 'detail', chartInst: null, examFilter: 'all', sbTab: 'active'
};
var SB = {tcF:'all', subjF:'all', sort:'grade'};
var OV = {gradeF:'all', subjF:'all', sort:{key:'grade',dir:1}};
var nextId = parseInt(localStorage.getItem('wawa_nid')||'1',10);

function nid(){var i=nextId++;localStorage.setItem('wawa_nid',nextId);return i;}
function save(){
  localStorage.setItem('wawa_teachers',JSON.stringify(S.teachers));
  localStorage.setItem('wawa_students',JSON.stringify(S.students));
  localStorage.setItem('wawa_exams',JSON.stringify(S.exams));
  localStorage.setItem('wawa_pause_history',JSON.stringify(S.pauseHistory));
}
function gradeScore(v){if(v>=90)return'A';if(v>=80)return'B';if(v>=70)return'C';if(v>=60)return'D';return'F';}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2300);}
function showModal(html){document.getElementById('modal-root').innerHTML='<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
var GO=['초1','초2','초3','초4','초5','초6','중1','중2','중3','고1','고2','고3'];
function gradeOrder(g){var i=GO.indexOf(g);return i>=0?i:99;}
function pauseDays(d){if(!d)return 0;return Math.floor((new Date()-new Date(d))/86400000);}
function daysUntilReturn(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}

function getTcName(st,subj){
  if(subj&&subj.tcName)return subj.tcName;
  if(subj&&subj.tid){for(var i=0;i<S.teachers.length;i++){if(S.teachers[i].id==subj.tid)return S.teachers[i].name;}}
  if(st.tcName)return st.tcName;
  for(var j=0;j<S.teachers.length;j++){if(S.teachers[j].id==st.tid)return S.teachers[j].name;}
  if(S.teachers.length===1)return S.teachers[0].name;
  return '';
}

// ── 백업/복원 ──
function exportData(){
  var data={teachers:S.teachers,students:S.students,exams:S.exams,pauseHistory:S.pauseHistory,exportDate:new Date().toLocaleDateString('ko-KR')};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='WAWA_백업_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('💾 백업 완료!');
}
function importData(){
  var input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.students||!data.teachers){showToast('올바른 백업 파일이 아니에요');return;}
        if(!confirm('백업 파일로 복원할까요?'))return;
        S.teachers=data.teachers||[];S.students=data.students||[];
        S.exams=data.exams||[];S.pauseHistory=data.pauseHistory||[];
        save();renderSidebar();renderMain();showToast('✅ 복원 완료!');
      }catch(e){showToast('파일 오류');}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── 통계 ──
function renderStats(){
  var pairs=[];
  S.students.forEach(function(st){(st.subjects||[]).forEach(function(s){pairs.push({st:st,s:s});});});
  var active=pairs.filter(function(p){return!p.s.paused&&!p.st.paused;}).length;
  var paused=pairs.filter(function(p){return p.s.paused||p.st.paused;}).length;
  document.getElementById('sb-stats').innerHTML=
    '<div class="sb-stat"><div class="sb-stat-n sn-g">'+active+'</div><div class="sb-stat-l">재원</div></div>'+
    '<div class="sb-stat"><div class="sb-stat-n sn-r">'+paused+'</div><div class="sb-stat-l">휴회</div></div>'+
    '<div class="sb-stat"><div class="sb-stat-n sn-gold">'+S.students.length+'</div><div class="sb-stat-l">학생</div></div>';
}

// ── SIDEBAR ──
function setSbTab(t){
  S.sbTab=t;
  document.getElementById('tab-a').classList.toggle('on',t==='active');
  document.getElementById('tab-p').classList.toggle('on',t==='paused');
  renderSidebar();
}
function setSbSort(s){
  SB.sort=s;
  ['grade','name','date'].forEach(function(k){var el=document.getElementById('sb-sort-'+k);if(el)el.classList.toggle('on',k===s);});
  renderSidebar();
}
function renderSidebar(){
  renderStats();
  var sel=document.getElementById('sb-tc-sel');
  var prev=SB.tcF;
  sel.innerHTML='<option value="all">전체 선생님</option>'+
    S.teachers.map(function(t){return'<option value="'+t.id+'"'+(String(t.id)===String(prev)?' selected':'')+'>'+t.name+' 선생님</option>';}).join('');
  var allSubjs=[];
  S.students.forEach(function(st){(st.subjects||[]).forEach(function(s){if(allSubjs.indexOf(s.name)<0)allSubjs.push(s.name);});});
  document.getElementById('sb-sbj-btns').innerHTML=
    '<button class="sbj-btn'+(SB.subjF==='all'?' on':'')+'" onclick="SB.subjF=\'all\';renderSidebar()">전체</button>'+
    allSubjs.map(function(s){return'<button class="sbj-btn'+(SB.subjF===s?' on':'')+'" onclick="SB.subjF=\''+s+'\';renderSidebar()">'+s+'</button>';}).join('');
  var items=[];
  S.students.forEach(function(st){
    (st.subjects||[]).forEach(function(subj){
      var ip=!!(subj.paused||st.paused);
      if(S.sbTab==='paused'&&!ip)return;
      if(S.sbTab==='active'&&ip)return;
      if(SB.tcF!=='all'&&String(st.tid)!==String(SB.tcF))return;
      if(SB.subjF!=='all'&&subj.name!==SB.subjF)return;
      var exams=S.exams.filter(function(e){return e.sid===st.id&&e.subj===subj.name&&(e.examType||'academy')==='academy';});
      var avg=exams.length?Math.round(exams.reduce(function(a,e){return a+e.score;},0)/exams.length*10)/10:null;
      items.push({st:st,subj:subj,avg:avg,ip:ip});
    });
    // 과목 없는 휴회 학생
    if((st.subjects||[]).length===0&&st.paused){
      if(S.sbTab==='paused')items.push({st:st,subj:{name:'(과목없음)',type:'score'},avg:null,ip:true});
    }
  });
  items.sort(function(a,b){
    if(SB.sort==='name')return a.st.name.localeCompare(b.st.name);
    if(SB.sort==='date'&&S.sbTab==='paused')return(b.subj.pauseDate||b.st.pauseDate||'').localeCompare(a.subj.pauseDate||a.st.pauseDate||'');
    return gradeOrder(a.st.grade||'')-gradeOrder(b.st.grade||'');
  });
  document.getElementById('sb-count').textContent=(S.sbTab==='paused'?'휴회':'재원')+' ('+items.length+'명)';
  document.getElementById('sb-list').innerHTML=items.map(function(it){
    var isSel=S.sel&&S.sel.sid===it.st.id&&S.sel.subj===it.subj.name;
    var pd=it.subj.pauseDate||it.st.pauseDate||'';
    var days=it.ip?pauseDays(pd):0;
    var rd=it.subj.returnDate||it.st.returnDate||'';
    var returnD=it.ip&&rd?daysUntilReturn(rd):null;
    var unit=it.subj.type==='count'?'개':'점';
    var piHTML='';
    if(it.ip){
      piHTML='<div class="sb-pi">'+
        '<div class="sb-pi-d">휴회 '+days+'일째'+(pd?' ('+pd+')':'')+' </div>'+
        (it.subj.pauseReason||it.st.pauseReason?'<div class="sb-pi-r">📌 '+(it.subj.pauseReason||it.st.pauseReason)+'</div>':'')+
        (returnD!==null?'<div class="sb-pi-r">🔄 복귀 '+(returnD>=0?returnD+'일 후':'예정일 지남')+'</div>':'')+
      '</div>';
    }
    return '<div class="sb-item'+(isSel?' sel':'')+(it.ip?' pi':'')+'" onclick="selectSubj('+it.st.tid+','+it.st.id+',\''+it.subj.name+'\')">' +
      '<div class="sb-dot '+(it.ip?'dot-p':'dot-a')+'"></div>'+
      '<div class="sb-info"><div class="sb-name">'+it.st.name+'</div><div class="sb-meta">'+(it.st.grade||'')+' · '+it.subj.name+'</div>'+piHTML+'</div>'+
      (it.avg!==null&&!it.ip?'<span class="sb-avg">'+it.avg+unit+'</span>':'')+
      '<button class="sb-more" onclick="event.stopPropagation();openItemMenu('+it.st.id+',\''+it.subj.name+'\','+it.ip+')">···</button>'+
    '</div>';
  }).join('');
}

function openItemMenu(sid,subjName,isPaused){
  var st=S.students.find(function(s){return s.id===sid;});
  var btns=isPaused
    ?'<button class="btn-resume" style="width:100%;margin-bottom:8px;" onclick="resumeSubj('+sid+',\''+subjName+'\')">✅ 재원 복귀</button>'+
      '<button class="btn-ep" style="width:100%;margin-bottom:8px;" onclick="closeModal();openPauseSubj('+sid+',\''+subjName+'\',true)">📝 휴회 정보 수정</button>'
    :'<button class="btn-p" style="background:linear-gradient(135deg,#dc2626,#ef4444);width:100%;margin-bottom:8px;" onclick="closeModal();openPauseSubj('+sid+',\''+subjName+'\',false)">⏸ 휴회 처리</button>';
  showModal('<div class="modal-title"><div class="modal-icon">⚙️</div>'+st.name+' · '+subjName+'</div>'+
    '<div style="display:flex;flex-direction:column;">'+btns+
    '<button class="btn-g" style="margin-bottom:8px;" onclick="openAddSubj('+sid+')">＋ 과목 추가</button>'+
    '<button class="btn-g" style="color:#dc2626;border-color:#fca5a5;margin-bottom:8px;" onclick="if(confirm(\''+subjName+' 과목을 삭제할까요?\')){delSubj('+sid+',\''+subjName+'\');closeModal()}">🗑 과목 삭제</button>'+
    '<button class="btn-d" onclick="if(confirm(\''+st.name+' 학생 전체를 삭제할까요?\')){delStudent('+sid+');closeModal()}">⚠️ 학생 전체 삭제</button>'+
    '<button class="btn-g" style="margin-top:8px;" onclick="closeModal()">취소</button></div>');
}
function selectSubj(tid,sid,subj){S.sel={tid:tid,sid:sid,subj:subj};S.tab='detail';S.examFilter='all';renderSidebar();renderMain();}

// ── MAIN ──
function renderMain(){
  if(!S.sel){
    document.getElementById('h-tabs').style.display='none';
    document.getElementById('save-btn').style.display='none';
    document.getElementById('h-name').textContent='WAWA 코칭센터';
    document.getElementById('h-meta').textContent='강사 → 학생 → 과목을 선택하세요';
    document.getElementById('content').innerHTML='<div class="welcome"><div class="welcome-icon">📊</div><div class="welcome-text">왼쪽에서 학생과 과목을 선택하세요</div></div>';
    return;
  }
  var st=S.students.find(function(s){return s.id===S.sel.sid;});
  var tc=S.teachers.find(function(t){return t.id===S.sel.tid;});
  var subj=(st.subjects||[]).find(function(s){return s.name===S.sel.subj;})||{name:S.sel.subj,type:'score'};
  document.getElementById('h-tabs').style.display='flex';
  document.getElementById('save-btn').style.display=S.tab==='report'?'flex':'none';
  ['detail','report'].forEach(function(t){document.getElementById('tab-'+t).classList.toggle('on',S.tab===t);});
  document.getElementById('h-name').textContent=st.name+' 학생'+((subj.paused||st.paused)?' 🔴 휴회 중':'');
  document.getElementById('h-meta').innerHTML=(st.grade||'')+' · <strong>'+S.sel.subj+'</strong> · '+(tc?tc.name+' 선생님':'')+(st.school?' · '+st.school:'');
  if(S.tab==='detail')renderDetail(st,subj);else renderReport(st,subj,tc);
}
function setTab(t){S.tab=t;renderMain();}
function filteredExams(all){if(S.examFilter==='all')return all;return all.filter(function(e){return(e.examType||'academy')===S.examFilter;});}
function filterTabsHTML(){
  var f=S.examFilter;
  return'<div class="ef">'+
    '<button class="ef-btn'+(f==='all'?' on':'')+'" onclick="S.examFilter=\'all\';renderMain()">전체</button>'+
    '<button class="ef-btn academy'+(f==='academy'?' on':'')+'" onclick="S.examFilter=\'academy\';renderMain()">학원</button>'+
    '<button class="ef-btn school'+(f==='school'?' on':'')+'" onclick="S.examFilter=\'school\';renderMain()">학교</button>'+
  '</div>';
}

// ── DETAIL ──
function renderDetail(st,subj){
  var ip=!!(subj.paused||st.paused);
  var pd=subj.pauseDate||st.pauseDate||'';
  var days=ip?pauseDays(pd):0;
  var rd=subj.returnDate||st.returnDate||'';
  var returnD=ip&&rd?daysUntilReturn(rd):null;
  var pr=subj.pauseReason||st.pauseReason||'';
  var allExams=S.exams.filter(function(e){return e.sid===st.id&&e.subj===subj.name;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var exams=filteredExams(allExams);
  var type=subj.type||'score';
  var vals=exams.map(function(e){return e.score;});
  var latest=vals.length?vals[vals.length-1]:null;
  var maxVal=vals.length?Math.max.apply(null,vals):null;
  var unit=type==='count'?'개':'점';
  var history=S.pauseHistory.filter(function(h){return h.sid===st.id&&h.subj===subj.name;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var rows=[].concat(exams).reverse().map(function(e){
    var g=type==='score'?gradeScore(e.score):null;
    var et=e.examType||'academy';
    return'<div class="ei"><div class="ei-date">'+e.date+'</div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:600;">'+e.name+'</div><div class="ei-bar"><div class="ei-bar-f" style="width:'+Math.min(100,e.score)+'%"></div></div></div>'+
      '<span class="etb '+(et==='school'?'etb-s':'etb-a')+'">'+(et==='school'?'학교':'학원')+'</span>'+
      '<div><span style="font-size:18px;font-weight:800;">'+e.score+'</span><span style="font-size:10px;color:var(--muted);">'+unit+'</span></div>'+
      (g?'<div class="gb g'+g+'">'+g+'</div>':'')+
      '<div class="ea"><button class="eeb" onclick="openEditExam('+e.id+')">✏️</button><button class="edb" onclick="delExam('+e.id+')">🗑</button></div></div>';
  }).join('');
  var histHTML=history.length?history.map(function(h){
    return'<div class="hi"><div class="hi-icon '+(h.type==='paused'?'hi-p':'hi-r')+'">'+(h.type==='paused'?'⏸':'✅')+'</div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:700;">'+(h.type==='paused'?'휴회 처리':'재원 복귀')+'</div><div style="font-size:11px;color:var(--muted);">'+h.date+(h.reason?' · '+h.reason:'')+'</div></div>'+
      (h.returnDate?'<div style="font-size:11px;color:#d97706;font-weight:600;">복귀예정: '+h.returnDate+'</div>':'')+
    '</div>';
  }).join(''):'<div style="text-align:center;color:var(--muted);padding:20px;">이력 없음</div>';
  var pbHTML='';
  if(ip){
    pbHTML='<div class="pb"><div style="font-size:36px;flex-shrink:0;">⏸</div>'+
      '<div class="pb-info"><div class="pb-title">휴회 중 · '+days+'일째</div>'+
      '<div class="pb-meta">'+(pd||'')+' 부터 휴회</div>'+
      (pr?'<div class="pb-reason">📌 '+pr+'</div>':'')+
      (returnD!==null?'<div class="pb-ret">🔄 복귀 예정일: '+rd+' ('+(returnD>=0?returnD+'일 남음':'예정일 지남')+')</div>':'')+
      '</div><div class="pb-acts">'+
      '<button class="btn-resume" onclick="resumeSubj('+st.id+',\''+subj.name+'\')">✅ 재원 복귀</button>'+
      '<button class="btn-ep" onclick="openPauseSubj('+st.id+',\''+subj.name+'\',true)">📝 수정</button>'+
      '</div></div>';
  }
  var infoHTML='<div class="card"><div class="card-title">학생 기본 정보</div>'+
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">'+
      '<div style="padding:12px;background:#f8f9fc;border-radius:10px;border:1px solid var(--border);">'+
        '<div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px;">입회일</div>'+
        '<div style="font-size:13px;font-weight:700;">'+(st.joinDate||'—')+'</div>'+
      '</div>'+
      '<div style="padding:12px;background:#f8f9fc;border-radius:10px;border:1px solid var(--border);">'+
        '<div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px;">첫 등록일</div>'+
        '<div style="font-size:13px;font-weight:700;">'+(st.regDate||'—')+'</div>'+
      '</div>'+
      '<div style="padding:12px;background:'+(st.payment==='입금완료'?'#f0fdf4':'#fff5f5')+';border-radius:10px;border:1px solid '+(st.payment==='입금완료'?'#bbf7d0':'#fca5a5')+';">'+
        '<div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px;">입금 여부</div>'+
        '<div style="font-size:13px;font-weight:700;color:'+(st.payment==='입금완료'?'#059669':'#dc2626')+';">'+(st.payment==='입금완료'?'✅ 입금완료':'⚠️ 미입금')+'</div>'+
        (st.payDate?'<div style="font-size:11px;color:var(--muted);margin-top:2px;">'+st.payDate+'</div>':'')+

// ── CHART ──
function drawChart(exams,type){
  if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
  var ctx=document.getElementById('score-chart');if(!ctx)return;
  var unit=type==='count'?'개':'점';
  var vals=exams.map(function(e){return e.score;});
  var maxVal=Math.max.apply(null,vals);
  var pad=Math.max(2,Math.round(maxVal*.1));
  var pc=exams.length<=3?1:0;
  var labels=[],data=[],colors=[];
  for(var i=0;i<pc;i++){labels.push('');data.push(null);colors.push('transparent');}
  exams.forEach(function(e){labels.push(e.name);data.push(e.score);colors.push((e.examType||'academy')==='school'?'rgba(37,99,235,.85)':'rgba(124,58,237,.85)');});
  for(var j=0;j<pc;j++){labels.push('');data.push(null);colors.push('transparent');}
  S.chartInst=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'성적',data:data,backgroundColor:colors,borderWidth:0,borderRadius:8,borderSkipped:false,maxBarThickness:100,barPercentage:.7,categoryPercentage:.8}]},
    options:{layout:{padding:{right:20}},responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y+unit;}},backgroundColor:'#111827',padding:10,cornerRadius:8}},
      scales:{y:{min:0,max:maxVal+pad,grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:function(v){return v+unit;},font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11},maxRotation:0}}}}});
}

async function autoMsg(){
  var st=S.students.find(function(s){return s.id===S.sel.sid;});
  var tc=S.teachers.find(function(t){return t.id===S.sel.tid;});
  var subj=(st.subjects||[]).find(function(s){return s.name===S.sel.subj;})||{type:'score'};
  var exams=S.exams.filter(function(e){return e.sid===st.id&&e.subj===S.sel.subj;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var unit=subj.type==='count'?'개':'점';
  var vals=exams.map(function(e){return e.score;});
  var latest=vals.length?vals[vals.length-1]:null;
  var memo=(document.getElementById('fb-memo')?document.getElementById('fb-memo').value:'')||'';
  if(!memo.trim()){showToast('선생님 메모를 먼저 입력해주세요!');return;}
  var resultBox=document.getElementById('msg-result');
  var rendered=document.getElementById('msg-rendered');
  if(rendered)rendered.innerHTML='<div style="text-align:center;padding:20px;color:#7c3aed;">✦ AI가 정리 중...</div>';
  if(resultBox)resultBox.style.display='block';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'','anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,
        messages:[{role:'user',content:'아래 선생님 메모를 바탕으로 학부모 안내 메시지를 JSON 형식으로만 작성해줘.\n학생: '+st.name+'('+( st.grade||'')+') / 과목: '+S.sel.subj+' / 담당: '+(tc?tc.name:'선생님')+' / 최근성적: '+(latest!==null?latest:'없음')+unit+'\n[메모] '+memo+'\nJSON: {"greeting":"인사+강사소개","good":"잘한점","bad":"보완점","next":"학습방향","closing":"마무리"}'}]})});
    var raw=await res.text();var d;
    try{d=JSON.parse(raw);}catch(e){if(rendered)rendered.innerHTML='파싱오류';return;}
    if(d.error){if(rendered)rendered.innerHTML='오류: '+JSON.stringify(d.error);return;}
    var txt=(d.content&&d.content[0]?d.content[0].text:'')||'';
    var obj;
    try{obj=JSON.parse(txt.replace(/```json|```/g,'').trim());}
    catch(e){if(rendered)rendered.innerHTML='<div style="white-space:pre-wrap;">'+txt+'</div>';localStorage.setItem(msgKey(),txt);return;}
    var full=obj.greeting+'\n\n✅ 잘한 점\n'+obj.good+'\n\n📝 보완이 필요한 부분\n'+obj.bad+'\n\n📚 앞으로의 학습 방향\n'+obj.next+'\n\n'+obj.closing;
    localStorage.setItem(msgKey(),full);
    if(rendered)rendered.innerHTML=
      '<div style="font-size:13px;line-height:2;color:#374151;margin-bottom:14px;">'+obj.greeting.replace(/\n/g,'<br>')+'</div>'+
      '<div style="background:#f0fdf4;border-left:4px solid #059669;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:10px;"><div style="font-size:12px;font-weight:700;color:#059669;margin-bottom:5px;">✅ 잘한 점</div><div style="font-size:13px;line-height:1.9;color:#374151;">'+obj.good.replace(/\n/g,'<br>')+'</div></div>'+
      '<div style="background:#fffbeb;border-left:4px solid #d97706;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:10px;"><div style="font-size:12px;font-weight:700;color:#d97706;margin-bottom:5px;">📝 보완이 필요한 부분</div><div style="font-size:13px;line-height:1.9;color:#374151;">'+obj.bad.replace(/\n/g,'<br>')+'</div></div>'+
      '<div style="background:#eff6ff;border-left:4px solid #2563eb;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:14px;"><div style="font-size:12px;font-weight:700;color:#2563eb;margin-bottom:5px;">📚 앞으로의 학습 방향</div><div style="font-size:13px;line-height:1.9;color:#374151;">'+obj.next.replace(/\n/g,'<br>')+'</div></div>'+
      '<div style="font-size:13px;line-height:2;color:#374151;">'+obj.closing.replace(/\n/g,'<br>')+'</div>';
    var ta=document.getElementById('msg-area');if(ta){ta.value=full;ta.style.display='none';}
  }catch(e){if(rendered)rendered.innerHTML='오류: '+e.message;}
}

  var name=document.getElementById('ei-name').value.trim();

  var score=parseFloat(document.getElementById('ei-score').value);

  var tcSelEl=document.getElementById('new-subj-tc');

  var subjTcId=selTid||st.tid;

  st.subjects.push({name:n,type:window._addSubjType||'score',tid:subjTcId,tcName:subjTcName});

function delSubj(sid,subj){
  var st=S.students.find(function(s){return s.id===sid;});
  st.subjects=st.subjects.filter(function(s){return s.name!==subj;});
  S.exams=S.exams.filter(function(e){return!(e.sid===sid&&e.subj===subj);});

function openPauseSubj(sid,subjName,isEdit){
  var st=S.students.find(function(s){return s.id===sid;});
  var subj=(st.subjects||[]).find(function(s){return s.name===subjName;})||{};
  var pd=subj.pauseDate||st.pauseDate||new Date().toISOString().slice(0,10);
  var pr=subj.pauseReason||st.pauseReason||'';
  var rd=subj.returnDate||st.returnDate||'';
  showModal('<div class="modal-title"><div class="modal-icon" style="background:linear-gradient(135deg,#dc2626,#ef4444);">⏸</div>'+(isEdit?'휴회 정보 수정':'휴회 처리')+'</div>'+
    '<div style="padding:10px 14px;background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;margin-bottom:14px;font-size:13px;"><strong style="color:#dc2626;">'+st.name+'</strong> · <strong>'+subjName+'</strong></div>'+
    '<div class="ml">휴회 시작일</div><input class="mi" id="pause-date" type="date" value="'+pd+'"/>'+
    '<div class="ml">휴회 사유</div><input class="mi" id="pause-reason" placeholder="예: 이사, 개인 사정" value="'+pr+'"/>'+
    '<div class="ml">복귀 예정일 (선택)</div><input class="mi" id="pause-return" type="date" value="'+rd+'"/>'+
    '<div class="modal-actions"><button class="btn-g" onclick="closeModal()">취소</button>'+
    '<button class="btn-p" style="background:linear-gradient(135deg,#dc2626,#ef4444);" onclick="pauseSubj('+sid+',\''+subjName+'\','+(isEdit?'true':'false')+')">'+( isEdit?'수정 저장':'휴회 처리')+'</button></div>');
}
function pauseSubj(sid,subjName,isEdit){
  var st=S.students.find(function(s){return s.id===sid;});
  var pauseDate=document.getElementById('pause-date').value;
  var reason=document.getElementById('pause-reason').value.trim()||'사유 없음';
  var returnDate=document.getElementById('pause-return').value||'';
  var subj=(st.subjects||[]).find(function(s){return s.name===subjName;});
  if(subj){subj.paused=true;subj.pauseDate=pauseDate;subj.pauseReason=reason;subj.returnDate=returnDate;}
  // 모든 과목이 휴회거나 과목 없으면 학생 자체도 paused
  var allSubjs=st.subjects||[];
  var activeSubjs=allSubjs.filter(function(s){return!s.paused;});
  if(allSubjs.length===0||activeSubjs.length===0){
    st.paused=true;st.pauseDate=pauseDate;st.pauseReason=reason;st.returnDate=returnDate;
  }
  if(!isEdit){
    S.pauseHistory.push({id:nid(),sid:sid,subj:subjName,type:'paused',date:pauseDate,reason:reason,returnDate:returnDate});
    if(S.sel&&S.sel.sid===sid&&S.sel.subj===subjName)S.sel=null;
  }else{
    var last=null;S.pauseHistory.filter(function(h){return h.sid===sid&&h.subj===subjName&&h.type==='paused';}).forEach(function(h){last=h;});
    if(last){last.date=pauseDate;last.reason=reason;last.returnDate=returnDate;}
  }
  save();closeModal();renderSidebar();renderMain();showToast('⏸ 휴회 처리됐어요');
}
function resumeSubj(sid,subjName){
  var st=S.students.find(function(s){return s.id===sid;});
  if(!confirm(st.name+' · '+subjName+'\n재원 복귀 처리할까요?'))return;
  var today=new Date().toISOString().slice(0,10);
  var subj=(st.subjects||[]).find(function(s){return s.name===subjName;});
  if(subj){subj.paused=false;subj.pauseDate='';subj.pauseReason='';subj.returnDate='';}
  st.paused=false;st.pauseDate='';st.pauseReason='';st.returnDate='';
  S.pauseHistory.push({id:nid(),sid:sid,subj:subjName,type:'resumed',date:today,reason:'재원 복귀'});
  save();closeModal();renderSidebar();
  if(S.sel&&S.sel.sid===sid&&S.sel.subj===subjName){S.tab='detail';renderMain();}
  else{S.sel=null;renderMain();}
  showToast('✅ 재원 복귀됐어요');
}

    if(pausedSubjs.length>0){
      pausedSubjs.forEach(function(subj){
        var pd=subj.pauseDate||st.pauseDate||'';
        var rd=subj.returnDate||st.returnDate||'';

      });

    }
  });

  var retHTML=returning.length?'<div style="padding:14px 18px;background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;margin-bottom:16px;"><div style="font-size:12px;font-weight:700;color:#d97706;margin-bottom:8px;">📅 이번 달 복귀 예정</div>'+returning.map(function(p){return'<div style="font-size:13px;margin-bottom:4px;">• <strong>'+p.st.name+'</strong> · '+p.subj.name+' <span style="color:#d97706;font-weight:600;">'+p.rd+'</span></div>';}).join('')+'</div>':'';
  var listHTML=items.length?items.map(function(p){
    var tcn=tcNameFor(p);
    return'<div class="pi-item"><div class="pi-dot"></div>'+
      '<div class="pi-info"><div class="pi-name">'+p.st.name+' <span style="font-size:12px;color:var(--muted);font-weight:400;">'+(p.st.grade||'')+' · '+p.subj.name+'</span></div>'+
      '<div class="pi-meta">'+(tcn?tcn+' 선생님':'')+(p.st.school?' · '+p.st.school:'')+'</div>'+
      '<div><span class="pi-tag">📌 '+(p.pr||'사유 없음')+'</span>'+
      (p.rd?'<span class="pi-ret">🔄 '+p.rd+(p.returnD>=0?' ('+p.returnD+'일 후)':' (예정일 지남)')+'</span>':'')+
      '</div></div>'+
      '<div style="text-align:center;margin:0 12px;"><div class="pi-days">'+p.days+'</div><div class="pi-dl">일째</div></div>'+
      '<button class="btn-rs-sm" onclick="resumeSubjFromOv('+p.st.id+',\''+p.subj.name+'\')">복귀 ✅</button>'+
    '</div>';
  }).join(''):'<div style="text-align:center;padding:48px;color:var(--muted);">😊 현재 휴회 중인 학생이 없어요</div>';
  document.getElementById('content').innerHTML='<div class="ci">'+
    '<div class="ps-grid">'+
      '<div class="ps-card"><div class="ps-num" style="color:#ef4444;">'+items.length+'</div><div class="ps-lbl">전체 휴회</div></div>'+
      '<div class="ps-card"><div class="ps-num" style="color:#d97706;">'+returning.length+'</div><div class="ps-lbl">이번 달 복귀 예정</div></div>'+
      '<div class="ps-card"><div class="ps-num" style="color:#7c3aed;">'+overdue.length+'</div><div class="ps-lbl">복귀일 지남</div></div>'+

function showOverview(){
  S.sel=null;
  document.getElementById('h-tabs').style.display='none';
  document.getElementById('save-btn').style.display='none';
  document.getElementById('h-name').textContent='전체 학생 현황';
  document.getElementById('h-meta').textContent='모든 강사 · 학생 · 과목 통합 보기';
  OV.gradeF='all';OV.subjF='all';OV.sort={key:'grade',dir:1};
  renderOverview();
}
function renderOverview(){
  var map={};
  S.students.forEach(function(st){
    var key=st.name+'__'+(st.school||'')+'__'+(st.grade||'');
    if(!map[key])map[key]={st:st,rows:[],go:gradeOrder(st.grade||'')};
    var allSubjs=st.subjects||[];
    var activeSubjs=allSubjs.filter(function(s){return!s.paused;});
    // 학생 자체 paused이거나 과목 전부 휴회면 전체현황 제외
    if(st.paused===true)return;
    if(allSubjs.length>0&&activeSubjs.length===0)return;
    // 과목 없는 학생도 제외 (휴회탭에서만 관리)
    if(allSubjs.length===0)return;
    activeSubjs.forEach(function(subj){
      var exams=S.exams.filter(function(e){return e.sid===st.id&&e.subj===subj.name;});
      var aEx=exams.filter(function(e){return(e.examType||'academy')==='academy';});
      var sEx=exams.filter(function(e){return e.examType==='school';});
      var avg=function(arr){return arr.length?Math.round(arr.reduce(function(a,e){return a+e.score;},0)/arr.length):null;};
      var subjTcName=getTcName(st,subj);
      map[key].rows.push({subjName:subj.name,tcName:subjTcName,sid:st.id,tid:subj.tid||st.tid,acAvg:avg(aEx),scAvg:avg(sEx),aEx:aEx,sEx:sEx});
    });
  });
  var all=Object.keys(map).map(function(k){return map[k];}).filter(function(r){return r.rows.length>0;});
  var gf=OV.gradeF,sf=OV.subjF;
  var rows=all.filter(function(r){
    if(gf!=='all'&&!(r.st.grade&&r.st.grade.startsWith(gf)))return false;
    if(sf!=='all'&&!r.rows.find(function(x){return x.subjName===sf;}))return false;
    return true;
  }).map(function(r){return Object.assign({},r,{rows:sf==='all'?r.rows:r.rows.filter(function(x){return x.subjName===sf;})});});
  rows.sort(function(a,b){if(OV.sort.key==='name')return OV.sort.dir*a.st.name.localeCompare(b.st.name);return OV.sort.dir*(a.go-b.go);});
  var allGrades=[];S.students.forEach(function(s){if(s.grade&&allGrades.indexOf(s.grade)<0)allGrades.push(s.grade);});
  allGrades.sort(function(a,b){return gradeOrder(a)-gradeOrder(b);});
  var gg=[];allGrades.forEach(function(g){var k=g.replace(/[0-9]/g,'');if(gg.indexOf(k)<0)gg.push(k);});
  var allSubjs=[];S.students.forEach(function(st){(st.subjects||[]).filter(function(s){return!s.paused;}).forEach(function(s){if(allSubjs.indexOf(s.name)<0)allSubjs.push(s.name);});});
  var si=function(k){return OV.sort.key===k?(OV.sort.dir===1?'↑':'↓'):'<span style="color:#ddd;font-size:9px;">⇅</span>';};
  var tableRows=rows.map(function(r){
    var subjHTML=r.rows.map(function(x){
      var g=x.acAvg!==null?gradeScore(x.acAvg):null;
      var diff=(x.acAvg!==null&&x.scAvg!==null)?x.acAvg-x.scAvg:null;
      var diffTxt=diff!==null?(diff>0?'+'+diff:diff===0?'±0':''+diff):'';
      var dc=diff===null?'#94a3b8':diff>0?'#059669':diff<0?'#dc2626':'#64748b';
      return'<div class="sc-card">'+
        '<span class="sc-badge">'+x.subjName+'</span>'+
        '<span class="sc-tc">👤 '+(x.tcName||'—')+' 선생님</span>'+
        '<span class="sc-avg">🏫 '+(x.acAvg!==null?x.acAvg+'점':'—')+'</span>'+
        '<span class="sc-savg">📚 '+(x.scAvg!==null?x.scAvg+'점':'—')+'</span>'+
        (diffTxt?'<span style="font-size:12px;font-weight:700;color:'+dc+';">'+diffTxt+'</span>':'')+
        (g?'<span class="gb-sm g'+g+'">'+g+'</span>':'')+
      '</div>';
    }).join('');
    var firstRow=r.rows[0];
    window._afterAddSubj=function(){renderSidebar();renderOverview();};
    return'<tr style="border-bottom:2px solid #e2e8f0;">'+
      '<td style="color:var(--muted);font-size:12px;vertical-align:middle;">'+(r.st.grade||'—')+'</td>'+
      '<td style="font-weight:700;vertical-align:middle;">'+r.st.name+'</td>'+
      '<td style="font-size:12px;color:var(--muted);vertical-align:middle;">'+(r.st.school||'—')+'</td>'+
      '<td style="vertical-align:middle;">'+subjHTML+
        '<button onclick="openAddSubj('+r.st.id+')" style="margin-top:6px;padding:4px 12px;border:1.5px dashed #c4b5fd;border-radius:8px;background:#faf8ff;color:#7c3aed;font-size:11px;font-weight:600;cursor:pointer;">＋ 과목 추가</button>'+
      '</td>'+
      '<td style="vertical-align:middle;min-width:80px;">'+
        (firstRow?'<button class="ov-eb" onclick="goToStudent('+firstRow.tid+','+firstRow.sid+',\''+firstRow.subjName+'\')">상세 →</button>':'')+
        '<button class="ov-eb" style="border-color:#fca5a5;color:#dc2626;" onclick="delStudentFromOv('+r.st.id+')">🗑 삭제</button>'+
      '</td>'+
    '</tr>';
  }).join('');
  document.getElementById('content').innerHTML='<div class="ci">'+
    '<div style="font-size:14px;font-weight:700;margin-bottom:14px;">전체 학생 <span style="color:var(--muted);font-weight:400;font-size:12px;">('+rows.length+'명)</span></div>'+
    '<div class="ov-fb">'+
      '<div class="ov-fg"><button class="ov-btn'+(OV.gradeF==='all'?' on':'')+'" onclick="setOvF(\'grade\',\'all\')">전체</button>'+
        gg.map(function(g){var lb=g==='초'?'초등':g==='중'?'중학':g==='고'?'고등':g;return'<button class="ov-btn'+(OV.gradeF===g?' on':'')+'" onclick="setOvF(\'grade\',\''+g+'\')">'+lb+'</button>';}).join('')+
      '</div>'+
      '<div class="ov-fg"><button class="ov-btn'+(OV.subjF==='all'?' on':'')+'" onclick="setOvF(\'subj\',\'all\')">전체</button>'+
        allSubjs.map(function(s){return'<button class="ov-btn'+(OV.subjF===s?' on':'')+'" onclick="setOvF(\'subj\',\''+s+'\')">'+s+'</button>';}).join('')+
      '</div>'+
    '</div>'+
    (rows.length===0?'<div style="text-align:center;padding:48px;color:var(--muted);">📭 학생이 없어요</div>':
      '<table class="ov-table"><thead><tr>'+
        '<th onclick="setOvSort(\'grade\')">학년 '+si('grade')+'</th>'+
        '<th onclick="setOvSort(\'name\')">이름 '+si('name')+'</th>'+
        '<th>학교</th><th>과목 · 선생님 · 학원평균 · 학교평균</th><th></th>'+
      '</tr></thead><tbody>'+tableRows+'</tbody></table>')+
  '</div>';
}
function setOvF(type,val){if(type==='grade')OV.gradeF=val;else OV.subjF=val;renderOverview();}
function setOvSort(k){if(OV.sort.key===k)OV.sort.dir*=-1;else{OV.sort.key=k;OV.sort.dir=1;}renderOverview();}
function goToStudent(tid,sid,subj){S.sel={tid:tid,sid:sid,subj:subj};S.tab='detail';S.examFilter='all';renderSidebar();renderMain();}
function delStudentFromOv(id){
  var st=S.students.find(function(s){return s.id===id;});if(!st)return;
  if(!confirm(st.name+' 학생을 삭제할까요?'))return;
  S.students=S.students.filter(function(s){return s.id!==id;});
  S.exams=S.exams.filter(function(e){return e.sid!==id;});
  S.pauseHistory=S.pauseHistory.filter(function(h){return h.sid!==id;});
  if(S.sel&&S.sel.sid===id)S.sel=null;
  save();renderSidebar();renderOverview();showToast('🗑 삭제됐어요');
}

// ── 이미지 저장 ──
async function saveImg(){
  if(!S.sel)return;
  showToast('📸 이미지 생성 중...');
  var st=S.students.find(function(s){return s.id===S.sel.sid;});
  var tc=S.teachers.find(function(t){return t.id===S.sel.tid;});
  var subj=(st.subjects||[]).find(function(s){return s.name===S.sel.subj;})||{type:'score'};
  var allExams=S.exams.filter(function(e){return e.sid===st.id&&e.subj===S.sel.subj;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var exams=filteredExams(allExams);
  var vals=exams.map(function(e){return e.score;});
  var unit=subj.type==='count'?'개':'점';
  var latest=vals.length?vals[vals.length-1]:null;
  var maxv=vals.length?Math.max.apply(null,vals):null;
  var today=new Date().toLocaleDateString('ko-KR');
  var msg=(document.getElementById('msg-rendered')?document.getElementById('msg-rendered').innerHTML:'')||(document.getElementById('msg-area')?document.getElementById('msg-area').value:'')||'';
  var chartImg='';var cc=document.getElementById('score-chart');if(cc)chartImg=cc.toDataURL('image/png');
  var examRows=[].concat(exams).reverse().map(function(e){
    var et=e.examType||'academy';
    return'<div style="display:flex;align-items:center;padding:11px 16px;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:7px;background:#fff;">'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:700;">'+e.name+'</div><div style="font-size:10px;color:#64748b;margin-top:2px;">'+e.date+'</div></div>'+
      '<span style="font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;background:'+(et==='school'?'#dbeafe':'#d1fae5')+';color:'+(et==='school'?'#1d4ed8':'#065f46')+';margin-right:10px;">'+(et==='school'?'학교':'학원')+'</span>'+
      '<div style="font-size:18px;font-weight:900;">'+e.score+unit+'</div></div>';
  }).join('');
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"/></head><body style="font-family:sans-serif;background:#eef0f8;padding:32px;width:800px;">'+
    '<div style="background:linear-gradient(135deg,#0a0f1e,#1e2d4a);border-radius:20px;padding:28px;margin-bottom:18px;">'+
      '<div style="font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;">'+st.name+' 학생</div>'+
      '<div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:18px;">'+(st.grade||'')+' · '+S.sel.subj+' · '+(tc?tc.name+' 선생님':'')+'</div>'+
      '<div style="display:flex;gap:10px;">'+
        '<div style="background:rgba(255,255,255,.07);border-radius:12px;padding:13px 20px;"><div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;">최근</div><div style="font-size:22px;font-weight:900;color:#fbbf24;">'+(latest!==null?latest:'—')+unit+'</div></div>'+
        '<div style="background:rgba(255,255,255,.07);border-radius:12px;padding:13px 20px;"><div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;">최고</div><div style="font-size:22px;font-weight:900;color:#34d399;">'+(maxv!==null?maxv:'—')+unit+'</div></div>'+
        '<div style="background:rgba(255,255,255,.07);border-radius:12px;padding:13px 20px;"><div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;">시험 횟수</div><div style="font-size:22px;font-weight:900;color:#60a5fa;">'+vals.length+'회</div></div>'+
      '</div></div>'+
    (chartImg?'<div style="background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;"><div style="font-size:13px;font-weight:700;margin-bottom:14px;">성적 추이</div><img src="'+chartImg+'" style="width:100%;"/></div>':'')+
    '<div style="background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;"><div style="font-size:13px;font-weight:700;margin-bottom:14px;">시험별 성적</div>'+examRows+'</div>'+
    (msg?'<div style="background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;"><div style="font-size:13px;font-weight:700;margin-bottom:14px;">학부모 안내 메시지</div>'+msg+'</div>':'')+
    '<div style="text-align:center;padding:12px;color:#64748b;font-size:10px;">WAWA 코칭센터 · '+(tc?tc.name+' 선생님':'')+' · '+today+'</div>'+
  '</body></html>';
  var iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;left:-9999px;top:0;width:800px;height:100vh;border:none;visibility:hidden;';
  document.body.appendChild(iframe);
  iframe.contentDocument.open();iframe.contentDocument.write(html);iframe.contentDocument.close();
  await new Promise(function(r){setTimeout(r,800);});
  try{
    var iDoc=iframe.contentDocument.body;
    var canvas=await html2canvas(iDoc,{backgroundColor:'#eef0f8',scale:2,useCORS:true,width:800,height:iDoc.scrollHeight});
    var link=document.createElement('a');
    link.download='WAWA_'+st.name+'_'+S.sel.subj+'_'+today.replace(/\./g,'').replace(/ /g,'')+'.png';
    link.href=canvas.toDataURL('image/png');link.click();showToast('✅ 저장됐어요');
  }catch(e){showToast('저장 실패: '+e.message);}
  document.body.removeChild(iframe);
}

// ── INIT (데이터 절대 초기화 안함) ──
renderSidebar();
renderMain();
</script>
</body>
