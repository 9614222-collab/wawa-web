<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WAWA 코칭센터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0f1729;--navy2:#1a2540;--navy3:#253358;
  --gold:#f5a623;--gold2:#ffc45e;
  --accent:#6c63ff;--accent2:#8b84ff;
  --bg:#f0f2f8;--card:#fff;
  --text:#1a1c2e;--muted:#8a8fa8;--border:#e8eaf0;
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* ── LAYOUT ── */
.layout{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative;}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(245,166,35,.3),transparent);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── SIDEBAR ── */
.sb-brand{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo{background:linear-gradient(135deg,#ff6b35,#f5a623);border-radius:10px;padding:10px 12px;text-align:center;margin-bottom:0;}
.sb-logo-title{font-size:16px;font-weight:900;color:#fff;letter-spacing:.05em;}
.sb-logo-sub{font-size:9px;color:rgba(255,255,255,.7);font-weight:400;letter-spacing:.1em;}
.sb-section{padding:12px 16px 4px;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:.12em;text-transform:uppercase;font-weight:600;}
.sb-tree{flex:1;overflow-y:auto;padding:0 8px 8px;}
.sb-tree::-webkit-scrollbar{width:3px;}
.sb-tree::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

/* tree nodes */
.t-teacher{border-radius:8px;margin-bottom:2px;overflow:hidden;}
.t-teacher-row{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;color:rgba(255,255,255,.8);font-size:12px;font-weight:600;transition:background .15s;}
.t-teacher-row:hover{background:rgba(255,255,255,.06);}
.t-teacher-row.open{background:rgba(108,99,255,.15);}
.t-teacher-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.t-chevron{margin-left:auto;transition:transform .2s;font-size:10px;color:rgba(255,255,255,.3);}
.t-chevron.open{transform:rotate(90deg);}
.t-del{background:none;border:none;color:rgba(255,255,255,.15);font-size:13px;padding:2px 4px;margin-left:4px;transition:color .15s;}
.t-del:hover{color:#e74c3c;}

.t-students{padding-left:8px;}
.t-student{border-radius:7px;margin-bottom:1px;overflow:hidden;}
.t-student-row{display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;color:rgba(255,255,255,.6);font-size:11px;transition:background .15s;}
.t-student-row:hover{background:rgba(255,255,255,.05);}
.t-student-row.open{color:#fff;background:rgba(255,255,255,.06);}
.t-student-icon{width:18px;height:18px;border-radius:5px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}

.t-subjects{padding-left:10px;}
.t-subj-row{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;border-radius:6px;color:rgba(255,255,255,.45);font-size:11px;transition:background .15s;}
.t-subj-row:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);}
.t-subj-row.sel{background:linear-gradient(90deg,rgba(108,99,255,.3),rgba(108,99,255,.1));color:#fff;font-weight:600;}
.t-subj-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);flex-shrink:0;}
.t-subj-row.sel .t-subj-dot{background:var(--gold);}
.t-cnt{margin-left:auto;font-size:9px;color:rgba(255,255,255,.25);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:10px;}

.t-add-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;width:100%;border:none;background:none;color:rgba(255,255,255,.25);font-size:11px;border-radius:7px;transition:all .15s;margin-top:2px;}
.t-add-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);}

/* ── HEADER ── */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,.04);}
.h-breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;}
.h-name{font-size:18px;font-weight:700;color:var(--text);}
.h-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.h-tabs{display:flex;gap:6px;}
.h-tab{padding:7px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:500;transition:all .15s;}
.h-tab:hover{border-color:#c5c8d8;color:var(--text);}
.h-tab.on{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(15,23,41,.2);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:24px 28px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── WELCOME ── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);}
.welcome-icon{font-size:48px;opacity:.3;}
.welcome-text{font-size:14px;font-weight:500;}

/* ── CARDS ── */
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px 24px;margin-bottom:18px;box-shadow:0 1px 6px rgba(0,0,0,.03);}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:3px;height:14px;background:linear-gradient(to bottom,var(--accent),var(--gold));border-radius:2px;}

/* score cards */
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.score-card{border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;}
.score-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08);}
.sc-navy{background:linear-gradient(135deg,var(--navy2),var(--navy3));color:#fff;}
.sc-gold{background:linear-gradient(135deg,#f5a623,#ffd06b);color:#fff;}
.sc-green{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;}
.sc-purple{background:linear-gradient(135deg,#6c63ff,#9b93ff);color:#fff;}
.score-card-label{font-size:11px;opacity:.7;margin-bottom:8px;font-weight:500;}
.score-card-val{font-size:32px;font-weight:900;line-height:1;}
.score-card-unit{font-size:13px;opacity:.7;margin-left:4px;font-weight:400;}
.score-card-sub{font-size:11px;opacity:.6;margin-top:6px;}

/* exam list */
.exam-list{display:flex;flex-direction:column;gap:8px;}
.exam-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:10px;border:1px solid var(--border);transition:all .15s;cursor:pointer;}
.exam-item:hover{border-color:#c5c8d8;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.exam-date{font-size:11px;color:var(--muted);width:80px;flex-shrink:0;}
.exam-name{flex:1;font-size:13px;font-weight:600;}
.exam-score{font-size:16px;font-weight:800;color:var(--navy);}
.exam-unit{font-size:11px;color:var(--muted);margin-left:2px;}
.exam-grade{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.exam-bar{height:4px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden;}
.exam-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));}
.exam-actions{display:flex;gap:4px;margin-left:auto;}
.exam-edit-btn,.exam-del-btn{background:none;border:none;padding:4px 6px;border-radius:5px;font-size:11px;color:var(--muted);transition:all .15s;}
.exam-edit-btn:hover{background:#f0f2ff;color:var(--accent);}
.exam-del-btn:hover{background:#fff0f0;color:var(--red);}

/* add exam */
.add-exam-form{background:linear-gradient(135deg,#f8f9ff,#f0f2f8);border:2px dashed var(--border);border-radius:12px;padding:18px 20px;margin-top:10px;}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;color:var(--muted);font-weight:500;}
.form-input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;transition:border .15s;}
.form-input:focus{border-color:var(--accent);}
.form-select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;}
.btn-primary{padding:8px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 2px 8px rgba(108,99,255,.3);transition:all .15s;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,99,255,.4);}
.btn-ghost{padding:8px 14px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:12px;transition:all .15s;}
.btn-ghost:hover{background:var(--bg);}

/* ── REPORT ── */
.report-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);border-radius:16px;padding:28px 28px;margin-bottom:18px;position:relative;overflow:hidden;}
.report-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(108,99,255,.15);}
.report-hero::after{content:'';position:absolute;bottom:-30px;left:60px;width:120px;height:120px;border-radius:50%;background:rgba(245,166,35,.08);}
.rh-tag{display:inline-block;background:rgba(108,99,255,.3);color:var(--accent2);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:600;letter-spacing:.05em;margin-bottom:12px;}
.rh-name{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;}
.rh-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px;}
.rh-scores{display:flex;gap:16px;}
.rh-score-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 20px;backdrop-filter:blur(10px);}
.rhs-label{font-size:10px;color:rgba(255,255,255,.45);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.rhs-val{font-size:28px;font-weight:900;color:#fff;}
.rhs-val.gold{color:var(--gold2);}
.rhs-val.green{color:#55efc4;}

/* graph */
.chart-wrap{position:relative;height:200px;margin:8px 0;}

/* report exam rows */
.re-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;transition:all .15s;}
.re-item:hover{border-color:#c5c8d8;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.re-name{font-size:13px;font-weight:600;}
.re-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.re-score{font-size:18px;font-weight:900;color:var(--navy);margin-left:auto;}
.grade-badge{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.gA{background:#27ae60;} .gB{background:#3498db;} .gC{background:#f39c12;} .gD{background:#e67e22;} .gF{background:#e74c3c;}

/* msg section */
.msg-area{position:relative;}
.msg-auto-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:linear-gradient(135deg,#0f1729,#1a2540);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 2px 10px rgba(15,23,41,.25);transition:all .15s;}
.msg-auto-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,23,41,.35);}
.msg-auto-btn .sparkle{font-size:14px;}
.msg-textarea{width:100%;min-height:140px;padding:14px 16px;border:1px solid var(--border);border-radius:10px;font-size:12px;line-height:1.8;resize:vertical;outline:none;transition:border .15s;background:#fafbff;}
.msg-textarea:focus{border-color:var(--accent);}
.msg-copy-btn{padding:8px 16px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);transition:all .15s;}
.msg-copy-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:16px;padding:28px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.modal-title-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:border .15s;margin-bottom:12px;}
.modal-input:focus{border-color:var(--accent);}
.modal-label{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:5px;}

/* score type toggle */
.type-toggle{display:flex;gap:8px;margin-bottom:12px;}
.type-btn{flex:1;padding:8px;border-radius:8px;border:2px solid var(--border);background:#fff;font-size:12px;font-weight:600;transition:all .15s;color:var(--muted);}
.type-btn.on{border-color:var(--accent);color:var(--accent);background:#f0f2ff;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:500;opacity:0;transition:all .3s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SUBJECT TYPE BADGE ── */
.subj-type-badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;margin-left:4px;}
.badge-score{background:#eef0ff;color:var(--accent);}
.badge-count{background:#fff8e6;color:var(--gold);}

/* loading shimmer */
.shimmer{background:linear-gradient(90deg,#f0f2f8 25%,#e8eaf0 50%,#f0f2f8 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;height:16px;margin-bottom:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <div class="sb-logo-title">WAWA</div>
        <div class="sb-logo-sub">코 칭 센 터</div>
      </div>
    </div>
    <div class="sb-section">강사 관리</div>
    <div class="sb-tree" id="tree"></div>
    <div style="padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);">
      <button class="t-add-btn" onclick="openAddTeacher()">＋ 강사 추가</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="header" id="header">
      <div>
        <div class="h-name" id="h-name">WAWA 코칭센터</div>
        <div class="h-meta" id="h-meta">강사를 선택하고 학생과 과목을 선택하세요</div>
      </div>
      <div class="h-tabs" id="h-tabs" style="display:none;">
        <button class="h-tab on" onclick="setTab('detail')" id="tab-detail">상세</button>
        <button class="h-tab" onclick="setTab('report')" id="tab-report">보고서</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="welcome">
        <div class="welcome-icon">📊</div>
        <div class="welcome-text">왼쪽에서 강사 → 학생 → 과목을 선택하세요</div>
      </div>
    </div>
  </div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
const S = {
  teachers: JSON.parse(localStorage.getItem('wawa_teachers')||'[]'),
  students: JSON.parse(localStorage.getItem('wawa_students')||'[]'),
  exams:    JSON.parse(localStorage.getItem('wawa_exams')||'[]'),
  openT: new Set(),
  openS: new Set(),
  sel: null, // {tid,sid,subj}
  tab: 'detail',
  chartInst: null,
};
let nextId = +localStorage.getItem('wawa_nid')||1;
function nid(){const i=nextId++;localStorage.setItem('wawa_nid',nextId);return i;}
function save(){
  localStorage.setItem('wawa_teachers',JSON.stringify(S.teachers));
  localStorage.setItem('wawa_students',JSON.stringify(S.students));
  localStorage.setItem('wawa_exams',JSON.stringify(S.exams));
}

// ── HELPERS ──
function grade(v,type){
  if(type==='count') return null;
  if(v>=90)return 'A';if(v>=80)return 'B';if(v>=70)return 'C';if(v>=60)return 'D';return 'F';
}
function gradeColor(g){return{A:'#27ae60',B:'#3498db',C:'#f39c12',D:'#e67e22',F:'#e74c3c'}[g]||'#aaa';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function scoreLabel(v,type){return type==='count'?v+'개':v+'점';}

// ── TREE ──
function renderTree(){
  const el = document.getElementById('tree');
  el.innerHTML = '';
  S.teachers.forEach(t=>{
    const open = S.openT.has(t.id);
    const div = document.createElement('div');
    div.className = 't-teacher';
    const studs = S.students.filter(s=>s.tid===t.id);
    div.innerHTML = `
      <div class="t-teacher-row${open?' open':''}" onclick="toggleT(${t.id})">
        <div class="t-teacher-icon">${t.name[0]}</div>
        <span>${t.name}</span>
        <span class="t-chevron${open?' open':''}">▶</span>
        <button class="t-del" onclick="event.stopPropagation();delTeacher(${t.id})">✕</button>
      </div>
      ${open?`<div class="t-students">${studs.map(s=>renderStudent(s)).join('')}
        <button class="t-add-btn" onclick="openAddStudent(${t.id})">＋ 학생 추가</button>
      </div>`:''}
    `;
    el.appendChild(div);
  });
}

function renderStudent(s){
  const open = S.openS.has(s.id);
  const subjs = (s.subjects||[]);
  return `
    <div class="t-student">
      <div class="t-student-row${open?' open':''}" onclick="toggleS(${s.id})">
        <div class="t-student-icon">${s.name[0]}</div>
        <span>${s.name}</span><span style="font-size:10px;color:rgba(255,255,255,.3);margin-left:3px;">${s.grade||''}</span>
        <span class="t-chevron${open?' open':''}">▶</span>
        <button class="t-del" onclick="event.stopPropagation();delStudent(${s.id})">✕</button>
      </div>
      ${open?`<div class="t-subjects">
        ${subjs.map(subj=>{
          const sel = S.sel&&S.sel.sid===s.id&&S.sel.subj===subj.name;
          const cnt = S.exams.filter(e=>e.sid===s.id&&e.subj===subj.name).length;
          const typeBadge = subj.type==='count'?'badge-count':'badge-score';
          const typeLabel = subj.type==='count'?'개수':'점수';
          return `<div class="t-subj-row${sel?' sel':''}" onclick="selectSubj(${s.tid||s.id_},${s.id},'${subj.name}')">
            <div class="t-subj-dot"></div>
            <span>${subj.name}</span>
            <span class="subj-type-badge ${typeBadge}">${typeLabel}</span>
            <span class="t-cnt">${cnt}</span>
            <button class="t-del" onclick="event.stopPropagation();delSubj(${s.id},'${subj.name}')">✕</button>
          </div>`;
        }).join('')}
        <button class="t-add-btn" onclick="openAddSubj(${s.id})">＋ 과목 추가</button>
      </div>`:''}
    </div>`;
}

function toggleT(tid){S.openT.has(tid)?S.openT.delete(tid):S.openT.add(tid);renderTree();}
function toggleS(sid){S.openS.has(sid)?S.openS.delete(sid):S.openS.add(sid);renderTree();}

function selectSubj(tid,sid,subj){
  S.sel={tid,sid,subj};
  S.tab='detail';
  renderTree();
  renderMain();
}

// ── MAIN ──
function renderMain(){
  const tabs = document.getElementById('h-tabs');
  if(!S.sel){
    tabs.style.display='none';
    document.getElementById('h-name').textContent='WAWA 코칭센터';
    document.getElementById('h-meta').textContent='강사를 선택하고 학생과 과목을 선택하세요';
    document.getElementById('content').innerHTML='<div class="welcome"><div class="welcome-icon">📊</div><div class="welcome-text">왼쪽에서 강사 → 학생 → 과목을 선택하세요</div></div>';
    return;
  }
  const st = S.students.find(s=>s.id===S.sel.sid);
  const tc = S.teachers.find(t=>t.id===S.sel.tid);
  const subj = (st.subjects||[]).find(s=>s.name===S.sel.subj)||{name:S.sel.subj,type:'score'};
  tabs.style.display='flex';
  ['detail','report'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('on',S.tab===t);
  });
  document.getElementById('h-name').textContent=st.name+' 학생';
  document.getElementById('h-meta').innerHTML=`${st.grade||''} · <strong>${S.sel.subj}</strong> · ${tc?tc.name+' 선생님':''}`;
  S.tab==='detail'?renderDetail(st,subj):renderReport(st,subj,tc);
}

function setTab(t){S.tab=t;renderMain();}

// ── DETAIL ──
function renderDetail(st,subj){
  const exams = S.exams.filter(e=>e.sid===st.id&&e.subj===subj.name).sort((a,b)=>a.date.localeCompare(b.date));
  const type = subj.type||'score';
  const vals = exams.map(e=>e.score);
  const avg = vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
  const latest = vals.length?vals[vals.length-1]:null;
  const max = vals.length?Math.max(...vals):null;

  let scoreCards='';
  if(type==='score'){
    scoreCards=`
      <div class="score-card sc-gold"><div class="score-card-label">최근 점수</div><div class="score-card-val">${latest??'—'}<span class="score-card-unit">점</span></div><div class="score-card-sub">${exams.length?exams[exams.length-1].name:''}</div></div>
      <div class="score-card sc-green"><div class="score-card-label">최고 점수</div><div class="score-card-val">${max??'—'}<span class="score-card-unit">점</span></div></div>
      <div class="score-card sc-purple"><div class="score-card-label">시험 횟수</div><div class="score-card-val">${vals.length}<span class="score-card-unit">회</span></div></div>`;
  } else {
    scoreCards=`
      <div class="score-card sc-gold"><div class="score-card-label">최근 갯수</div><div class="score-card-val">${latest??'—'}<span class="score-card-unit">개</span></div><div class="score-card-sub">${exams.length?exams[exams.length-1].name:''}</div></div>
      <div class="score-card sc-green"><div class="score-card-label">최고 갯수</div><div class="score-card-val">${max??'—'}<span class="score-card-unit">개</span></div></div>
      <div class="score-card sc-purple"><div class="score-card-label">시험 횟수</div><div class="score-card-val">${vals.length}<span class="score-card-unit">회</span></div></div>`;
  }

  const examRows = [...exams].reverse().map(e=>{
    const g = type==='score'?grade(e.score,type):null;
    const gClass = g?'g'+g:'';
    const pct = type==='score'?e.score:Math.min(100,e.score);
    return `<div class="exam-item">
      <div class="exam-date">${e.date}</div>
      <div style="flex:1"><div class="exam-name">${e.name}</div><div class="exam-bar"><div class="exam-bar-fill" style="width:${pct}%"></div></div></div>
      <div class="exam-score">${e.score}<span class="exam-unit">${type==='count'?'개':'점'}</span></div>
      ${g?`<div class="grade-badge ${gClass}">${g}</div>`:''}
      <div class="exam-actions">
        <button class="exam-edit-btn" onclick="openEditExam(${e.id})">✏️</button>
        <button class="exam-del-btn" onclick="delExam(${e.id})">🗑</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="score-grid">${scoreCards}</div>
    <div class="card">
      <div class="card-title">시험 기록</div>
      ${examRows||'<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px;">아직 시험 기록이 없어요</div>'}
      <div class="add-exam-form" style="margin-top:14px;">
        <div class="form-row">
          <div class="form-group"><div class="form-label">시험명</div><input class="form-input" id="ei-name" placeholder="예: 4월 단원평가" style="width:160px;"/></div>
          <div class="form-group"><div class="form-label">날짜</div><input class="form-input" id="ei-date" type="date" value="${new Date().toISOString().slice(0,10)}" style="width:140px;"/></div>
          <div class="form-group"><div class="form-label">${type==='count'?'갯수':'점수'}</div><input class="form-input" id="ei-score" type="number" placeholder="${type==='count'?'예: 23':'예: 85'}" min="0" max="${type==='count'?'999':'100'}" style="width:90px;"/></div>
          <div class="form-group" style="justify-content:flex-end;"><button class="btn-primary" onclick="addExam()">추가</button></div>
        </div>
      </div>
    </div>`;
}

// ── REPORT ──
function renderReport(st,subj,tc){
  const exams = S.exams.filter(e=>e.sid===st.id&&e.subj===subj.name).sort((a,b)=>a.date.localeCompare(b.date));
  const type = subj.type||'score';
  const vals = exams.map(e=>e.score);
  const avg = vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
  const latest = vals.length?vals[vals.length-1]:null;
  const unit = type==='count'?'개':'점';

  const examRows=[...exams].reverse().map(e=>{
    const g=type==='score'?grade(e.score,type):null;
    return `<div class="re-item">
      <div style="flex:1"><div class="re-name">${e.name}</div><div class="re-meta">${e.date} · ${subj.name}</div></div>
      <div class="re-score">${e.score}${unit}</div>
      ${g?`<div class="grade-badge g${g}">${g}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="report-hero">
      <div class="rh-tag">📊 학습 성과 리포트</div>
      <div class="rh-name">${st.name} 학생</div>
      <div class="rh-sub">${st.grade||''} · ${subj.name} · ${tc?tc.name+' 선생님':''}</div>
      <div class="rh-scores">
        <div class="rh-score-box"><div class="rhs-label">평균 ${unit==='개'?'갯수':'점수'}</div><div class="rhs-val gold">${avg??'—'}${unit}</div></div>
        <div class="rh-score-box"><div class="rhs-label">최근 ${unit==='개'?'갯수':'점수'}</div><div class="rhs-val green">${latest??'—'}${unit}</div></div>
        <div class="rh-score-box"><div class="rhs-label">시험 횟수</div><div class="rhs-val">${vals.length}회</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">성적 추이 그래프</div>
      ${exams.length<2?'<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px;">시험 기록이 2개 이상이면 그래프가 표시됩니다</div>':'<div class="chart-wrap"><canvas id="score-chart"></canvas></div>'}
    </div>

    <div class="card">
      <div class="card-title">시험별 성적</div>
      ${examRows||'<div style="text-align:center;color:var(--muted);padding:30px;">시험 기록이 없습니다</div>'}
    </div>

    <div class="card">
      <div class="card-title">학부모 안내 메시지</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:12px;color:var(--muted);">아래 내용을 학부모님께 전달하세요</span>
        <div style="display:flex;gap:8px;">
          <button class="msg-auto-btn" onclick="autoMsg()"><span class="sparkle">✦</span> AI 자동 생성</button>
          <button class="msg-copy-btn" onclick="copyMsg()">복사</button>
        </div>
      </div>
      <textarea class="msg-textarea" id="msg-area" placeholder="메모를 입력하거나 AI 자동 생성 버튼을 눌러보세요..."></textarea>
    </div>

    <div style="text-align:center;padding:10px;color:var(--muted);font-size:11px;">
      WAWA 코칭센터 · ${tc?tc.name+' 선생님':'담당 선생님'} · ${new Date().toLocaleDateString('ko-KR')} 발행
    </div>`;

  if(exams.length>=2) drawChart(exams,type);
}

function drawChart(exams,type){
  if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
  const ctx=document.getElementById('score-chart');
  if(!ctx)return;
  const unit=type==='count'?'개':'점';
  const avg=Math.round(exams.reduce((a,e)=>a+e.score,0)/exams.length);
  S.chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:exams.map(e=>e.name),
      datasets:[
        {label:'성적',data:exams.map(e=>e.score),borderColor:'#6c63ff',backgroundColor:'rgba(108,99,255,.1)',borderWidth:2.5,pointBackgroundColor:'#6c63ff',pointRadius:5,pointHoverRadius:7,tension:.35,fill:true},
        {label:'평균',data:exams.map(()=>avg),borderColor:'#f5a623',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false,tension:0}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+unit}}},
      scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,.05)'},ticks:{callback:v=>v+unit,font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}
    }
  });
}

// ── EXAM CRUD ──
function addExam(){
  const name=document.getElementById('ei-name').value.trim();
  const date=document.getElementById('ei-date').value;
  const score=+document.getElementById('ei-score').value;
  if(!name||!date||isNaN(score)||score<0){toast('모든 항목을 입력해주세요');return;}
  S.exams.push({id:nid(),sid:S.sel.sid,subj:S.sel.subj,name,date,score});
  save();renderMain();toast('✅ 추가됐어요');
}

function openEditExam(id){
  const e=S.exams.find(x=>x.id===id);
  if(!e)return;
  const st=S.students.find(s=>s.id===e.sid);
  const subj=(st.subjects||[]).find(s=>s.name===e.subj)||{type:'score'};
  const type=subj.type||'score';
  showModal(`
    <div class="modal-title"><div class="modal-title-icon">✏️</div>시험 수정</div>
    <div class="modal-label">시험명</div>
    <input class="modal-input" id="me-name" value="${e.name}"/>
    <div class="modal-label">날짜</div>
    <input class="modal-input" id="me-date" type="date" value="${e.date}"/>
    <div class="modal-label">${type==='count'?'갯수':'점수'}</div>
    <input class="modal-input" id="me-score" type="number" value="${e.score}" min="0"/>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveEditExam(${id})">저장</button>
    </div>`);
}

function saveEditExam(id){
  const e=S.exams.find(x=>x.id===id);
  e.name=document.getElementById('me-name').value.trim();
  e.date=document.getElementById('me-date').value;
  e.score=+document.getElementById('me-score').value;
  save();closeModal();renderMain();toast('✅ 수정됐어요');
}

function delExam(id){
  if(!confirm('삭제할까요?'))return;
  S.exams=S.exams.filter(e=>e.id!==id);
  save();renderMain();toast('🗑 삭제됐어요');
}

// ── TEACHER CRUD ──
function openAddTeacher(){
  showModal(`
    <div class="modal-title"><div class="modal-title-icon">👤</div>강사 추가</div>
    <div class="modal-label">강사 이름</div>
    <input class="modal-input" id="tn" placeholder="예: 김선생"/>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="addTeacher()">추가</button>
    </div>`);
}
function addTeacher(){
  const name=document.getElementById('tn').value.trim();
  if(!name)return;
  S.teachers.push({id:nid(),name});save();closeModal();renderTree();toast('✅ '+name+' 선생님 추가');
}
function delTeacher(id){
  if(!confirm('강사와 모든 학생 데이터가 삭제됩니다'))return;
  S.teachers=S.teachers.filter(t=>t.id!==id);
  const sids=S.students.filter(s=>s.tid===id).map(s=>s.id);
  S.students=S.students.filter(s=>s.tid!==id);
  S.exams=S.exams.filter(e=>!sids.includes(e.sid));
  if(S.sel&&sids.includes(S.sel.sid))S.sel=null;
  save();renderTree();renderMain();
}

// ── STUDENT CRUD ──
function openAddStudent(tid){
  showModal(`
    <div class="modal-title"><div class="modal-title-icon">🎓</div>학생 추가</div>
    <div class="modal-label">학생 이름</div>
    <input class="modal-input" id="sn" placeholder="예: 홍길동"/>
    <div class="modal-label">학년</div>
    <input class="modal-input" id="sg" placeholder="예: 중2"/>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="addStudent(${tid})">추가</button>
    </div>`);
}
function addStudent(tid){
  const name=document.getElementById('sn').value.trim();
  const gr=document.getElementById('sg').value.trim();
  if(!name)return;
  S.students.push({id:nid(),tid,name,grade:gr,subjects:[]});
  save();closeModal();S.openS.add(S.students[S.students.length-1].id);S.openT.add(tid);renderTree();toast('✅ '+name+' 추가');
}
function delStudent(id){
  if(!confirm('학생과 모든 시험 데이터가 삭제됩니다'))return;
  S.students=S.students.filter(s=>s.id!==id);
  S.exams=S.exams.filter(e=>e.sid!==id);
  if(S.sel&&S.sel.sid===id)S.sel=null;
  save();renderTree();renderMain();
}

// ── SUBJECT CRUD ──
function openAddSubj(sid){
  showModal(`
    <div class="modal-title"><div class="modal-title-icon">📚</div>과목 추가</div>
    <div class="modal-label">과목명</div>
    <input class="modal-input" id="subjn" placeholder="예: 수학, 영어"/>
    <div class="modal-label">점수 유형</div>
    <div class="type-toggle">
      <button class="type-btn on" id="tb-score" onclick="selType('score')">📊 점수 (0~100점)</button>
      <button class="type-btn" id="tb-count" onclick="selType('count')">🔢 갯수 (개수)</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">
      · 점수: 수학처럼 100점 만점 시험<br>· 갯수: 영어 단어처럼 맞힌 개수
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="addSubj(${sid})">추가</button>
    </div>`);
  document.getElementById('tb-score')._type='score';
  document.getElementById('tb-count')._type='count';
  window._selSubjType='score';
}
function selType(t){
  window._selSubjType=t;
  document.getElementById('tb-score').classList.toggle('on',t==='score');
  document.getElementById('tb-count').classList.toggle('on',t==='count');
}
function addSubj(sid){
  const name=document.getElementById('subjn').value.trim();
  if(!name)return;
  const st=S.students.find(s=>s.id===sid);
  if(!st.subjects)st.subjects=[];
  if(st.subjects.find(s=>s.name===name)){toast('이미 있는 과목이에요');return;}
  st.subjects.push({name,type:window._selSubjType||'score'});
  save();closeModal();S.openS.add(sid);renderTree();toast('✅ '+name+' 과목 추가');
}
function delSubj(sid,subj){
  if(!confirm(subj+' 과목과 모든 시험 데이터가 삭제됩니다'))return;
  const st=S.students.find(s=>s.id===sid);
  st.subjects=st.subjects.filter(s=>s.name!==subj);
  S.exams=S.exams.filter(e=>!(e.sid===sid&&e.subj===subj));
  if(S.sel&&S.sel.sid===sid&&S.sel.subj===subj)S.sel=null;
  save();renderTree();renderMain();
}

// ── MSG ──
async function autoMsg(){
  const st=S.students.find(s=>s.id===S.sel.sid);
  const tc=S.teachers.find(t=>t.id===S.sel.tid);
  const subj=(st.subjects||[]).find(s=>s.name===S.sel.subj)||{type:'score'};
  const exams=S.exams.filter(e=>e.sid===st.id&&e.subj===S.sel.subj).sort((a,b)=>a.date.localeCompare(b.date));
  const type=subj.type||'score';
  const unit=type==='count'?'개':'점';
  const vals=exams.map(e=>e.score);
  const avg=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
  const latest=vals.length?vals[vals.length-1]:null;
  const area=document.getElementById('msg-area');
  if(!area)return;
  area.value='✦ 생성 중...';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:500,
        messages:[{role:'user',content:`학원 학부모 안내 문자를 작성해줘.
학생: ${st.name} (${st.grade||''})
과목: ${S.sel.subj}
담당강사: ${tc?tc.name:''}
시험 횟수: ${exams.length}회
평균: ${avg??'없음'}${unit}
최근 성적: ${latest??'없음'}${unit}
유형: ${type==='count'?'갯수(단어시험 등)':'점수(시험)'}
짧고 따뜻하게, 2~3문단, 이모지 포함, 강사이름으로 끝맺음`}]
      })
    });
    const d=await res.json();
    area.value=d.content?.[0]?.text||'생성 실패';
  }catch(e){area.value='생성 실패: '+e.message;}
}

function copyMsg(){
  const a=document.getElementById('msg-area');
  if(!a||!a.value)return;
  navigator.clipboard.writeText(a.value).then(()=>toast('📋 복사됐어요'));
}

// ── MODAL ──
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ── INIT ──
renderTree();
renderMain();
</script>
</body>
</html>
