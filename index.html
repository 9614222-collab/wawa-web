<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WAWA 코칭센터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a0f1e;--navy2:#111827;--navy3:#1e2d4a;
  --gold:#f59e0b;--gold2:#fbbf24;
  --accent:#7c3aed;--accent2:#a78bfa;
  --bg:#eef0f8;--card:#fff;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --green:#059669;--red:#dc2626;--blue:#2563eb;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}
.layout{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:250px;background:linear-gradient(180deg,#0a0f1e,#111827 60%,#1a2340);display:flex;flex-direction:column;flex-shrink:0;box-shadow:4px 0 24px rgba(0,0,0,.3);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* SIDEBAR */
.sb-brand{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0a0f1e;flex-shrink:0;}
.sb-logo-title{font-size:15px;font-weight:800;color:#fff;}
.sb-logo-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.12em;}
.sb-stats{display:flex;gap:6px;padding:10px 12px 4px;}
.sb-stat-box{flex:1;background:rgba(255,255,255,.06);border-radius:10px;padding:8px 6px;text-align:center;}
.sb-stat-num{font-size:18px;font-weight:900;color:#fff;}
.sb-stat-num.green{color:#34d399;}
.sb-stat-num.red{color:#fca5a5;}
.sb-stat-num.gold{color:#fbbf24;}
.sb-stat-label{font-size:9px;color:rgba(255,255,255,.3);margin-top:2px;}
.sb-tabs{display:flex;gap:4px;padding:8px 12px 0;}
.sb-tab{flex:1;padding:7px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.sb-tab-active{background:rgba(52,211,153,.15);color:rgba(52,211,153,.6);}
.sb-tab-active.on{background:rgba(52,211,153,.3);color:#34d399;border:1px solid rgba(52,211,153,.4);}
.sb-tab-paused{background:rgba(239,68,68,.1);color:rgba(239,68,68,.5);}
.sb-tab-paused.on{background:rgba(239,68,68,.25);color:#fca5a5;border:1px solid rgba(239,68,68,.35);}
.sb-filter{padding:8px 12px 0;}
.sb-filter-label{font-size:9px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.sb-select{width:100%;padding:7px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:12px;outline:none;cursor:pointer;}
.sb-select option{background:#1a2340;color:#fff;}
.sb-subj-wrap{padding:6px 12px 0;}
.sb-subj-btns{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.sb-subj-btn{padding:3px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-subj-btn.on{background:#f59e0b;border-color:#f59e0b;color:#0a0f1e;}
.sb-sort{display:flex;gap:5px;padding:8px 12px 4px;}
.sb-sort-btn{flex:1;padding:5px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-sort-btn.on{background:rgba(255,255,255,.12);color:#fff;}
.sb-count{padding:4px 14px;font-size:11px;color:rgba(255,255,255,.3);}
.sb-list{flex:1;overflow-y:auto;padding:2px 10px 4px;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}
.sb-item{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:3px;border:1px solid transparent;}
.sb-item:hover{background:rgba(255,255,255,.05);}
.sb-item.sel{background:rgba(124,58,237,.25);border-color:rgba(124,58,237,.3);}
.sb-item.paused-item{border-color:rgba(239,68,68,.15);}
.sb-item.paused-item.sel{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.35);}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.sb-dot.active{background:#34d399;}
.sb-dot.paused{background:#ef4444;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);}
.sb-meta{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.sb-pause-info{margin-top:4px;padding:4px 8px;background:rgba(239,68,68,.12);border-radius:6px;border-left:2px solid rgba(239,68,68,.4);}
.sb-pause-date{font-size:10px;color:#fca5a5;font-weight:600;}
.sb-pause-reason{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-pause-return{font-size:10px;color:#fbbf24;margin-top:1px;}
.sb-avg{font-size:12px;font-weight:700;color:rgba(255,255,255,.5);white-space:nowrap;}
.sb-more{background:none;border:none;color:rgba(255,255,255,.2);font-size:13px;padding:2px 5px;border-radius:4px;transition:all .15s;}
.sb-more:hover{background:rgba(255,255,255,.08);color:#fff;}
.sb-bottom{padding:10px 12px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:6px;}
.sb-add-btn{flex:1;padding:7px;border-radius:8px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-add-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.sb-pause-btn{padding:7px 10px;border-radius:8px;border:none;background:rgba(239,68,68,.15);color:#fca5a5;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.sb-pause-btn:hover{background:rgba(239,68,68,.25);}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:64px;box-shadow:0 2px 12px rgba(124,58,237,.06);}
.h-name{font-size:17px;font-weight:800;}
.h-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.h-right{display:flex;align-items:center;gap:8px;}
.h-tabs{display:flex;gap:3px;background:#ede9fe;padding:3px;border-radius:10px;}
.h-tab{padding:6px 18px;border-radius:7px;border:none;background:transparent;color:#7c3aed;font-size:12px;font-weight:600;opacity:.6;cursor:pointer;transition:all .15s;}
.h-tab.on{background:#fff;color:#5b21b6;box-shadow:0 1px 6px rgba(124,58,237,.15);opacity:1;}
.btn-save{display:flex;align-items:center;gap:5px;padding:8px 14px;background:linear-gradient(135deg,#0a0f1e,#1e2d4a);color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-overview{display:flex;align-items:center;gap:5px;padding:8px 14px;background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:28px 0;background:var(--bg);}
.ci{max-width:900px;margin:0 auto;padding:0 28px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:#d4d8e8;border-radius:3px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;}
.welcome-icon{font-size:52px;opacity:.12;}
.welcome-text{font-size:14px;font-weight:500;color:var(--muted);}

/* CARDS */
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.score-card{border-radius:16px;padding:22px;position:relative;overflow:hidden;color:#fff;}
.sc-1{background:linear-gradient(135deg,#1d4ed8,#3b82f6);}
.sc-2{background:linear-gradient(135deg,#b45309,#f59e0b);}
.sc-3{background:linear-gradient(135deg,#6d28d9,#a78bfa);}
.score-card::before{content:'';position:absolute;top:-28px;right:-28px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07);}
.sc-label{font-size:10px;opacity:.68;margin-bottom:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.sc-val{font-size:34px;font-weight:900;line-height:1;}
.sc-unit{font-size:14px;opacity:.6;margin-left:3px;font-weight:500;}
.sc-sub{font-size:10px;opacity:.42;margin-top:7px;}
.card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.card-title{font-size:13px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:3px;height:15px;background:linear-gradient(to bottom,#7c3aed,#f59e0b);border-radius:2px;flex-shrink:0;}

/* PAUSE BANNER */
.pause-banner{background:linear-gradient(135deg,#1c0a0a,#2d1515);border:1px solid rgba(239,68,68,.3);border-radius:16px;padding:22px 28px;margin-bottom:16px;display:flex;align-items:center;gap:20px;}
.pb-icon{font-size:36px;flex-shrink:0;}
.pb-info{flex:1;}
.pb-title{font-size:16px;font-weight:800;color:#fca5a5;margin-bottom:4px;}
.pb-meta{font-size:12px;color:rgba(255,255,255,.4);}
.pb-reason{font-size:13px;color:rgba(255,255,255,.6);margin-top:6px;padding:8px 12px;background:rgba(255,255,255,.05);border-radius:8px;}
.pb-return{font-size:12px;color:#fbbf24;margin-top:6px;font-weight:600;}
.pb-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.btn-resume{padding:10px 20px;background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-edit-pause{padding:8px 16px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;}

/* HISTORY */
.history-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;}
.hi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hi-paused{background:#fee2e2;}
.hi-resumed{background:#d1fae5;}
.hi-info{flex:1;}
.hi-title{font-size:13px;font-weight:700;}
.hi-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.hi-reason{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;}

/* EXAM */
.exam-filter{display:flex;gap:6px;margin-bottom:14px;}
.ef-btn{padding:5px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.ef-btn.on{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.ef-btn.school.on{background:#2563eb;border-color:#2563eb;}
.ef-btn.academy.on{background:#059669;border-color:#059669;}
.exam-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;transition:all .2s;}
.exam-item:hover{border-color:#c4b5fd;box-shadow:0 3px 12px rgba(124,58,237,.09);}
.exam-date{font-size:10px;color:var(--muted);width:76px;flex-shrink:0;}
.exam-bar{height:4px;border-radius:2px;background:#f1f5f9;margin-top:5px;overflow:hidden;}
.exam-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7c3aed,#f59e0b);}
.exam-type-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0;}
.etb-school{background:#dbeafe;color:#1d4ed8;}
.etb-academy{background:#d1fae5;color:#065f46;}
.exam-score{font-size:18px;font-weight:800;}
.exam-unit{font-size:10px;color:var(--muted);margin-left:1px;}
.grade-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.gA{background:#059669;}.gB{background:#2563eb;}.gC{background:#d97706;}.gD{background:#ea580c;}.gF{background:#dc2626;}
.exam-actions{display:flex;gap:3px;}
.exam-edit-btn,.exam-del-btn{background:none;border:none;padding:5px 7px;border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;}
.exam-edit-btn:hover{background:#ede9fe;color:#7c3aed;}
.exam-del-btn:hover{background:#fee2e2;color:#dc2626;}
.add-form{background:linear-gradient(135deg,#f8f9ff,#f0f2fc);border:2px dashed #c4b5fd;border-radius:12px;padding:16px 18px;margin-top:12px;}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.form-input{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;transition:border .15s;color:var(--text);}
.form-input:focus{border-color:#7c3aed;}
.form-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;color:var(--text);}
.btn-primary{padding:8px 20px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 10px rgba(124,58,237,.3);}
.btn-ghost{padding:8px 14px;background:#fff;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-ghost:hover{border-color:#7c3aed;color:#7c3aed;}
.btn-danger{padding:8px 14px;background:#fff;color:#dc2626;border:1.5px solid #fca5a5;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}

/* REPORT */
.report-hero{background:linear-gradient(135deg,#0a0f1e,#1e2d4a,#2d1b69);border-radius:20px;padding:28px;margin-bottom:18px;position:relative;overflow:hidden;}
.rh-g1{position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.3),transparent 70%);pointer-events:none;}
.rh-g2{position:absolute;bottom:-50px;left:20px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.15),transparent 70%);pointer-events:none;}
.rh-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.rh-logo{display:flex;align-items:center;gap:9px;}
.rh-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#0a0f1e;}
.rh-logo-t1{font-size:13px;font-weight:800;color:#fff;}
.rh-logo-t2{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.1em;}
.rh-badge{background:rgba(124,58,237,.28);color:#a78bfa;border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;}
.rh-date{font-size:10px;color:rgba(255,255,255,.22);}
.rh-name{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;}
.rh-sub{font-size:12px;color:rgba(255,255,255,.38);margin-bottom:20px;}
.rh-scores{display:flex;gap:10px;flex-wrap:wrap;}
.rh-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:13px 20px;}
.rh-box-label{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.rh-box-val{font-size:23px;font-weight:900;color:#fff;}
.rh-box-val.gold{color:#fbbf24;}
.rh-box-val.green{color:#34d399;}
.rh-box-val.blue{color:#60a5fa;}
.chart-wrap{height:220px;margin:4px 0;}
.re-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;}
.re-name{font-size:13px;font-weight:700;}
.re-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.re-score{font-size:19px;font-weight:900;margin-left:auto;}
.msg-auto-btn{display:flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(124,58,237,.35);}
.msg-textarea{width:100%;min-height:160px;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:12px;line-height:1.9;resize:vertical;outline:none;background:#fafbff;color:var(--text);}
.msg-textarea:focus{border-color:#7c3aed;}
.msg-copy-btn{padding:8px 14px;background:#fff;border:1.5px solid var(--border);border-radius:9px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;}
.msg-copy-btn:hover{border-color:#7c3aed;color:#7c3aed;}
.report-footer{text-align:center;padding:14px;color:var(--muted);font-size:10px;font-weight:500;letter-spacing:.05em;}

/* PAUSE OVERVIEW */
.pause-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.pause-stat-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:18px;text-align:center;}
.psc-num{font-size:28px;font-weight:900;margin-bottom:4px;}
.psc-label{font-size:11px;color:var(--muted);font-weight:500;}
.paused-table-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:12px;border:1px solid rgba(239,68,68,.2);margin-bottom:8px;background:linear-gradient(135deg,#fff,#fff5f5);}
.pti-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:blink 1.5s ease-in-out infinite;}
.pti-info{flex:1;}
.pti-name{font-size:14px;font-weight:700;}
.pti-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.pti-reason{display:inline-block;margin-top:5px;padding:3px 10px;background:#fee2e2;color:#dc2626;border-radius:6px;font-size:11px;font-weight:600;}
.pti-return{display:inline-block;margin-top:5px;margin-left:6px;padding:3px 10px;background:#fef3c7;color:#d97706;border-radius:6px;font-size:11px;font-weight:600;}
.pti-days{font-size:22px;font-weight:900;color:#ef4444;white-space:nowrap;}
.pti-days-label{font-size:10px;color:var(--muted);text-align:center;}
.btn-resume-sm{padding:7px 14px;background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}

/* OVERVIEW */
.ov-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ov-filter-group{display:flex;gap:3px;background:#f1f5f9;padding:3px;border-radius:10px;}
.ov-btn{padding:5px 13px;border-radius:7px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.ov-btn.on{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ov-table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04);}
.ov-table th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);background:#f8f9fc;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;}
.ov-table th:hover{color:var(--accent);}
.ov-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.ov-table tr:last-child td{border-bottom:none;}
.ov-table tr:hover td{background:#fafbff;}
.ov-subj-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#ede9fe;color:#5b21b6;}
.ov-score{font-size:14px;font-weight:800;color:var(--navy);}
.ov-score-sub{font-size:10px;color:var(--muted);margin-left:3px;}
.ov-grade{width:27px;height:27px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.th-school{background:linear-gradient(90deg,#eff6ff,#f8f9fc)!important;}
.ov-edit-btn{padding:4px 10px;border:1.5px solid var(--border);border-radius:7px;background:#fff;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;}
.ov-edit-btn:hover{border-color:#7c3aed;color:#7c3aed;}
.ov-empty{text-align:center;padding:48px;color:var(--muted);font-size:13px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:20px;padding:28px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.modal-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;font-size:14px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;margin-bottom:12px;color:var(--text);}
.modal-input:focus{border-color:#7c3aed;}
.modal-label{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-btn{flex:1;padding:9px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);}
.type-btn.on{border-color:#7c3aed;color:#7c3aed;background:#ede9fe;}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(12px);background:#111827;color:#fff;padding:11px 22px;border-radius:12px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo-icon">W</div>
      <div><div class="sb-logo-title">WAWA</div><div class="sb-logo-sub">코 칭 센 터</div></div>
    </div>
    <div class="sb-stats" id="sb-stats-box"></div>
    <div class="sb-tabs">
      <button class="sb-tab sb-tab-active on" id="sb-tab-active" onclick="setSbTab('active')">✅ 재원</button>
      <button class="sb-tab sb-tab-paused" id="sb-tab-paused" onclick="setSbTab('paused')">⏸ 휴회</button>
    </div>
    <div class="sb-filter">
      <div class="sb-filter-label">선생님</div>
      <select class="sb-select" id="sb-teacher-sel" onchange="SB.teacherF=this.value;renderSidebar()">
        <option value="all">전체 선생님</option>
      </select>
    </div>
    <div class="sb-subj-wrap">
      <div class="sb-filter-label">과목</div>
      <div class="sb-subj-btns" id="sb-subj-btns"></div>
    </div>
    <div class="sb-sort">
      <button class="sb-sort-btn on" id="sb-sort-grade" onclick="setSbSort('grade')">학년순</button>
      <button class="sb-sort-btn" id="sb-sort-name" onclick="setSbSort('name')">이름순</button>
      <button class="sb-sort-btn" id="sb-sort-date" onclick="setSbSort('date')">날짜순</button>
    </div>
    <div class="sb-count" id="sb-count"></div>
    <div class="sb-list" id="sb-list"></div>
    <div class="sb-bottom">
      <button class="sb-add-btn" onclick="openAddStudent()">＋ 학생</button>
      <button class="sb-add-btn" onclick="openAddTeacher()">＋ 강사</button>
      <button class="sb-pause-btn" onclick="showPausedOverview()">휴회 현황</button>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <div>
        <div class="h-name" id="h-name">WAWA 코칭센터</div>
        <div class="h-meta" id="h-meta">강사 → 학생 → 과목을 선택하세요</div>
      </div>
      <div class="h-right">
        <div class="h-tabs" id="h-tabs" style="display:none;">
          <button class="h-tab on" id="tab-detail" onclick="setTab('detail')">상세</button>
          <button class="h-tab" id="tab-report" onclick="setTab('report')">보고서</button>
        </div>
        <button class="btn-save" id="save-btn" style="display:none;" onclick="saveReportImage()">📥 저장</button>
        <button class="btn-overview" onclick="showOverview()">👥 전체 현황</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="welcome"><div class="welcome-icon">📊</div><div class="welcome-text">왼쪽에서 학생과 과목을 선택하세요</div></div>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
var S = {
  teachers: JSON.parse(localStorage.getItem('wawa_teachers') || '[]'),
  students: JSON.parse(localStorage.getItem('wawa_students') || '[]'),
  exams: JSON.parse(localStorage.getItem('wawa_exams') || '[]'),
  pauseHistory: JSON.parse(localStorage.getItem('wawa_pause_history') || '[]'),
  sel: null, tab: 'detail', chartInst: null, examFilter: 'all', sbTab: 'active'
};
var SB = {teacherF: 'all', subjF: 'all', sort: 'grade'};
var OV = {gradeF: 'all', subjF: 'all', sort: {key: 'grade', dir: 1}};
var nextId = parseInt(localStorage.getItem('wawa_nid') || '1', 10);

function nid() { var i = nextId++; localStorage.setItem('wawa_nid', nextId); return i; }

function save() {
  localStorage.setItem('wawa_teachers', JSON.stringify(S.teachers));
  localStorage.setItem('wawa_students', JSON.stringify(S.students));
  localStorage.setItem('wawa_exams', JSON.stringify(S.exams));
  localStorage.setItem('wawa_pause_history', JSON.stringify(S.pauseHistory));
}

function gradeScore(v) {
  if (v >= 90) return 'A';
  if (v >= 80) return 'B';
  if (v >= 70) return 'C';
  if (v >= 60) return 'D';
  return 'F';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2300);
}

function showModal(html) {
  document.getElementById('modal-root').innerHTML = '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">' + html + '</div></div>';
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

var GRADE_ORDER = ['초1','초2','초3','초4','초5','초6','중1','중2','중3','고1','고2','고3'];
function gradeOrder(g) { var i = GRADE_ORDER.indexOf(g); return i >= 0 ? i : 99; }

function pauseDays(d) {
  if (!d) return 0;
  return Math.floor((new Date() - new Date(d)) / 86400000);
}

function daysUntilReturn(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}

// ── 통계 ──
function renderSbStats() {
  var pairs = S.students.flatMap(function(st) { return (st.subjects || []).map(function(s) { return {st: st, s: s}; }); });
  var active = pairs.filter(function(p) { return !p.s.paused; }).length;
  var paused = pairs.filter(function(p) { return p.s.paused; }).length;
  document.getElementById('sb-stats-box').innerHTML =
    '<div class="sb-stat-box"><div class="sb-stat-num green">' + active + '</div><div class="sb-stat-label">재원</div></div>' +
    '<div class="sb-stat-box"><div class="sb-stat-num red">' + paused + '</div><div class="sb-stat-label">휴회</div></div>' +
    '<div class="sb-stat-box"><div class="sb-stat-num gold">' + S.students.length + '</div><div class="sb-stat-label">학생</div></div>';
}

// ── SIDEBAR ──
function setSbTab(t) {
  S.sbTab = t;
  document.getElementById('sb-tab-active').classList.toggle('on', t === 'active');
  document.getElementById('sb-tab-paused').classList.toggle('on', t === 'paused');
  renderSidebar();
}

function setSbSort(s) {
  SB.sort = s;
  ['grade','name','date'].forEach(function(k) {
    var el = document.getElementById('sb-sort-' + k);
    if (el) el.classList.toggle('on', k === s);
  });
  renderSidebar();
}

function renderSidebar() {
  renderSbStats();

  var sel = document.getElementById('sb-teacher-sel');
  var prev = SB.teacherF;
  sel.innerHTML = '<option value="all">전체 선생님</option>' +
    S.teachers.map(function(t) {
      return '<option value="' + t.id + '"' + (String(t.id) === String(prev) ? ' selected' : '') + '>' + t.name + ' 선생님</option>';
    }).join('');

  var allSubjs = [];
  S.students.forEach(function(st) {
    (st.subjects || []).forEach(function(s) {
      if (allSubjs.indexOf(s.name) < 0) allSubjs.push(s.name);
    });
  });

  document.getElementById('sb-subj-btns').innerHTML =
    '<button class="sb-subj-btn' + (SB.subjF === 'all' ? ' on' : '') + '" onclick="SB.subjF=\'all\';renderSidebar()">전체</button>' +
    allSubjs.map(function(s) {
      return '<button class="sb-subj-btn' + (SB.subjF === s ? ' on' : '') + '" onclick="SB.subjF=\'' + s + '\';renderSidebar()">' + s + '</button>';
    }).join('');

  var items = [];
  S.students.forEach(function(st) {
    (st.subjects || []).forEach(function(subj) {
      var isPaused = !!subj.paused;
      if (S.sbTab === 'paused' && !isPaused) return;
      if (S.sbTab === 'active' && isPaused) return;
      if (SB.teacherF !== 'all' && String(st.tid) !== String(SB.teacherF)) return;
      if (SB.subjF !== 'all' && subj.name !== SB.subjF) return;
      var exams = S.exams.filter(function(e) {
        return e.sid === st.id && e.subj === subj.name && (e.examType || 'academy') === 'academy';
      });
      var avg = exams.length ? Math.round(exams.reduce(function(a, e) { return a + e.score; }, 0) / exams.length * 10) / 10 : null;
      items.push({st: st, subj: subj, avg: avg, isPaused: isPaused});
    });
  });

  items.sort(function(a, b) {
    if (SB.sort === 'name') return a.st.name.localeCompare(b.st.name);
    if (SB.sort === 'date' && S.sbTab === 'paused') {
      var da = a.subj.pauseDate || '';
      var db = b.subj.pauseDate || '';
      return db.localeCompare(da);
    }
    return gradeOrder(a.st.grade || '') - gradeOrder(b.st.grade || '');
  });

  document.getElementById('sb-count').textContent = (S.sbTab === 'paused' ? '휴회' : '재원') + ' (' + items.length + '명)';

  document.getElementById('sb-list').innerHTML = items.map(function(it) {
    var isSel = S.sel && S.sel.sid === it.st.id && S.sel.subj === it.subj.name;
    var days = it.isPaused ? pauseDays(it.subj.pauseDate) : 0;
    var returnD = (it.isPaused && it.subj.returnDate) ? daysUntilReturn(it.subj.returnDate) : null;
    var unit = it.subj.type === 'count' ? '개' : '점';
    var pauseHTML = '';
    if (it.isPaused) {
      pauseHTML = '<div class="sb-pause-info">' +
        '<div class="sb-pause-date">휴회 ' + days + '일째' + (it.subj.pauseDate ? ' (' + it.subj.pauseDate + ')' : '') + '</div>' +
        (it.subj.pauseReason ? '<div class="sb-pause-reason">📌 ' + it.subj.pauseReason + '</div>' : '') +
        (returnD !== null ? '<div class="sb-pause-return">🔄 복귀 ' + (returnD >= 0 ? returnD + '일 후' : '예정일 지남') + '</div>' : '') +
        '</div>';
    }
    return '<div class="sb-item' + (isSel ? ' sel' : '') + (it.isPaused ? ' paused-item' : '') + '" onclick="selectSubj(' + it.st.tid + ',' + it.st.id + ',\'' + it.subj.name + '\')">' +
      '<div class="sb-dot ' + (it.isPaused ? 'paused' : 'active') + '"></div>' +
      '<div class="sb-info">' +
        '<div class="sb-name">' + it.st.name + '</div>' +
        '<div class="sb-meta">' + (it.st.grade || '') + ' · ' + it.subj.name + '</div>' +
        pauseHTML +
      '</div>' +
      (it.avg !== null && !it.isPaused ? '<span class="sb-avg">' + it.avg + unit + '</span>' : '') +
      '<button class="sb-more" onclick="event.stopPropagation();openItemMenu(' + it.st.id + ',\'' + it.subj.name + '\',' + it.isPaused + ')">···</button>' +
    '</div>';
  }).join('');
}

function openItemMenu(sid, subjName, isPaused) {
  var st = S.students.find(function(s) { return s.id === sid; });
  var btns = isPaused
    ? '<button class="btn-resume" onclick="resumeSubj(' + sid + ',\'' + subjName + '\')">✅ 재원 복귀</button>' +
      '<button class="btn-edit-pause" style="margin-top:0;" onclick="closeModal();openPauseSubj(' + sid + ',\'' + subjName + '\',true)">📝 휴회 정보 수정</button>'
    : '<button class="btn-primary" style="background:linear-gradient(135deg,#dc2626,#ef4444);width:100%;padding:10px;" onclick="closeModal();openPauseSubj(' + sid + ',\'' + subjName + '\',false)">⏸ 휴회 처리</button>';
  showModal(
    '<div class="modal-title"><div class="modal-icon">⚙️</div>' + st.name + ' · ' + subjName + '</div>' +
    '<div style="display:flex;flex-direction:column;gap:8px;">' +
      btns +
      '<button class="btn-ghost" onclick="openAddSubj(' + sid + ')">＋ 과목 추가</button>' +
      '<button class="btn-ghost" style="color:#dc2626;border-color:#fca5a5;" onclick="if(confirm(\'' + subjName + ' 과목을 삭제할까요?\')){delSubj(' + sid + ',\'' + subjName + '\');closeModal()}">🗑 과목 삭제</button>' +
      '<button class="btn-danger" onclick="if(confirm(\'' + st.name + ' 학생 전체를 삭제할까요?\')){delStudent(' + sid + ');closeModal()}">⚠️ 학생 전체 삭제</button>' +
      '<button class="btn-ghost" onclick="closeModal()">취소</button>' +
    '</div>'
  );
}

function selectSubj(tid, sid, subj) {
  S.sel = {tid: tid, sid: sid, subj: subj};
  S.tab = 'detail';
  S.examFilter = 'all';
  renderSidebar();
  renderMain();
}

// ── MAIN ──
function renderMain() {
  if (!S.sel) {
    document.getElementById('h-tabs').style.display = 'none';
    document.getElementById('save-btn').style.display = 'none';
    document.getElementById('h-name').textContent = 'WAWA 코칭센터';
    document.getElementById('h-meta').textContent = '강사 → 학생 → 과목을 선택하세요';
    document.getElementById('content').innerHTML = '<div class="welcome"><div class="welcome-icon">📊</div><div class="welcome-text">왼쪽에서 학생과 과목을 선택하세요</div></div>';
    return;
  }
  var st = S.students.find(function(s) { return s.id === S.sel.sid; });
  var tc = S.teachers.find(function(t) { return t.id === S.sel.tid; });
  var subj = (st.subjects || []).find(function(s) { return s.name === S.sel.subj; }) || {name: S.sel.subj, type: 'score'};
  document.getElementById('h-tabs').style.display = 'flex';
  document.getElementById('save-btn').style.display = S.tab === 'report' ? 'flex' : 'none';
  ['detail','report'].forEach(function(t) { document.getElementById('tab-' + t).classList.toggle('on', S.tab === t); });
  document.getElementById('h-name').textContent = st.name + ' 학생' + (subj.paused ? ' 🔴 휴회 중' : '');
  document.getElementById('h-meta').innerHTML = (st.grade || '') + ' · <strong>' + S.sel.subj + '</strong> · ' + (tc ? tc.name + ' 선생님' : '') + (st.school ? ' · ' + st.school : '');
  if (S.tab === 'detail') renderDetail(st, subj);
  else renderReport(st, subj, tc);
}

function setTab(t) { S.tab = t; renderMain(); }

function filteredExams(all) {
  if (S.examFilter === 'all') return all;
  return all.filter(function(e) { return (e.examType || 'academy') === S.examFilter; });
}

function filterTabsHTML() {
  var f = S.examFilter;
  return '<div class="exam-filter">' +
    '<button class="ef-btn' + (f === 'all' ? ' on' : '') + '" onclick="S.examFilter=\'all\';renderMain()">전체</button>' +
    '<button class="ef-btn academy' + (f === 'academy' ? ' on' : '') + '" onclick="S.examFilter=\'academy\';renderMain()">학원</button>' +
    '<button class="ef-btn school' + (f === 'school' ? ' on' : '') + '" onclick="S.examFilter=\'school\';renderMain()">학교</button>' +
  '</div>';
}

// ── DETAIL ──
function renderDetail(st, subj) {
  var isPaused = !!subj.paused;
  var days = isPaused ? pauseDays(subj.pauseDate) : 0;
  var returnD = (isPaused && subj.returnDate) ? daysUntilReturn(subj.returnDate) : null;
  var allExams = S.exams.filter(function(e) { return e.sid === st.id && e.subj === subj.name; }).sort(function(a, b) { return a.date.localeCompare(b.date); });
  var exams = filteredExams(allExams);
  var type = subj.type || 'score';
  var vals = exams.map(function(e) { return e.score; });
  var latest = vals.length ? vals[vals.length - 1] : null;
  var maxVal = vals.length ? Math.max.apply(null, vals) : null;
  var unit = type === 'count' ? '개' : '점';

  var history = S.pauseHistory.filter(function(h) { return h.sid === st.id && h.subj === subj.name; }).sort(function(a, b) { return b.date.localeCompare(a.date); });

  var rows = [].concat(exams).reverse().map(function(e) {
    var g = type === 'score' ? gradeScore(e.score) : null;
    var et = e.examType || 'academy';
    return '<div class="exam-item">' +
      '<div class="exam-date">' + e.date + '</div>' +
      '<div style="flex:1"><div class="exam-name">' + e.name + '</div><div class="exam-bar"><div class="exam-bar-fill" style="width:' + Math.min(100, e.score) + '%"></div></div></div>' +
      '<span class="exam-type-badge ' + (et === 'school' ? 'etb-school' : 'etb-academy') + '">' + (et === 'school' ? '학교' : '학원') + '</span>' +
      '<div><span class="exam-score">' + e.score + '</span><span class="exam-unit">' + unit + '</span></div>' +
      (g ? '<div class="grade-badge g' + g + '">' + g + '</div>' : '') +
      '<div class="exam-actions"><button class="exam-edit-btn" onclick="openEditExam(' + e.id + ')">✏️</button><button class="exam-del-btn" onclick="delExam(' + e.id + ')">🗑</button></div>' +
    '</div>';
  }).join('');

  var historyHTML = history.length ? history.map(function(h) {
    return '<div class="history-item">' +
      '<div class="hi-icon ' + (h.type === 'paused' ? 'hi-paused' : 'hi-resumed') + '">' + (h.type === 'paused' ? '⏸' : '✅') + '</div>' +
      '<div class="hi-info"><div class="hi-title">' + (h.type === 'paused' ? '휴회 처리' : '재원 복귀') + '</div><div class="hi-meta">' + h.date + '</div>' + (h.reason ? '<div class="hi-reason">"' + h.reason + '"</div>' : '') + '</div>' +
      (h.returnDate ? '<div style="font-size:11px;color:#d97706;font-weight:600;">복귀 예정: ' + h.returnDate + '</div>' : '') +
    '</div>';
  }).join('') : '<div style="text-align:center;color:var(--muted);padding:20px;">이력 없음</div>';

  var pauseBanner = '';
  if (isPaused) {
    pauseBanner = '<div class="pause-banner">' +
      '<div class="pb-icon">⏸</div>' +
      '<div class="pb-info">' +
        '<div class="pb-title">휴회 중 · ' + days + '일째</div>' +
        '<div class="pb-meta">' + (subj.pauseDate || '') + ' 부터 휴회' + (st.school ? ' · ' + st.school : '') + '</div>' +
        (subj.pauseReason ? '<div class="pb-reason">📌 사유: ' + subj.pauseReason + '</div>' : '') +
        (returnD !== null ? '<div class="pb-return">🔄 복귀 예정일: ' + subj.returnDate + ' (' + (returnD >= 0 ? returnD + '일 남음' : '예정일 지남') + ')</div>' : '') +
      '</div>' +
      '<div class="pb-actions">' +
        '<button class="btn-resume" onclick="resumeSubj(' + st.id + ',\'' + subj.name + '\')">✅ 재원 복귀</button>' +
        '<button class="btn-edit-pause" onclick="openPauseSubj(' + st.id + ',\'' + subj.name + '\',true)">📝 수정</button>' +
      '</div>' +
    '</div>';
  }

  document.getElementById('content').innerHTML = '<div class="ci">' +
    pauseBanner +
    '<div class="score-grid">' +

// ── CHART ──
function drawChart(exams, type) {
  if (S.chartInst) { S.chartInst.destroy(); S.chartInst = null; }
  var ctx = document.getElementById('score-chart');
  if (!ctx) return;
  var unit = type === 'count' ? '개' : '점';
  var vals = exams.map(function(e) { return e.score; });
  var maxVal = Math.max.apply(null, vals);
  var pad = Math.max(2, Math.round(maxVal * 0.1));
  var pc = exams.length <= 3 ? 1 : 0;
  var labels = [];
  var data = [];
  var colors = [];
  for (var i = 0; i < pc; i++) { labels.push(''); data.push(null); colors.push('transparent'); }
  exams.forEach(function(e) {
    labels.push(e.name);
    data.push(e.score);
    colors.push((e.examType || 'academy') === 'school' ? 'rgba(37,99,235,.85)' : 'rgba(124,58,237,.85)');
  });
  for (var j = 0; j < pc; j++) { labels.push(''); data.push(null); colors.push('transparent'); }
  S.chartInst = new Chart(ctx, {
    type: 'bar',
    data: {labels: labels, datasets: [{label: '성적', data: data, backgroundColor: colors, borderWidth: 0, borderRadius: 8, borderSkipped: false, maxBarThickness: 100, barPercentage: .7, categoryPercentage: .8}]},
    options: {
      layout: {padding: {right: 20}}, responsive: true, maintainAspectRatio: false,
      plugins: {legend: {display: false}, tooltip: {callbacks: {label: function(c) { return c.parsed.y + unit; }}, backgroundColor: '#111827', padding: 10, cornerRadius: 8}},
      scales: {y: {min: 0, max: maxVal + pad, grid: {color: 'rgba(0,0,0,.04)'}, ticks: {callback: function(v) { return v + unit; }, font: {size: 11}}}, x: {grid: {display: false}, ticks: {font: {size: 11}, maxRotation: 0}}}
    }
  });
}

async function autoMsg() {
  var st = S.students.find(function(s) { return s.id === S.sel.sid; });
  var tc = S.teachers.find(function(t) { return t.id === S.sel.tid; });
  var subj = (st.subjects || []).find(function(s) { return s.name === S.sel.subj; }) || {type: 'score'};
  var exams = S.exams.filter(function(e) { return e.sid === st.id && e.subj === S.sel.subj; }).sort(function(a, b) { return a.date.localeCompare(b.date); });
  var unit = subj.type === 'count' ? '개' : '점';
  var vals = exams.map(function(e) { return e.score; });
  var latest = vals.length ? vals[vals.length - 1] : null;
  var memo = (document.getElementById('fb-memo') ? document.getElementById('fb-memo').value : '') || '';
  if (!memo.trim()) { showToast('선생님 메모를 먼저 입력해주세요!'); return; }
  var resultBox = document.getElementById('msg-result-box');
  var rendered = document.getElementById('msg-rendered');
  if (rendered) rendered.innerHTML = '<div style="text-align:center;padding:20px;color:#7c3aed;">✦ AI가 정리 중...</div>';
  if (resultBox) resultBox.style.display = 'block';
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'x-api-key': '', 'anthropic-version': '2023-06-01'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 900,
        messages: [{role: 'user', content: '아래 선생님 메모를 바탕으로 학부모 안내 메시지를 JSON 형식으로만 작성해줘.\n학생: ' + st.name + '(' + (st.grade || '') + ') / 과목: ' + S.sel.subj + ' / 담당: ' + (tc ? tc.name : '선생님') + ' / 최근성적: ' + (latest !== null ? latest : '없음') + unit + '\n[메모] ' + memo + '\nJSON: {"greeting":"인사+강사소개(1~2문장)","good":"잘한점(2~3문장)","bad":"보완점(2~3문장)","next":"학습방향(2~3문장)","closing":"마무리(강사이름으로끝)"}'}]
      })
    });
    var raw = await res.text();
    var d;
    try { d = JSON.parse(raw); } catch(e) { if (rendered) rendered.innerHTML = '파싱오류'; return; }
    if (d.error) { if (rendered) rendered.innerHTML = '오류: ' + JSON.stringify(d.error); return; }
    var txt = (d.content && d.content[0] ? d.content[0].text : '') || '';
    var obj;
    try { obj = JSON.parse(txt.replace(/```json|```/g, '').trim()); } catch(e) {
      if (rendered) rendered.innerHTML = '<div style="white-space:pre-wrap;">' + txt + '</div>';
      localStorage.setItem(msgKey(), txt); return;
    }
    var full = obj.greeting + '\n\n✅ 잘한 점\n' + obj.good + '\n\n📝 보완이 필요한 부분\n' + obj.bad + '\n\n📚 앞으로의 학습 방향\n' + obj.next + '\n\n' + obj.closing;
    localStorage.setItem(msgKey(), full);
    if (rendered) rendered.innerHTML =
      '<div style="font-size:13px;line-height:2;color:#374151;margin-bottom:14px;">' + obj.greeting.replace(/\n/g, '<br>') + '</div>' +
      '<div style="background:#f0fdf4;border-left:4px solid #059669;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:10px;"><div style="font-size:12px;font-weight:700;color:#059669;margin-bottom:5px;">✅ 잘한 점</div><div style="font-size:13px;line-height:1.9;color:#374151;">' + obj.good.replace(/\n/g, '<br>') + '</div></div>' +
      '<div style="background:#fffbeb;border-left:4px solid #d97706;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:10px;"><div style="font-size:12px;font-weight:700;color:#d97706;margin-bottom:5px;">📝 보완이 필요한 부분</div><div style="font-size:13px;line-height:1.9;color:#374151;">' + obj.bad.replace(/\n/g, '<br>') + '</div></div>' +
      '<div style="background:#eff6ff;border-left:4px solid #2563eb;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:14px;"><div style="font-size:12px;font-weight:700;color:#2563eb;margin-bottom:5px;">📚 앞으로의 학습 방향</div><div style="font-size:13px;line-height:1.9;color:#374151;">' + obj.next.replace(/\n/g, '<br>') + '</div></div>' +
      '<div style="font-size:13px;line-height:2;color:#374151;">' + obj.closing.replace(/\n/g, '<br>') + '</div>';
    var ta = document.getElementById('msg-area');
    if (ta) { ta.value = full; ta.style.display = 'none'; }
  } catch(e) { if (rendered) rendered.innerHTML = '오류: ' + e.message; }
}

// ── EXAM CRUD ──
function addExam() {
  var examType = document.getElementById('ei-type').value;
  var name = document.getElementById('ei-name').value.trim();
  var date = document.getElementById('ei-date').value;
  var score = parseFloat(document.getElementById('ei-score').value);
  if (!name || !date || isNaN(score) || score < 0) { showToast('모든 항목을 입력해주세요'); return; }
  S.exams.push({id: nid(), sid: S.sel.sid, subj: S.sel.subj, name: name, date: date, score: score, examType: examType});
  save(); renderMain(); showToast('✅ 추가됐어요');
}

function pauseSubj(sid, subjName, isEdit) {
  var st = S.students.find(function(s) { return s.id === sid; });
  var subj = (st.subjects || []).find(function(s) { return s.name === subjName; });
  if (!subj) return;

  subj.pauseDate = pauseDate;
  subj.pauseReason = reason;
  subj.returnDate = returnDate;
  if (!isEdit) {
    S.pauseHistory.push({id: nid(), sid: sid, subj: subjName, type: 'paused', date: pauseDate, reason: reason, returnDate: returnDate});
    if (S.sel && S.sel.sid === sid && S.sel.subj === subjName) S.sel = null;
  } else {
    var last = null;
    S.pauseHistory.filter(function(h) { return h.sid === sid && h.subj === subjName && h.type === 'paused'; }).forEach(function(h) { last = h; });
    if (last) { last.date = pauseDate; last.reason = reason; last.returnDate = returnDate; }
  }

      returningSoon.map(function(p) {
        return '<div style="font-size:13px;margin-bottom:4px;">• <strong>' + p.st.name + '</strong> · ' + p.subj.name + ' <span style="color:#d97706;font-weight:600;">' + p.subj.returnDate + '</span></div>';

    return '<div class="paused-table-item">' +
      '<div class="pti-dot"></div>' +
      '<div class="pti-info">' +
        '<div class="pti-name">' + p.st.name + ' <span style="font-size:12px;color:var(--muted);font-weight:400;">' + (p.st.grade || '') + ' · ' + p.subj.name + '</span></div>' +
        '<div class="pti-meta">' + (p.tc ? p.tc.name + ' 선생님' : '') + (p.st.school ? ' · ' + p.st.school : '') + '</div>' +
        '<div>' + reasonSpan + returnSpan + '</div>' +
      '</div>' +
      '<div style="text-align:center;margin:0 12px;"><div class="pti-days">' + p.days + '</div><div class="pti-days-label">일째</div></div>' +
      '<button class="btn-resume-sm" onclick="resumeSubjFromOverview(' + p.st.id + ',\'' + p.subj.name + '\')">복귀 ✅</button>' +
    '</div>';
  }).join('') : '<div class="ov-empty">😊 현재 휴회 중인 학생이 없어요</div>';

// ── 전체 현황 ──
function showOverview() {
  S.sel = null;
  document.getElementById('h-tabs').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('h-name').textContent = '전체 학생 현황';
  document.getElementById('h-meta').textContent = '모든 강사 · 학생 · 과목 통합 보기';
  OV.gradeF = 'all'; OV.subjF = 'all'; OV.sort = {key: 'grade', dir: 1};
  renderOverview();
}

function renderOverview() {
  var studentRows = [];
  S.students.forEach(function(st) {
    var tc = S.teachers.find(function(t) { return t.id === st.tid; });
    var activeSubjs = (st.subjects || []).filter(function(s) { return !s.paused; });
    if (!activeSubjs.length) return;
    var subjData = activeSubjs.map(function(subj) {
      var exams = S.exams.filter(function(e) { return e.sid === st.id && e.subj === subj.name; });
      var aEx = exams.filter(function(e) { return (e.examType || 'academy') === 'academy'; });
      var sEx = exams.filter(function(e) { return e.examType === 'school'; });
      var avg = function(arr) { return arr.length ? Math.round(arr.reduce(function(a, e) { return a + e.score; }, 0) / arr.length) : null; };
      return {subj: subj, aEx: aEx, sEx: sEx, acAvg: avg(aEx), scAvg: avg(sEx)};
    });
    studentRows.push({st: st, tc: tc, subjData: subjData, go: gradeOrder(st.grade || '')});
  });

  var rows = studentRows.filter(function(r) {
    if (OV.gradeF !== 'all' && !(r.st.grade && r.st.grade.startsWith(OV.gradeF))) return false;
    if (OV.subjF !== 'all' && !r.subjData.find(function(s) { return s.subj.name === OV.subjF; })) return false;
    return true;
  }).map(function(r) {
    return Object.assign({}, r, {subjData: OV.subjF === 'all' ? r.subjData : r.subjData.filter(function(s) { return s.subj.name === OV.subjF; })});
  });

  rows.sort(function(a, b) {
    var key = OV.sort.key, dir = OV.sort.dir;
    if (key === 'name') return dir * a.st.name.localeCompare(b.st.name);
    return dir * (a.go - b.go);
  });

  var total = rows.reduce(function(a, r) { return a + r.subjData.length; }, 0);
  var allGrades = [];
  S.students.forEach(function(s) { if (s.grade && allGrades.indexOf(s.grade) < 0) allGrades.push(s.grade); });
  allGrades.sort(function(a, b) { return gradeOrder(a) - gradeOrder(b); });
  var gradeGroups = [];
  allGrades.forEach(function(g) { var k = g.replace(/[0-9]/g, ''); if (gradeGroups.indexOf(k) < 0) gradeGroups.push(k); });
  var allSubjs = [];
  S.students.forEach(function(st) { (st.subjects || []).filter(function(s) { return !s.paused; }).forEach(function(s) { if (allSubjs.indexOf(s.name) < 0) allSubjs.push(s.name); }); });

  var si = function(k) { return OV.sort.key === k ? (OV.sort.dir === 1 ? '↑' : '↓') : '<span style="color:#ddd;font-size:9px;">⇅</span>'; };

  var tableRows = rows.map(function(r) {
    return r.subjData.map(function(sd, i) {
      var g = sd.acAvg !== null ? gradeScore(sd.acAvg) : null;
      var diff = (sd.acAvg !== null && sd.scAvg !== null) ? sd.acAvg - sd.scAvg : null;
      var diffTxt = diff !== null ? (diff > 0 ? '+' + diff : diff === 0 ? '±0' : '' + diff) : '—';
      var diffColor = diff === null ? '#94a3b8' : diff > 0 ? '#059669' : diff < 0 ? '#dc2626' : '#64748b';
      var firstCols = i === 0
        ? '<td rowspan="' + r.subjData.length + '" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;color:var(--muted);font-size:12px;">' + (r.st.grade || '—') + '</td>' +
          '<td rowspan="' + r.subjData.length + '" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;font-weight:700;">' + r.st.name + '</td>' +
          '<td rowspan="' + r.subjData.length + '" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;font-size:12px;color:var(--muted);">' + (r.st.school || '—') + '</td>' +
          '<td rowspan="' + r.subjData.length + '" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;font-size:12px;color:var(--muted);">' + (r.tc ? r.tc.name + ' 선생님' : '—') + '</td>'
        : '';
      var lastCol = i === 0
        ? '<td rowspan="' + r.subjData.length + '" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;"><button class="ov-edit-btn" onclick="goToStudent(' + r.st.tid + ',' + r.st.id + ',\'' + r.subjData[0].subj.name + '\')">상세 →</button></td>'
        : '';
      return '<tr>' + firstCols +
        '<td><span class="ov-subj-badge">' + sd.subj.name + '</span></td>' +
        '<td><span class="ov-score">' + (sd.acAvg !== null ? sd.acAvg + '점' : '—') + '</span><span class="ov-score-sub">' + (sd.aEx.length ? '(' + sd.aEx.length + '회)' : '') + '</span></td>' +
        '<td class="th-school"><span class="ov-score" style="color:#2563eb;">' + (sd.scAvg !== null ? sd.scAvg + '점' : '—') + '</span><span class="ov-score-sub">' + (sd.sEx.length ? '(' + sd.sEx.length + '회)' : '') + '</span></td>' +
        '<td style="font-weight:700;color:' + diffColor + ';">' + diffTxt + '</td>' +
        '<td>' + (g ? '<span class="ov-grade g' + g + '">' + g + '</span>' : '<span style="color:#ddd;">—</span>') + '</td>' +
        lastCol + '</tr>';
    }).join('');
  }).join('');

  document.getElementById('content').innerHTML = '<div class="ci">' +
    '<div style="font-size:14px;font-weight:700;margin-bottom:14px;">전체 학생 <span style="color:var(--muted);font-weight:400;font-size:12px;">(' + total + '건)</span></div>' +
    '<div class="ov-filter-bar">' +
      '<div class="ov-filter-group">' +
        '<button class="ov-btn' + (OV.gradeF === 'all' ? ' on' : '') + '" onclick="setOvFilter(\'grade\',\'all\')">전체</button>' +
        gradeGroups.map(function(g) { var label = g === '초' ? '초등' : g === '중' ? '중학' : g === '고' ? '고등' : g; return '<button class="ov-btn' + (OV.gradeF === g ? ' on' : '') + '" onclick="setOvFilter(\'grade\',\'' + g + '\')">' + label + '</button>'; }).join('') +
      '</div>' +
      '<div class="ov-filter-group">' +
        '<button class="ov-btn' + (OV.subjF === 'all' ? ' on' : '') + '" onclick="setOvFilter(\'subj\',\'all\')">전체</button>' +
        allSubjs.map(function(s) { return '<button class="ov-btn' + (OV.subjF === s ? ' on' : '') + '" onclick="setOvFilter(\'subj\',\'' + s + '\')">' + s + '</button>'; }).join('') +
      '</div>' +
    '</div>' +
    (rows.length === 0 ? '<div class="ov-empty">📭 학생이 없어요</div>' :
      '<table class="ov-table"><thead><tr>' +
        '<th onclick="setOvSort(\'grade\')">학년 ' + si('grade') + '</th>' +
        '<th onclick="setOvSort(\'name\')">이름 ' + si('name') + '</th>' +
        '<th>학교</th><th>선생님</th><th>과목</th>' +
        '<th>🏫 학원 평균</th><th class="th-school">📚 학교 평균</th>' +
        '<th>비교</th><th>등급</th><th></th>' +
      '</tr></thead><tbody>' + tableRows + '</tbody></table>') +
  '</div>';
}

function setOvFilter(type, val) { if (type === 'grade') OV.gradeF = val; else OV.subjF = val; renderOverview(); }
function setOvSort(k) { if (OV.sort.key === k) OV.sort.dir *= -1; else { OV.sort.key = k; OV.sort.dir = 1; } renderOverview(); }
function goToStudent(tid, sid, subj) { S.sel = {tid: tid, sid: sid, subj: subj}; S.tab = 'detail'; S.examFilter = 'all'; renderSidebar(); renderMain(); }

// ── 이미지 저장 ──

  var examRows = [].concat(exams).reverse().map(function(e) {
    var et = e.examType || 'academy';
    return '<div style="display:flex;align-items:center;padding:11px 16px;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:7px;background:#fff;">' +
      '<div style="flex:1"><div style="font-size:13px;font-weight:700;">' + e.name + '</div><div style="font-size:10px;color:#64748b;margin-top:2px;">' + e.date + '</div></div>' +
      '<span style="font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;background:' + (et === 'school' ? '#dbeafe' : '#d1fae5') + ';color:' + (et === 'school' ? '#1d4ed8' : '#065f46') + ';margin-right:10px;">' + (et === 'school' ? '학교' : '학원') + '</span>' +
      '<div style="font-size:18px;font-weight:900;">' + e.score + unit + '</div>' +
    '</div>';
  }).join('');
  var chartImg = '';
  var cc = document.getElementById('score-chart');
  if (cc) chartImg = cc.toDataURL('image/png');
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"/></head><body style="font-family:sans-serif;background:#eef0f8;padding:32px;width:800px;">' +
    '<div style="background:linear-gradient(135deg,#0a0f1e,#1e2d4a,#2d1b69);border-radius:20px;padding:28px;margin-bottom:18px;">' +
      '<div style="font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;">' + st.name + ' 학생</div>' +
      '<div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:18px;">' + (st.grade || '') + ' · ' + S.sel.subj + ' · ' + (tc ? tc.name + ' 선생님' : '') + '</div>' +
      '<div style="display:flex;gap:10px;">' +
        '<div style="background:rgba(255,255,255,.07);border-radius:12px;padding:13px 20px;"><div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;">최근</div><div style="font-size:22px;font-weight:900;color:#fbbf24;">' + (latest !== null ? latest : '—') + unit + '</div></div>' +
        '<div style="background:rgba(255,255,255,.07);border-radius:12px;padding:13px 20px;"><div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;">최고</div><div style="font-size:22px;font-weight:900;color:#34d399;">' + (maxv !== null ? maxv : '—') + unit + '</div></div>' +
        '<div style="background:rgba(255,255,255,.07);border-radius:12px;padding:13px 20px;"><div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;">시험 횟수</div><div style="font-size:22px;font-weight:900;color:#60a5fa;">' + vals.length + '회</div></div>' +
      '</div>' +
    '</div>' +
    (chartImg ? '<div style="background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:22px 24px;margin-bottom:16px;"><div style="font-size:13px;font-weight:700;margin-bottom:14px;">성적 추이</div><img src="' + chartImg + '" style="width:100%;"/></div>' : '') +
    '<div style="background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:22px 24px;margin-bottom:16px;"><div style="font-size:13px;font-weight:700;margin-bottom:14px;">시험별 성적</div>' + examRows + '</div>' +
    (msg ? '<div style="background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:22px 24px;margin-bottom:16px;"><div style="font-size:13px;font-weight:700;margin-bottom:14px;">학부모 안내 메시지</div><div style="border:1.5px solid #e9d5ff;border-radius:14px;padding:18px 20px;">' + msg + '</div></div>' : '') +
    '<div style="text-align:center;padding:12px;color:#64748b;font-size:10px;">WAWA 코칭센터 · ' + (tc ? tc.name + ' 선생님' : '') + ' · ' + today + '</div>' +
  '</body></html>';
  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:800px;height:100vh;border:none;visibility:hidden;';
  document.body.appendChild(iframe);
  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();
  await new Promise(function(r) { setTimeout(r, 800); });
  try {
    var iDoc = iframe.contentDocument.body;
    var canvas = await html2canvas(iDoc, {backgroundColor: '#eef0f8', scale: 2, useCORS: true, width: 800, height: iDoc.scrollHeight});
    var link = document.createElement('a');
    link.download = 'WAWA_' + st.name + '_' + S.sel.subj + '_' + today.replace(/\./g, '').replace(/ /g, '') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('✅ 저장됐어요');
  } catch(e) { showToast('저장 실패: ' + e.message); }
  document.body.removeChild(iframe);
}

// ── INIT ──
renderSidebar();
renderMain();
</script>
</body>
</html>
