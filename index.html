<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WAWA 코칭센터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a0f1e;--navy2:#111827;--navy3:#1e2d4a;
  --gold:#f59e0b;--gold2:#fbbf24;
  --accent:#7c3aed;--accent2:#a78bfa;
  --bg:#eef0f8;--card:#fff;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --green:#059669;--red:#dc2626;--blue:#2563eb;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

.layout{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:232px;background:linear-gradient(180deg,#0a0f1e 0%,#111827 60%,#1a2340 100%);display:flex;flex-direction:column;flex-shrink:0;box-shadow:4px 0 24px rgba(0,0,0,.3);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.sb-brand{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0a0f1e;flex-shrink:0;box-shadow:0 4px 12px rgba(245,158,11,.4);}
.sb-logo-title{font-size:15px;font-weight:800;color:#fff;}
.sb-logo-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.12em;}
.sb-section{padding:16px 18px 5px;font-size:9px;color:rgba(255,255,255,.18);letter-spacing:.15em;text-transform:uppercase;font-weight:700;}
.sb-tree{flex:1;overflow-y:auto;padding:4px 10px 8px;}
.sb-tree::-webkit-scrollbar{width:3px;}
.sb-tree::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}
.t-teacher-row{display:flex;align-items:center;gap:7px;padding:9px 10px;cursor:pointer;color:rgba(255,255,255,.72);font-size:12px;font-weight:600;border-radius:10px;margin-bottom:2px;transition:all .15s;}
.t-teacher-row:hover{background:rgba(255,255,255,.06);}
.t-teacher-row.open{background:rgba(124,58,237,.22);color:#fff;}
.t-teacher-icon{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#7c3aed,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.t-chevron{margin-left:auto;transition:transform .2s;font-size:9px;color:rgba(255,255,255,.22);}
.t-chevron.open{transform:rotate(90deg);}
.t-del{background:none;border:none;color:rgba(255,255,255,.1);font-size:12px;padding:2px 5px;margin-left:2px;border-radius:4px;transition:all .15s;}
.t-del:hover{color:#ef4444;background:rgba(239,68,68,.12);}
.t-students{padding-left:6px;}
.t-student-row{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;color:rgba(255,255,255,.48);font-size:11px;border-radius:8px;margin-bottom:1px;transition:all .15s;}
.t-student-row:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.78);}
.t-student-row.open{color:rgba(255,255,255,.9);}
.t-student-icon{width:19px;height:19px;border-radius:5px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.t-subjects{padding-left:8px;}
.t-subj-row{display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;border-radius:7px;color:rgba(255,255,255,.36);font-size:11px;margin-bottom:1px;transition:all .15s;}
.t-subj-row:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);}
.t-subj-row.sel{background:linear-gradient(90deg,rgba(124,58,237,.32),rgba(124,58,237,.08));color:#fff;font-weight:600;border-left:2px solid #a78bfa;padding-left:8px;}
.t-subj-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);flex-shrink:0;}
.t-subj-row.sel .t-subj-dot{background:#f59e0b;}
.t-cnt{margin-left:auto;font-size:9px;color:rgba(255,255,255,.18);background:rgba(255,255,255,.05);padding:1px 6px;border-radius:8px;}
.t-add-btn{display:flex;align-items:center;gap:5px;padding:7px 10px;width:100%;border:none;background:none;color:rgba(255,255,255,.18);font-size:11px;border-radius:8px;transition:all .15s;margin-top:2px;}
.t-add-btn:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.42);}
.badge-score{font-size:8px;padding:1px 5px;border-radius:7px;font-weight:700;margin-left:2px;background:rgba(124,58,237,.2);color:#a78bfa;}
.badge-count{font-size:8px;padding:1px 5px;border-radius:7px;font-weight:700;margin-left:2px;background:rgba(245,158,11,.15);color:#fbbf24;}

.header{background:linear-gradient(135deg,#fff 0%,#f8f9ff 100%);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:64px;box-shadow:0 2px 12px rgba(124,58,237,.06);}
.h-name{font-size:17px;font-weight:800;color:var(--text);}
.h-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.h-right{display:flex;align-items:center;gap:10px;}
.h-tabs{display:flex;gap:3px;background:#ede9fe;padding:3px;border-radius:10px;}
.h-tab{padding:6px 20px;border-radius:8px;border:none;background:transparent;color:#7c3aed;font-size:12px;font-weight:600;transition:all .15s;opacity:.6;}
.h-tab:hover{opacity:.9;}
.h-tab.on{background:#fff;color:#5b21b6;box-shadow:0 1px 6px rgba(124,58,237,.15);opacity:1;}
.save-header-btn{display:flex;align-items:center;gap:5px;padding:8px 16px;background:linear-gradient(135deg,#0a0f1e,#1e2d4a);color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:700;box-shadow:0 2px 10px rgba(10,15,30,.2);transition:all .15s;}
.save-header-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(10,15,30,.3);}

.content{flex:1;overflow-y:auto;padding:28px 0;background:var(--bg);}
.content-inner{max-width:880px;margin:0 auto;padding:0 28px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:#d4d8e8;border-radius:3px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;}
.welcome-icon{font-size:52px;opacity:.12;}
.welcome-text{font-size:14px;font-weight:500;color:var(--muted);}

/* 시험 구분 탭 */
.exam-filter{display:flex;gap:6px;margin-bottom:16px;}
.ef-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;}
.ef-btn:hover{border-color:#a78bfa;color:var(--accent);}
.ef-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.3);}
.ef-btn.school.on{background:#2563eb;border-color:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.ef-btn.academy.on{background:#059669;border-color:#059669;box-shadow:0 2px 8px rgba(5,150,105,.3);}

/* 시험 구분 뱃지 */
.exam-type-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0;}
.etb-school{background:#dbeafe;color:#1d4ed8;}
.etb-academy{background:#d1fae5;color:#065f46;}

.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.score-card{border-radius:16px;padding:22px 22px;position:relative;overflow:hidden;color:#fff;}
.sc-1{background:linear-gradient(135deg,#1d4ed8,#3b82f6);}
.sc-2{background:linear-gradient(135deg,#b45309,#f59e0b);}
.sc-3{background:linear-gradient(135deg,#6d28d9,#a78bfa);}
.score-card::before{content:'';position:absolute;top:-28px;right:-28px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07);}
.score-card::after{content:'';position:absolute;bottom:-20px;left:-10px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.04);}
.score-card-label{font-size:10px;opacity:.68;margin-bottom:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.score-card-val{font-size:34px;font-weight:900;line-height:1;letter-spacing:-.02em;}
.score-card-unit{font-size:14px;opacity:.6;margin-left:3px;font-weight:500;}
.score-card-sub{font-size:10px;opacity:.42;margin-top:7px;}

.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:3px;height:15px;background:linear-gradient(to bottom,#7c3aed,#f59e0b);border-radius:2px;flex-shrink:0;}

.exam-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;transition:all .2s;background:#fff;}
.exam-item:hover{border-color:#c4b5fd;box-shadow:0 3px 12px rgba(124,58,237,.09);transform:translateY(-1px);}
.exam-date{font-size:10px;color:var(--muted);width:76px;flex-shrink:0;font-weight:500;}
.exam-name{flex:1;font-size:13px;font-weight:600;}
.exam-bar{height:4px;border-radius:2px;background:#f1f5f9;margin-top:5px;overflow:hidden;}
.exam-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7c3aed,#f59e0b);}
.exam-score{font-size:18px;font-weight:800;color:var(--text);}
.exam-unit{font-size:10px;color:var(--muted);margin-left:1px;}
.grade-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.gA{background:#059669;}.gB{background:#2563eb;}.gC{background:#d97706;}.gD{background:#ea580c;}.gF{background:#dc2626;}
.exam-actions{display:flex;gap:3px;}
.exam-edit-btn,.exam-del-btn{background:none;border:none;padding:5px 7px;border-radius:6px;font-size:11px;color:var(--muted);transition:all .15s;}
.exam-edit-btn:hover{background:#ede9fe;color:#7c3aed;}
.exam-del-btn:hover{background:#fee2e2;color:#dc2626;}
.add-exam-form{background:linear-gradient(135deg,#f8f9ff,#f0f2fc);border:2px dashed #c4b5fd;border-radius:12px;padding:16px 18px;margin-top:12px;}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.form-input{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;transition:border .15s;color:var(--text);}
.form-input:focus{border-color:#7c3aed;}
.form-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;transition:border .15s;color:var(--text);}
.form-select:focus{border-color:#7c3aed;}
.btn-primary{padding:8px 20px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;box-shadow:0 2px 10px rgba(124,58,237,.3);transition:all .15s;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,58,237,.4);}
.btn-ghost{padding:8px 14px;background:#fff;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;transition:all .15s;}
.btn-ghost:hover{border-color:#7c3aed;color:#7c3aed;}

.report-hero{background:linear-gradient(135deg,#0a0f1e 0%,#1e2d4a 60%,#2d1b69 100%);border-radius:20px;padding:30px;margin-bottom:18px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06);}
.rh-glow1{position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.3),transparent 70%);pointer-events:none;}
.rh-glow2{position:absolute;bottom:-50px;left:20px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.15),transparent 70%);pointer-events:none;}
.rh-glow3{position:absolute;top:50%;right:30%;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.12),transparent 70%);pointer-events:none;}
.rh-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.rh-logo{display:flex;align-items:center;gap:9px;}
.rh-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#0a0f1e;box-shadow:0 3px 10px rgba(245,158,11,.4);}
.rh-logo-t1{font-size:13px;font-weight:800;color:#fff;letter-spacing:.02em;}
.rh-logo-t2{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.1em;}
.rh-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(124,58,237,.28);border:1px solid rgba(167,139,250,.25);color:#a78bfa;border-radius:20px;padding:5px 13px;font-size:10px;font-weight:700;letter-spacing:.05em;}
.rh-date{font-size:10px;color:rgba(255,255,255,.22);}
.rh-name{font-size:27px;font-weight:900;color:#fff;margin-bottom:4px;letter-spacing:-.02em;}
.rh-sub{font-size:12px;color:rgba(255,255,255,.38);margin-bottom:22px;}
.rh-scores{display:flex;gap:10px;flex-wrap:wrap;}
.rh-score-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:13px;padding:14px 22px;transition:all .2s;}
.rhs-label{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.rhs-val{font-size:25px;font-weight:900;color:#fff;letter-spacing:-.02em;}
.rhs-val.gold{color:#fbbf24;}
.rhs-val.green{color:#34d399;}
.rhs-val.blue{color:#60a5fa;}

.chart-wrap{position:relative;height:220px;margin:4px 0;}

.re-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;transition:all .2s;}
.re-item:hover{border-color:#c4b5fd;box-shadow:0 2px 10px rgba(124,58,237,.08);}
.re-name{font-size:13px;font-weight:700;}
.re-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.re-score{font-size:20px;font-weight:900;margin-left:auto;}

.msg-auto-btn{display:flex;align-items:center;gap:6px;padding:11px 28px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 3px 12px rgba(124,58,237,.35);transition:all .15s;}
.msg-auto-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.45);}
.msg-textarea{width:100%;min-height:160px;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:12px;line-height:1.9;resize:vertical;outline:none;transition:border .15s;background:#fafbff;color:var(--text);}
.msg-textarea:focus{border-color:#7c3aed;}
.msg-copy-btn{padding:8px 16px;background:#fff;border:1.5px solid var(--border);border-radius:9px;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s;}
.msg-copy-btn:hover{border-color:#7c3aed;color:#7c3aed;}
.report-footer{text-align:center;padding:16px;color:var(--muted);font-size:10px;font-weight:500;letter-spacing:.05em;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:20px;padding:28px;width:360px;box-shadow:0 24px 64px rgba(0,0,0,.2);}
.modal-title{font-size:15px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.modal-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;font-size:14px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;transition:border .15s;margin-bottom:12px;color:var(--text);}
.modal-input:focus{border-color:#7c3aed;}
.modal-label{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;transition:all .15s;color:var(--muted);}
.type-btn.on{border-color:#7c3aed;color:#7c3aed;background:#ede9fe;}

/* SIDEBAR 새 스타일 */
.sb-brand{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0a0f1e;flex-shrink:0;}
.sb-logo-title{font-size:15px;font-weight:800;color:#fff;}
.sb-logo-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.12em;}

.sb-filters{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-filter-label{font-size:9px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.sb-teacher-select{width:100%;padding:7px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
.sb-teacher-select option{background:#1a2340;color:#fff;}

.sb-subj-filter{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-subj-btns{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.sb-subj-btn{padding:4px 10px;border-radius:16px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-subj-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.sb-subj-btn.on{background:#f59e0b;border-color:#f59e0b;color:#0a0f1e;}

.sb-sort-row{display:flex;gap:6px;padding:10px 14px 6px;}
.sb-sort-btn{flex:1;padding:5px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-sort-btn.on{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.2);}

.sb-student-count{padding:6px 14px 4px;font-size:11px;color:rgba(255,255,255,.35);font-weight:500;}
.sb-student-list{flex:1;overflow-y:auto;padding:4px 10px 8px;}
.sb-student-list::-webkit-scrollbar{width:3px;}
.sb-student-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}

.sb-student-item{display:flex;align-items:center;padding:8px 10px;border-radius:9px;cursor:pointer;transition:all .15s;margin-bottom:2px;position:relative;}
.sb-student-item:hover{background:rgba(255,255,255,.05);}
.sb-student-item.sel{background:rgba(124,58,237,.22);}
.sb-student-info{flex:1;min-width:0;}
.sb-student-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:5px;}
.sb-student-meta{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.sb-student-score{font-size:12px;font-weight:700;color:rgba(255,255,255,.55);margin-right:6px;white-space:nowrap;}
.sb-student-del{background:none;border:none;color:rgba(255,255,255,.15);font-size:12px;padding:2px 4px;border-radius:4px;transition:all .15s;flex-shrink:0;}
.sb-student-del:hover{color:#ef4444;background:rgba(239,68,68,.12);}
.sb-pause-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0;}
.sb-active-dot{width:7px;height:7px;border-radius:50%;background:#34d399;flex-shrink:0;}

/* 휴회 탭 */
.sb-tabs{display:flex;gap:3px;padding:8px 10px 0;}
.sb-tab{flex:1;padding:5px;border-radius:7px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:11px;font-weight:600;transition:all .15s;cursor:pointer;}
.sb-tab.on{background:rgba(124,58,237,.35);color:#fff;}
.sb-tab.paused-tab.on{background:rgba(239,68,68,.25);color:#fca5a5;}
.pause-badge{display:inline-block;background:rgba(239,68,68,.2);color:#fca5a5;font-size:8px;padding:1px 5px;border-radius:5px;margin-left:3px;font-weight:700;}
.ov-filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.ov-filter-group{display:flex;gap:4px;background:#f1f5f9;padding:3px;border-radius:10px;}
.ov-btn{padding:5px 14px;border-radius:7px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;cursor:pointer;}
.ov-btn:hover{color:var(--text);}
.ov-btn.on{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ov-table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04);}
.ov-table th{padding:12px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);background:#f8f9fc;border-bottom:1px solid var(--border);white-space:nowrap;}
.ov-table th.sortable{cursor:pointer;user-select:none;}
.ov-table th.sortable:hover{color:var(--accent);}
.ov-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.ov-table tr:last-child td{border-bottom:none;}
.ov-table tr:hover td{background:#fafbff;}
.ov-subj-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#ede9fe;color:#5b21b6;}
.ov-score{font-size:14px;font-weight:800;color:var(--navy);}
.ov-score-sub{font-size:10px;color:var(--muted);margin-left:3px;font-weight:400;}
.ov-grade{width:28px;height:28px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.ov-edit-btn{padding:4px 12px;border:1.5px solid var(--border);border-radius:7px;background:#fff;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s;}
.ov-edit-btn:hover{border-color:#7c3aed;color:#7c3aed;}
.ov-empty{text-align:center;padding:48px;color:var(--muted);font-size:13px;}
.th-school{background:linear-gradient(90deg,#eff6ff,#f8f9fc)!important;}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(12px);background:#111827;color:#fff;padding:11px 22px;border-radius:12px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:200;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.22);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo-icon">W</div>
      <div>
        <div class="sb-logo-title">WAWA</div>
        <div class="sb-logo-sub">코 칭 센 터</div>
      </div>
    </div>
    <div class="sb-tabs">
      <button class="sb-tab on" id="sb-tab-active" onclick="setSbTab('active')">재원</button>
      <button class="sb-tab paused-tab" id="sb-tab-paused" onclick="setSbTab('paused')">휴회</button>
    </div>
    <div style="padding:6px 12px;background:rgba(239,68,68,.1);border-bottom:1px solid rgba(239,68,68,.2);">
      <button onclick="fixTeachers()" style="width:100%;padding:6px;background:rgba(239,68,68,.3);border:none;border-radius:6px;color:#fca5a5;font-size:11px;font-weight:700;cursor:pointer;">🔧 강사 목록 초기화</button>
    </div>
    <div class="sb-filters">
      <div class="sb-filter-label">선생님</div>
      <select class="sb-teacher-select" id="sb-teacher-sel" onchange="setSbTeacher()">
        <option value="all">전체 선생님</option>
      </select>
    </div>
    <div class="sb-subj-filter">
      <div class="sb-filter-label">과목</div>
      <div class="sb-subj-btns" id="sb-subj-btns"></div>
    </div>
    <div class="sb-sort-row">
      <button class="sb-sort-btn on" id="sb-sort-grade" onclick="setSbSort('grade')">학년순</button>
      <button class="sb-sort-btn" id="sb-sort-name" onclick="setSbSort('name')">이름순</button>
    </div>
    <div class="sb-student-count" id="sb-count"></div>
    <div class="sb-student-list" id="sb-list"></div>
    <div style="padding:10px 12px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:6px;">
      <button class="t-add-btn" style="flex:1;" onclick="openAddStudentSelect()">＋ 학생 추가</button>
      <button class="t-add-btn" style="flex:1;" onclick="openAddTeacher()">＋ 강사 추가</button>
    </div>
  </div>
  <div class="main">
    <div class="header">
      <div>
        <div class="h-name" id="h-name">WAWA 코칭센터</div>
        <div class="h-meta" id="h-meta">강사 → 학생 → 과목을 선택하세요</div>
      </div>
      <div class="h-right">
        <div class="h-tabs" id="h-tabs" style="display:none;">
          <button class="h-tab on" onclick="setTab('detail')" id="tab-detail">상세</button>
          <button class="h-tab" onclick="setTab('report')" id="tab-report">보고서</button>
        </div>
        <button class="save-header-btn" id="save-btn" style="display:none;" onclick="saveReportImage()">📥 이미지 저장</button>
        <button class="save-header-btn" onclick="showOverview()" style="background:linear-gradient(135deg,#059669,#34d399);">👥 전체 현황</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="welcome"><div class="welcome-icon">📊</div><div class="welcome-text">왼쪽에서 강사 → 학생 → 과목을 선택하세요</div></div>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
const S={
  teachers:JSON.parse(localStorage.getItem('wawa_teachers')||'[]'),
  students:JSON.parse(localStorage.getItem('wawa_students')||'[]'),
  exams:JSON.parse(localStorage.getItem('wawa_exams')||'[]'),
  openT:new Set(),openS:new Set(),sel:null,tab:'detail',chartInst:null,
  examFilter:'all',
  sbTab:'active', // 'active' | 'paused'
};
let nextId=+localStorage.getItem('wawa_nid')||1;
function nid(){const i=nextId++;localStorage.setItem('wawa_nid',nextId);return i;}
function save(){localStorage.setItem('wawa_teachers',JSON.stringify(S.teachers));localStorage.setItem('wawa_students',JSON.stringify(S.students));localStorage.setItem('wawa_exams',JSON.stringify(S.exams));}
function grade(v){if(v>=90)return'A';if(v>=80)return'B';if(v>=70)return'C';if(v>=60)return'D';return'F';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2300);}
function toggleMemo(){const box=document.getElementById('memo-box');const btn=document.getElementById('memo-toggle-btn');if(!box||!btn)return;const open=box.style.display==='block';box.style.display=open?'none':'block';btn.textContent=open?'펼치기 ▼':'접기 ▲';}
function memoKey(){return`memo_${S.sel?.sid}_${S.sel?.subj}`;}
function getMemo(){return S.sel?localStorage.getItem(memoKey())||'':'';}
function saveMemo(){const a=document.getElementById('fb-memo');if(a)localStorage.setItem(memoKey(),a.value);}
function msgKey(){return`msg_${S.sel?.sid}_${S.sel?.subj}`;}
function getMsg(){return S.sel?localStorage.getItem(msgKey())||'':'';}
function saveMsg(){const a=document.getElementById('msg-area');if(a)localStorage.setItem(msgKey(),a.value);}

function openPauseSubj(sid,subjName){
  const st=S.students.find(s=>s.id===sid);
  showModal(`<div class="modal-title"><div class="modal-icon">⏸</div>과목 휴회</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px;"><strong>${st.name}</strong> · <strong>${subjName}</strong> 과목을 휴회 처리합니다.</div>
    <div class="modal-label">휴회 사유</div>
    <input class="modal-input" id="pause-reason" placeholder="예: 이사, 개인 사정 등"/>
    <div class="modal-label">휴회 날짜</div>
    <input class="modal-input" id="pause-date" type="date" value="${new Date().toISOString().slice(0,10)}"/>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn-primary" style="background:linear-gradient(135deg,#dc2626,#ef4444);" onclick="pauseSubj(${sid},'${subjName}')">휴회 처리</button>
    </div>`);
}
function pauseSubj(sid,subjName){
  const st=S.students.find(s=>s.id===sid);
  const subj=(st.subjects||[]).find(s=>s.name===subjName);
  if(!subj)return;
  subj.paused=true;
  subj.pauseReason=document.getElementById('pause-reason').value.trim()||'사유 없음';
  subj.pauseDate=document.getElementById('pause-date').value;
  if(S.sel&&S.sel.sid===sid&&S.sel.subj===subjName)S.sel=null;
  save();closeModal();renderSidebar();renderMain();
  toast('⏸ '+st.name+' · '+subjName+' 휴회 처리됐어요');
}
function resumeSubj(sid,subjName){
  const st=S.students.find(s=>s.id===sid);
  const subj=(st.subjects||[]).find(s=>s.name===subjName);
  if(!subj)return;
  if(!confirm(st.name+' · '+subjName+' 과목을 재원으로 복귀시킬까요?'))return;
  subj.paused=false;subj.pauseReason='';subj.pauseDate='';
  save();renderTree();toast('✅ '+st.name+' · '+subjName+' 재원 복귀됐어요');
}

// 시험 구분 필터
function setExamFilter(f){
  S.examFilter=f;
  renderMain();
}
function filteredExams(allExams){
  if(S.examFilter==='all') return allExams;
  return allExams.filter(e=>(e.examType||'academy')===S.examFilter);
}

const SB={teacherF:'all',subjF:'all',sort:'grade'};

function setSbTab(t){
  S.sbTab=t;
  document.getElementById('sb-tab-active').classList.toggle('on',t==='active');
  document.getElementById('sb-tab-paused').classList.toggle('on',t==='paused');
  renderSidebar();
}
function setSbSort(s){
  SB.sort=s;
  document.getElementById('sb-sort-grade').classList.toggle('on',s==='grade');
  document.getElementById('sb-sort-name').classList.toggle('on',s==='name');
  renderSidebar();
}

function fixTeachers(){
  if(!confirm('강사 목록을 장한성/이하림/박수권/양원철 4명으로 초기화할까요?\n기존 학생 데이터는 유지됩니다.'))return;
  S.teachers=[{id:1,name:'장한성'},{id:2,name:'이하림'},{id:3,name:'박수권'},{id:4,name:'양원철'}];
  save();renderSidebar();toast('✅ 강사 목록 초기화됐어요');
}

function renderSidebar(){
  // 선생님 드롭다운 갱신
  const sel=document.getElementById('sb-teacher-sel');
  const prev=sel.value;
  sel.innerHTML='<option value="all">전체 선생님</option>'+
    S.teachers.map(t=>`<option value="${t.id}"${SB.teacherF==t.id?' selected':''}>${t.name} 선생님</option>`).join('');
  SB.teacherF=prev;

  // 과목 버튼 갱신
  const allSubjs=[...new Set(S.students.flatMap(s=>(s.subjects||[]).map(x=>x.name)))];
  const subjEl=document.getElementById('sb-subj-btns');
  subjEl.innerHTML=`<button class="sb-subj-btn${SB.subjF==='all'?' on':''}" onclick="setSbSubj('all')">전체</button>`+
    allSubjs.map(s=>`<button class="sb-subj-btn${SB.subjF===s?' on':''}" onclick="setSbSubj('${s}')">${s}</button>`).join('');

  // 학생-과목 목록 수집
  let items=[];
  S.students.forEach(st=>{
    const tc=S.teachers.find(t=>t.id===st.tid);
    (st.subjects||[]).forEach(subj=>{
      const isPaused=!!subj.paused;
      if(S.sbTab==='paused'&&!isPaused)return;
      if(S.sbTab==='active'&&isPaused)return;
      if(SB.teacherF!=='all'&&st.tid!=SB.teacherF)return;
      if(SB.subjF!=='all'&&subj.name!==SB.subjF)return;
      const exams=S.exams.filter(e=>e.sid===st.id&&e.subj===subj.name&&(e.examType||'academy')==='academy');
      const avg=exams.length?Math.round(exams.reduce((a,e)=>a+e.score,0)/exams.length*10)/10:null;
      items.push({st,tc,subj,avg,isPaused});
    });
  });

  // 정렬
  items.sort((a,b)=>SB.sort==='name'?a.st.name.localeCompare(b.st.name):gradeOrder(a.st.grade||'')-gradeOrder(b.st.grade||''));

  document.getElementById('sb-count').textContent=`학생 (${items.length}명)`;

  const listEl=document.getElementById('sb-list');
  listEl.innerHTML=items.map(it=>{
    const sel=S.sel&&S.sel.sid===it.st.id&&S.sel.subj===it.subj.name;
    const unit=it.subj.type==='count'?'개':'점';
    return`<div class="sb-student-item${sel?' sel':''}" onclick="selectSubj(${it.st.tid},${it.st.id},'${it.subj.name}')">
      <div class="${it.isPaused?'sb-pause-dot':'sb-active-dot'}"></div>
      <div class="sb-student-info" style="margin-left:8px;">
        <div class="sb-student-name">${it.st.name}
          ${it.isPaused?`<span class="pause-badge">휴회</span>`:''}
        </div>
        <div class="sb-student-meta">${it.st.grade||''} · ${it.subj.name}</div>
      </div>
      ${it.avg!=null?`<span class="sb-student-score">${it.avg}${unit}</span>`:''}
      <button class="sb-student-del" onclick="event.stopPropagation();quickDelSubjMenu(${it.st.id},'${it.subj.name}',${it.isPaused})">···</button>
    </div>`;
  }).join('');
}

function setSbSort(s){
  SB.sort=s;
  document.getElementById('sb-sort-grade').classList.toggle('on',s==='grade');
  document.getElementById('sb-sort-name').classList.toggle('on',s==='name');
  renderSidebar();
}
function setSbSubj(sv){SB.subjF=sv;renderSidebar();}
function setSbTeacher(){SB.teacherF=document.getElementById('sb-teacher-sel').value;renderSidebar();}

function quickDelSubjMenu(sid,subjName,isPaused){
  const st=S.students.find(s=>s.id===sid);
  showModal(`<div class="modal-title"><div class="modal-icon">⚙️</div>${st.name} · ${subjName}</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${isPaused
        ?`<button class="btn-primary" style="background:linear-gradient(135deg,#059669,#34d399);" onclick="resumeSubj(${sid},'${subjName}');closeModal()">↩ 재원 복귀</button>`
        :`<button class="btn-primary" style="background:linear-gradient(135deg,#dc2626,#ef4444);" onclick="closeModal();openPauseSubj(${sid},'${subjName}')">⏸ 휴회 처리</button>`
      }
      <button class="btn-ghost" onclick="if(confirm('${subjName} 과목을 삭제할까요?')){delSubj(${sid},'${subjName}');closeModal()}" style="border-color:#fca5a5;color:#dc2626;">🗑 과목 삭제</button>
      <button class="btn-ghost" onclick="if(confirm('${st.name} 학생과 모든 데이터를 삭제할까요?')){delStudent(${sid});closeModal()}" style="border-color:#dc2626;color:#dc2626;font-weight:700;">⚠️ 학생 전체 삭제</button>
      <button class="btn-ghost" onclick="closeModal()">취소</button>
    </div>`);}


function openAddTeacherOrStudent(){
  if(S.teachers.length===0){openAddTeacher();return;}
  showModal(`<div class="modal-title"><div class="modal-icon">➕</div>추가</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn-primary" onclick="closeModal();openAddStudentSelect()">🎓 학생 추가</button>
      <button class="btn-ghost" onclick="closeModal();openAddTeacher()">👤 강사 추가</button>
    </div>`);
}
function openAddStudentSelect(){
  showModal(`<div class="modal-title"><div class="modal-icon">🎓</div>학생 추가</div>
    <div class="modal-label">강사 선택</div>
    <select class="modal-input" id="sel-tid">
      ${S.teachers.map(t=>`<option value="${t.id}">${t.name} 선생님</option>`).join('')}
    </select>
    <div class="modal-label">이름</div><input class="modal-input" id="sn" placeholder="예: 홍길동"/>
    <div class="modal-label">학년</div><input class="modal-input" id="sg" placeholder="예: 중2"/>
    <div class="modal-label">학교 이름</div><input class="modal-input" id="ss" placeholder="예: 광주중학교"/>
    <div class="modal-actions"><button class="btn-ghost" onclick="closeModal()">취소</button><button class="btn-primary" onclick="addStudentFromSidebar()">추가</button></div>`);
}
function addStudentFromSidebar(){
  const tid=+document.getElementById('sel-tid').value;
  const n=document.getElementById('sn').value.trim();
  const g=document.getElementById('sg').value.trim();
  const sc=document.getElementById('ss').value.trim();
  if(!n)return;
  S.students.push({id:nid(),tid,name:n,grade:g,school:sc,subjects:[]});
  save();closeModal();renderSidebar();toast('✅ '+n+' 추가');
}

// 사이드바 탭 - 학생 필터 (과목 기준)
function renderTree(){renderSidebar();}
function addTeacher(){
  const n=document.getElementById('tn').value.trim();
  if(!n)return;
  S.teachers.push({id:nid(),name:n});
  save();closeModal();renderSidebar();toast('✅ '+n+' 선생님 추가');
}
// 사이드바 탭 - 학생 필터 (과목 기준)
function renderTree(){
  const el=document.getElementById('tree');el.innerHTML='';
  S.teachers.forEach(t=>{
    const open=S.openT.has(t.id);const div=document.createElement('div');
    // 해당 탭에 맞는 과목이 있는 학생만
    const studs=S.students.filter(s=>s.tid===t.id&&(s.subjects||[]).some(subj=>S.sbTab==='paused'?subj.paused:!subj.paused));
    div.innerHTML=`
      <div class="t-teacher-row${open?' open':''}" onclick="toggleT(${t.id})">
        <div class="t-teacher-icon">${t.name[0]}</div><span>${t.name}</span>
        <span class="t-chevron${open?' open':''}">▶</span>
        <button class="t-del" onclick="event.stopPropagation();delTeacher(${t.id})">✕</button>
      </div>
      ${open?`<div class="t-students">${studs.map(s=>renderStudent(s)).join('')}
        ${S.sbTab==='active'?`<button class="t-add-btn" onclick="openAddStudent(${t.id})">＋ 학생 추가</button>`:''}
      </div>`:''}`;
    el.appendChild(div);
  });
}
function renderStudent(s){
  const open=S.openS.has(s.id);
  const activeSubjs=(s.subjects||[]).filter(subj=>S.sbTab==='paused'?subj.paused:!subj.paused);
  return`<div>
    <div class="t-student-row${open?' open':''}" onclick="toggleS(${s.id})">
      <div class="t-student-icon">${s.name[0]}</div>
      <span>${s.name}</span><span style="font-size:9px;color:rgba(255,255,255,.2);margin-left:2px;">${s.grade||''}</span>
      ${(s.subjects||[]).some(x=>x.paused)?`<span class="pause-badge">휴회</span>`:''}
      <span class="t-chevron${open?' open':''}">▶</span>
      <button class="t-del" onclick="event.stopPropagation();delStudent(${s.id})">✕</button>
    </div>
    ${open?`<div class="t-subjects">
      ${activeSubjs.map(subj=>{
        const sel=S.sel&&S.sel.sid===s.id&&S.sel.subj===subj.name;
        const cnt=S.exams.filter(e=>e.sid===s.id&&e.subj===subj.name).length;
        return`<div class="t-subj-row${sel?' sel':''}" onclick="selectSubj(${s.tid},${s.id},'${subj.name}')">
          <div class="t-subj-dot"></div><span>${subj.name}</span>
          <span class="${subj.type==='count'?'badge-count':'badge-score'}">${subj.type==='count'?'개수':'점수'}</span>
          <span class="t-cnt">${cnt}</span>
          ${S.sbTab==='paused'
            ?`<button class="t-del" style="color:#34d399;" onclick="event.stopPropagation();resumeSubj(${s.id},'${subj.name}')">↩</button>`

// CHART
function drawChart(exams,type){
  if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
  const ctx=document.getElementById('score-chart');if(!ctx)return;
  const unit=type==='count'?'개':'점';
  const vals=exams.map(e=>e.score);
  const maxVal=Math.max(...vals);
  const pad=Math.max(2,Math.round(maxVal*0.1));
  const total=exams.length;
  const padCount=total<=3?1:0;
  const paddedLabels=[...Array(padCount).fill(''),...exams.map(e=>e.name),...Array(padCount).fill('')];
  const paddedVals=[...Array(padCount).fill(null),...vals,...Array(padCount).fill(null)];
  // 학원=보라, 학교=파랑
  const baseColors=exams.map(e=>(e.examType||'academy')==='school'?'rgba(37,99,235,0.85)':'rgba(124,58,237,0.85)');
  const paddedColors=[...Array(padCount).fill('transparent'),...baseColors,...Array(padCount).fill('transparent')];
  S.chartInst=new Chart(ctx,{
    type:'bar',
    data:{labels:paddedLabels,datasets:[{label:'성적',data:paddedVals,backgroundColor:paddedColors,borderWidth:0,borderRadius:8,borderSkipped:false,maxBarThickness:100,barPercentage:0.7,categoryPercentage:0.8}]},
    options:{
      layout:{padding:{right:30}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+unit},backgroundColor:'#111827',padding:10,cornerRadius:8}},
      scales:{
        y:{min:0,max:maxVal+pad,grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>v+unit,font:{size:11}}},
        x:{grid:{display:false},ticks:{font:{size:11},maxRotation:0,autoSkip:false}}
      }
    }
  });
}

// EXAM CRUD
function addExam(){
  const examType=document.getElementById('ei-type').value;
  const name=document.getElementById('ei-name').value.trim();
  const date=document.getElementById('ei-date').value;
  const score=+document.getElementById('ei-score').value;
  if(!name||!date||isNaN(score)||score<0){toast('모든 항목을 입력해주세요');return;}
  S.exams.push({id:nid(),sid:S.sel.sid,subj:S.sel.subj,name,date,score,examType});
  save();renderMain();toast('✅ 추가됐어요');
}
function openEditExam(id){
  const e=S.exams.find(x=>x.id===id);if(!e)return;
  const st=S.students.find(s=>s.id===e.sid);
  const subj=(st.subjects||[]).find(s=>s.name===e.subj)||{type:'score'};
  showModal(`<div class="modal-title"><div class="modal-icon">✏️</div>시험 수정</div>
    <div class="modal-label">구분</div>

function delExam(id){if(!confirm('삭제할까요?'))return;S.exams=S.exams.filter(e=>e.id!==id);save();renderMain();toast('🗑 삭제됐어요');}

// STUDENT CRUD

// SUBJECT CRUD
function openAddSubj(sid){

function addSubj(sid){const n=document.getElementById('subjn').value.trim();if(!n)return;const st=S.students.find(s=>s.id===sid);if(!st.subjects)st.subjects=[];if(st.subjects.find(s=>s.name===n)){toast('이미 있는 과목이에요');return;}st.subjects.push({name:n,type:window._selSubjType||'score'});save();closeModal();S.openS.add(sid);renderTree();toast('✅ '+n+' 과목 추가');}

// 전체 현황
const OV={gradeF:'all',subjF:'all',sort:{key:'grade',dir:1}};
const GRADES_ORDER=['초1','초2','초3','초4','초5','초6','중1','중2','중3','고1','고2','고3'];
function gradeOrder(g){const i=GRADES_ORDER.indexOf(g);return i>=0?i:99;}

function showOverview(){
  S.sel=null;
  document.getElementById('h-tabs').style.display='none';
  document.getElementById('save-btn').style.display='none';
  document.getElementById('h-name').textContent='전체 학생 현황';
  document.getElementById('h-meta').textContent='모든 강사 · 학생 · 과목 통합 보기';
  OV.gradeF='all';OV.subjF='all';OV.sort={key:'grade',dir:1};
  renderOverview();
}

function renderOverview(){
  // 모든 학생-과목 조합 수집 (휴회 제외, 학생 기준으로 묶기)
  let studentRows=[];
  S.students.forEach(st=>{
    const tc=S.teachers.find(t=>t.id===st.tid);
    const activeSubjs=(st.subjects||[]).filter(s=>!s.paused);
    if(activeSubjs.length===0)return;
    const subjData=activeSubjs.map(subj=>{
      const exams=S.exams.filter(e=>e.sid===st.id&&e.subj===subj.name);
      const academyExams=exams.filter(e=>(e.examType||'academy')==='academy');
      const schoolExams=exams.filter(e=>e.examType==='school');
      const avgOf=arr=>arr.length?Math.round(arr.reduce((a,e)=>a+e.score,0)/arr.length):null;
      return{subj,exams,academyExams,schoolExams,acAvg:avgOf(academyExams),scAvg:avgOf(schoolExams)};
    });
    studentRows.push({st,tc,subjData,gradeOrder:gradeOrder(st.grade||'')});
  });

  // 필터
  const gf=OV.gradeF;const sf=OV.subjF;
  let rows=studentRows.filter(r=>{
    if(gf!=='all'&&!(r.st.grade&&r.st.grade.startsWith(gf)))return false;
    if(sf!=='all'&&!r.subjData.find(s=>s.subj.name===sf))return false;
    return true;
  }).map(r=>({...r,subjData:sf==='all'?r.subjData:r.subjData.filter(s=>s.subj.name===sf)}));

  // 정렬
  rows.sort((a,b)=>{
    const{key,dir}=OV.sort;
    let va,vb;
    if(key==='grade'){va=a.gradeOrder;vb=b.gradeOrder;}
    else if(key==='name'){va=a.st.name;vb=b.st.name;}
    else{va=a.gradeOrder;vb=b.gradeOrder;}
    if(typeof va==='string')return dir*(va.localeCompare(vb));
    return dir*(va-vb);
  });

  const total=rows.reduce((a,r)=>a+r.subjData.length,0);

  // 학년/과목 필터 목록
  const allGrades=[...new Set(S.students.map(s=>s.grade||'').filter(Boolean))].sort((a,b)=>gradeOrder(a)-gradeOrder(b));
  const gradeGroups=[...new Set(allGrades.map(g=>g.replace(/[0-9]/g,'')))];
  const allSubjs=[...new Set(S.students.flatMap(s=>(s.subjects||[]).filter(x=>!x.paused).map(x=>x.name)))];

  function sortIcon(k){if(OV.sort.key!==k)return'<span style="color:#ddd;font-size:9px;">⇅</span>';return OV.sort.dir===1?'↑':'↓';}

  const tableRows=rows.map(r=>{
    return r.subjData.map((sd,i)=>{
      const g=sd.acAvg!=null?grade(sd.acAvg):null;
      const diff=sd.acAvg!=null&&sd.scAvg!=null?sd.acAvg-sd.scAvg:null;
      const diffTxt=diff!=null?(diff>0?`+${diff}`:diff===0?'±0':`${diff}`):'—';
      const diffColor=diff==null?'#94a3b8':diff>0?'#059669':diff<0?'#dc2626':'#64748b';
      return`<tr>
        ${i===0?`<td rowspan="${r.subjData.length}" style="color:var(--muted);font-size:12px;vertical-align:middle;border-bottom:2px solid #e2e8f0;">${r.st.grade||'—'}</td>
        <td rowspan="${r.subjData.length}" style="font-weight:700;vertical-align:middle;border-bottom:2px solid #e2e8f0;">${r.st.name}</td>
        <td rowspan="${r.subjData.length}" style="font-size:12px;color:var(--muted);vertical-align:middle;border-bottom:2px solid #e2e8f0;">${r.st.school||'—'}</td>
        <td rowspan="${r.subjData.length}" style="font-size:12px;color:var(--muted);vertical-align:middle;border-bottom:2px solid #e2e8f0;">${r.tc?r.tc.name+' 선생님':'—'}</td>`:''}
        <td><span class="ov-subj-badge">${sd.subj.name}</span></td>
        <td><span class="ov-score">${sd.acAvg!=null?sd.acAvg+'점':'—'}</span><span class="ov-score-sub">${sd.academyExams.length>0?'('+sd.academyExams.length+'회)':''}</span></td>
        <td class="th-school"><span class="ov-score" style="color:#2563eb;">${sd.scAvg!=null?sd.scAvg+'점':'—'}</span><span class="ov-score-sub">${sd.schoolExams.length>0?'('+sd.schoolExams.length+'회)':''}</span></td>
        <td style="font-weight:700;color:${diffColor};">${diffTxt}</td>
        <td>${g?`<span class="ov-grade g${g}">${g}</span>`:'<span style="color:#ddd;">—</span>'}</td>
        ${i===0?`<td rowspan="${r.subjData.length}" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;"><button class="ov-edit-btn" onclick="goToStudent(${r.st.tid},${r.st.id},'${r.subjData[0].subj.name}')">상세 →</button></td>`:''}
      </tr>`;
    }).join('');
  }).join('');

  document.getElementById('content').innerHTML=`<div class="content-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div style="font-size:14px;font-weight:700;">전체 학생 <span style="color:var(--muted);font-weight:400;font-size:12px;">(${total}건)</span></div>
    </div>
    <div class="ov-filter-bar">
      <div class="ov-filter-group">
        <button class="ov-btn${OV.gradeF==='all'?' on':''}" onclick="setOvFilter('grade','all')">전체</button>
        ${gradeGroups.map(g=>`<button class="ov-btn${OV.gradeF===g?' on':''}" onclick="setOvFilter('grade','${g}')">${g==='초'?'초등':g==='중'?'중학':g==='고'?'고등':g}</button>`).join('')}
      </div>
      <div class="ov-filter-group">
        <button class="ov-btn${OV.subjF==='all'?' on':''}" onclick="setOvFilter('subj','all')">전체</button>
        ${allSubjs.map(s=>`<button class="ov-btn${OV.subjF===s?' on':''}" onclick="setOvFilter('subj','${s}')">${s}</button>`).join('')}
      </div>
    </div>
    ${rows.length===0?`<div class="ov-empty">📭 해당하는 학생이 없어요<br><span style="font-size:11px;color:#94a3b8;margin-top:8px;display:block;">학생을 추가하거나 필터를 변경해보세요</span></div>`:`
    <table class="ov-table">
      <thead><tr>
        <th class="sortable" onclick="setSort('grade')">학년 ${sortIcon('grade')}</th>
        <th class="sortable" onclick="setSort('name')">이름 ${sortIcon('name')}</th>
        <th>학교</th>
        <th>선생님</th>
        <th>과목</th>
        <th class="sortable" onclick="setSort('acAvg')">🏫 학원 평균 ${sortIcon('acAvg')}</th>
        <th class="sortable th-school" onclick="setSort('scAvg')">📚 학교 평균 ${sortIcon('scAvg')}</th>
        <th>비교</th>
        <th>등급</th>
        <th></th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`}
  </div>`;
}

  // 학년 그룹
  const allGrades=[...new Set(S.students.map(s=>s.grade||'').filter(Boolean))].sort((a,b)=>gradeOrder(a)-gradeOrder(b));
  const gradeGroups=[...new Set(allGrades.map(g=>g.replace(/[0-9]/g,'')))];

  function sortIcon(k){if(OV.sort.key!==k)return'<span style="color:#ddd;font-size:9px;">⇅</span>';return OV.sort.dir===1?'↑':'↓';}

  const tableRows=rows.map(r=>{
    const subjRows=r.subjData.map((sd,i)=>{
      const g=sd.acAvg!=null?grade(sd.acAvg):null;
      const diff=sd.acAvg!=null&&sd.scAvg!=null?sd.acAvg-sd.scAvg:null;
      const diffTxt=diff!=null?(diff>0?`+${diff}`:diff===0?'±0':`${diff}`):'—';
      const diffColor=diff==null?'#94a3b8':diff>0?'#059669':diff<0?'#dc2626':'#64748b';
      return`<tr>
        ${i===0?`<td rowspan="${r.subjData.length}" style="color:var(--muted);font-size:12px;vertical-align:middle;">${r.st.grade||'—'}</td>
        <td rowspan="${r.subjData.length}" style="font-weight:700;vertical-align:middle;">${r.st.name}</td>
        <td rowspan="${r.subjData.length}" style="font-size:12px;color:var(--muted);vertical-align:middle;">${r.st.school||'—'}</td>
        <td rowspan="${r.subjData.length}" style="font-size:12px;color:var(--muted);vertical-align:middle;">${r.tc?r.tc.name+' 선생님':'—'}</td>`:''}
        <td><span class="ov-subj-badge">${sd.subj.name}</span></td>
        <td><span class="ov-score">${sd.acAvg!=null?sd.acAvg+'점':'—'}</span><span class="ov-score-sub">${sd.academyExams.length>0?'('+sd.academyExams.length+'회)':''}</span></td>
        <td class="th-school"><span class="ov-score" style="color:#2563eb;">${sd.scAvg!=null?sd.scAvg+'점':'—'}</span><span class="ov-score-sub">${sd.schoolExams.length>0?'('+sd.schoolExams.length+'회)':''}</span></td>
        <td style="font-weight:700;color:${diffColor};">${diffTxt}</td>
        <td>${g?`<span class="ov-grade g${g}">${g}</span>`:'<span style="color:#ddd;">—</span>'}</td>
        ${i===0?`<td rowspan="${r.subjData.length}" style="vertical-align:middle;"><button class="ov-edit-btn" onclick="goToStudent(${r.st.tid},${r.st.id},'${r.subjData[0].subj.name}')">상세 →</button></td>`:''}
      </tr>`;
    }).join('');
    return subjRows;
  }).join('');

  document.getElementById('content').innerHTML=`<div class="content-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div style="font-size:14px;font-weight:700;">전체 학생 <span style="color:var(--muted);font-weight:400;font-size:12px;">(${total}건)</span></div>
    </div>
    <div class="ov-filter-bar">
      <div class="ov-filter-group">
        <button class="ov-btn${OV.gradeF==='all'?' on':''}" onclick="setOvFilter('grade','all')">전체</button>
        ${gradeGroups.map(g=>`<button class="ov-btn${OV.gradeF===g?' on':''}" onclick="setOvFilter('grade','${g}')">${g==='초'?'초등':g==='중'?'중학':g==='고'?'고등':g}</button>`).join('')}
      </div>
      <div class="ov-filter-group">
        <button class="ov-btn${OV.subjF==='all'?' on':''}" onclick="setOvFilter('subj','all')">전체</button>
        ${allSubjs.map(s=>`<button class="ov-btn${OV.subjF===s?' on':''}" onclick="setOvFilter('subj','${s}')">${s}</button>`).join('')}
      </div>
    </div>
    ${rows.length===0?`<div class="ov-empty">📭 해당하는 학생이 없어요</div>`:`
    <table class="ov-table">
      <thead><tr>
        <th class="sortable" onclick="setSort('grade')">학년 ${sortIcon('grade')}</th>
        <th class="sortable" onclick="setSort('name')">이름 ${sortIcon('name')}</th>
        <th>학교</th>
        <th>선생님</th>
        <th>과목</th>
        <th class="sortable" onclick="setSort('acAvg')">🏫 학원 평균 ${sortIcon('acAvg')}</th>
        <th class="sortable th-school" onclick="setSort('scAvg')">📚 학교 평균 ${sortIcon('scAvg')}</th>
        <th>비교</th>
        <th class="sortable" onclick="setSort('gradeLabel')">등급 ${sortIcon('gradeLabel')}</th>
        <th></th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`}
  </div>`;
}

function setOvFilter(type,val){
  if(type==='grade') OV.gradeF=val;
  else OV.subjF=val;
  renderOverview();
}
function setSort(k){
  if(OV.sort.key===k) OV.sort.dir*=-1;
  else{OV.sort.key=k;OV.sort.dir=1;}
  renderOverview();
}
function goToStudent(tid,sid,subj){
  S.sel={tid,sid,subj};S.tab='detail';S.examFilter='all';
  S.openT.add(tid);S.openS.add(sid);
  renderTree();renderMain();
}

// MODAL
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

renderTree();renderMain();
</script>
</body>
</html>
