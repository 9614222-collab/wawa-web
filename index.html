<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WAWA 코칭센터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a0f1e;--navy2:#111827;--navy3:#1e2d4a;
  --gold:#f59e0b;--gold2:#fbbf24;
  --accent:#7c3aed;--accent2:#a78bfa;
  --bg:#eef0f8;--card:#fff;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --green:#059669;--red:#dc2626;--blue:#2563eb;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

.layout{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:240px;background:linear-gradient(180deg,#0a0f1e,#111827 60%,#1a2340);display:flex;flex-direction:column;flex-shrink:0;box-shadow:4px 0 24px rgba(0,0,0,.3);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* SIDEBAR */
.sb-brand{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0a0f1e;flex-shrink:0;}
.sb-logo-title{font-size:15px;font-weight:800;color:#fff;}
.sb-logo-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.12em;}

.sb-tabs{display:flex;gap:4px;padding:10px 12px 0;}
.sb-tab{flex:1;padding:6px;border-radius:8px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-tab.on{background:rgba(124,58,237,.4);color:#fff;}
.sb-tab.paused-on{background:rgba(239,68,68,.3);color:#fca5a5;}

.sb-filter{padding:10px 12px 0;}
.sb-filter-label{font-size:9px;color:rgba(255,255,255,.3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.sb-select{width:100%;padding:7px 10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
.sb-select option{background:#1a2340;color:#fff;}

.sb-subj-wrap{padding:8px 12px 0;}
.sb-subj-btns{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.sb-subj-btn{padding:3px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-subj-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.sb-subj-btn.on{background:#f59e0b;border-color:#f59e0b;color:#0a0f1e;}

.sb-sort{display:flex;gap:6px;padding:8px 12px 4px;}
.sb-sort-btn{flex:1;padding:5px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-sort-btn.on{background:rgba(255,255,255,.12);color:#fff;}

.sb-count{padding:4px 14px;font-size:11px;color:rgba(255,255,255,.3);}
.sb-list{flex:1;overflow-y:auto;padding:2px 10px 4px;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}

.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:all .15s;margin-bottom:2px;}
.sb-item:hover{background:rgba(255,255,255,.05);}
.sb-item.sel{background:rgba(124,58,237,.25);}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-dot.active{background:#34d399;}
.sb-dot.paused{background:#ef4444;}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);}
.sb-meta{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.sb-avg{font-size:12px;font-weight:700;color:rgba(255,255,255,.5);white-space:nowrap;}
.sb-more{background:none;border:none;color:rgba(255,255,255,.2);font-size:13px;padding:2px 5px;border-radius:4px;transition:all .15s;}
.sb-more:hover{background:rgba(255,255,255,.08);color:#fff;}

.sb-bottom{padding:10px 12px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:6px;}
.sb-add-btn{flex:1;padding:7px;border-radius:8px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.sb-add-btn:hover{background:rgba(255,255,255,.1);color:#fff;}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:64px;box-shadow:0 2px 12px rgba(124,58,237,.06);}
.h-name{font-size:17px;font-weight:800;}
.h-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.h-right{display:flex;align-items:center;gap:8px;}
.h-tabs{display:flex;gap:3px;background:#ede9fe;padding:3px;border-radius:10px;}
.h-tab{padding:6px 18px;border-radius:7px;border:none;background:transparent;color:#7c3aed;font-size:12px;font-weight:600;opacity:.6;cursor:pointer;transition:all .15s;}
.h-tab.on{background:#fff;color:#5b21b6;box-shadow:0 1px 6px rgba(124,58,237,.15);opacity:1;}
.btn-save{display:flex;align-items:center;gap:5px;padding:8px 14px;background:linear-gradient(135deg,#0a0f1e,#1e2d4a);color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-overview{display:flex;align-items:center;gap:5px;padding:8px 14px;background:linear-gradient(135deg,#059669,#34d399);color:#fff;border:none;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:28px 0;background:var(--bg);}
.ci{max-width:880px;margin:0 auto;padding:0 28px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:#d4d8e8;border-radius:3px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;}
.welcome-icon{font-size:52px;opacity:.12;}
.welcome-text{font-size:14px;font-weight:500;color:var(--muted);}

/* STAT CARDS */
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.score-card{border-radius:16px;padding:22px;position:relative;overflow:hidden;color:#fff;}
.sc-1{background:linear-gradient(135deg,#1d4ed8,#3b82f6);}
.sc-2{background:linear-gradient(135deg,#b45309,#f59e0b);}
.sc-3{background:linear-gradient(135deg,#6d28d9,#a78bfa);}
.score-card::before{content:'';position:absolute;top:-28px;right:-28px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07);}
.sc-label{font-size:10px;opacity:.68;margin-bottom:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.sc-val{font-size:34px;font-weight:900;line-height:1;}
.sc-unit{font-size:14px;opacity:.6;margin-left:3px;font-weight:500;}
.sc-sub{font-size:10px;opacity:.42;margin-top:7px;}

/* CARD */
.card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.card-title{font-size:13px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:3px;height:15px;background:linear-gradient(to bottom,#7c3aed,#f59e0b);border-radius:2px;flex-shrink:0;}

/* EXAM FILTER */
.exam-filter{display:flex;gap:6px;margin-bottom:14px;}
.ef-btn{padding:5px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.ef-btn.on{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.ef-btn.school.on{background:#2563eb;border-color:#2563eb;}
.ef-btn.academy.on{background:#059669;border-color:#059669;}

/* EXAM ITEMS */
.exam-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;transition:all .2s;}
.exam-item:hover{border-color:#c4b5fd;box-shadow:0 3px 12px rgba(124,58,237,.09);}
.exam-date{font-size:10px;color:var(--muted);width:76px;flex-shrink:0;}
.exam-name{flex:1;font-size:13px;font-weight:600;}
.exam-bar{height:4px;border-radius:2px;background:#f1f5f9;margin-top:5px;overflow:hidden;}
.exam-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7c3aed,#f59e0b);}
.exam-type-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0;}
.etb-school{background:#dbeafe;color:#1d4ed8;}
.etb-academy{background:#d1fae5;color:#065f46;}
.exam-score{font-size:18px;font-weight:800;}
.exam-unit{font-size:10px;color:var(--muted);margin-left:1px;}
.grade-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.gA{background:#059669;}.gB{background:#2563eb;}.gC{background:#d97706;}.gD{background:#ea580c;}.gF{background:#dc2626;}
.exam-actions{display:flex;gap:3px;}
.exam-edit-btn,.exam-del-btn{background:none;border:none;padding:5px 7px;border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;}
.exam-edit-btn:hover{background:#ede9fe;color:#7c3aed;}
.exam-del-btn:hover{background:#fee2e2;color:#dc2626;}

/* ADD FORM */
.add-form{background:linear-gradient(135deg,#f8f9ff,#f0f2fc);border:2px dashed #c4b5fd;border-radius:12px;padding:16px 18px;margin-top:12px;}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.form-input{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;transition:border .15s;color:var(--text);}
.form-input:focus{border-color:#7c3aed;}
.form-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none;color:var(--text);}

/* BUTTONS */
.btn-primary{padding:8px 20px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 10px rgba(124,58,237,.3);}
.btn-primary:hover{box-shadow:0 4px 16px rgba(124,58,237,.4);}
.btn-ghost{padding:8px 14px;background:#fff;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-ghost:hover{border-color:#7c3aed;color:#7c3aed;}
.btn-danger{padding:8px 14px;background:#fff;color:#dc2626;border:1.5px solid #fca5a5;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}

/* REPORT HERO */
.report-hero{background:linear-gradient(135deg,#0a0f1e,#1e2d4a,#2d1b69);border-radius:20px;padding:28px;margin-bottom:18px;position:relative;overflow:hidden;}
.rh-g1{position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.3),transparent 70%);pointer-events:none;}
.rh-g2{position:absolute;bottom:-50px;left:20px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.15),transparent 70%);pointer-events:none;}
.rh-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.rh-logo{display:flex;align-items:center;gap:9px;}
.rh-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#0a0f1e;}
.rh-logo-t1{font-size:13px;font-weight:800;color:#fff;}
.rh-logo-t2{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.1em;}
.rh-badge{background:rgba(124,58,237,.28);color:#a78bfa;border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;}
.rh-date{font-size:10px;color:rgba(255,255,255,.22);}
.rh-name{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;}
.rh-sub{font-size:12px;color:rgba(255,255,255,.38);margin-bottom:20px;}
.rh-scores{display:flex;gap:10px;flex-wrap:wrap;}
.rh-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:13px 20px;}
.rh-box-label{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.rh-box-val{font-size:23px;font-weight:900;color:#fff;}
.rh-box-val.gold{color:#fbbf24;}
.rh-box-val.green{color:#34d399;}
.rh-box-val.blue{color:#60a5fa;}

.chart-wrap{height:220px;margin:4px 0;}
.re-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:7px;background:#fff;}
.re-name{font-size:13px;font-weight:700;}
.re-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.re-score{font-size:19px;font-weight:900;margin-left:auto;}

/* MSG */
.msg-auto-btn{display:flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(124,58,237,.35);}
.msg-textarea{width:100%;min-height:160px;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:12px;line-height:1.9;resize:vertical;outline:none;background:#fafbff;color:var(--text);}
.msg-textarea:focus{border-color:#7c3aed;}
.msg-copy-btn{padding:8px 14px;background:#fff;border:1.5px solid var(--border);border-radius:9px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;}
.msg-copy-btn:hover{border-color:#7c3aed;color:#7c3aed;}
.report-footer{text-align:center;padding:14px;color:var(--muted);font-size:10px;font-weight:500;letter-spacing:.05em;}

/* OVERVIEW */
.ov-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ov-filter-group{display:flex;gap:3px;background:#f1f5f9;padding:3px;border-radius:10px;}
.ov-btn{padding:5px 13px;border-radius:7px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.ov-btn.on{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ov-table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04);}
.ov-table th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);background:#f8f9fc;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;}
.ov-table th:hover{color:var(--accent);}
.ov-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.ov-table tr:last-child td{border-bottom:none;}
.ov-table tr:hover td{background:#fafbff;}
.ov-subj-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#ede9fe;color:#5b21b6;}
.ov-score{font-size:14px;font-weight:800;color:var(--navy);}
.ov-score-sub{font-size:10px;color:var(--muted);margin-left:3px;}
.ov-grade{width:27px;height:27px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.th-school{background:linear-gradient(90deg,#eff6ff,#f8f9fc)!important;}
.ov-edit-btn{padding:4px 10px;border:1.5px solid var(--border);border-radius:7px;background:#fff;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;}
.ov-edit-btn:hover{border-color:#7c3aed;color:#7c3aed;}
.ov-empty{text-align:center;padding:48px;color:var(--muted);font-size:13px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:20px;padding:28px;width:360px;box-shadow:0 24px 64px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.modal-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;font-size:14px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;margin-bottom:12px;color:var(--text);}
.modal-input:focus{border-color:#7c3aed;}
.modal-label{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-btn{flex:1;padding:9px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);}
.type-btn.on{border-color:#7c3aed;color:#7c3aed;background:#ede9fe;}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(12px);background:#111827;color:#fff;padding:11px 22px;border-radius:12px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo-icon">W</div>
      <div><div class="sb-logo-title">WAWA</div><div class="sb-logo-sub">코 칭 센 터</div></div>
    </div>
    <div class="sb-tabs">
      <button class="sb-tab on" id="sb-tab-active" onclick="setSbTab('active')">재원</button>
      <button class="sb-tab" id="sb-tab-paused" onclick="setSbTab('paused')">휴회</button>
    </div>
    <div class="sb-filter">
      <div class="sb-filter-label">선생님</div>
      <select class="sb-select" id="sb-teacher-sel" onchange="SB.teacherF=this.value;renderSidebar()">
        <option value="all">전체 선생님</option>
      </select>
    </div>
    <div class="sb-subj-wrap">
      <div class="sb-filter-label">과목</div>
      <div class="sb-subj-btns" id="sb-subj-btns"></div>
    </div>
    <div class="sb-sort">
      <button class="sb-sort-btn on" id="sb-sort-grade" onclick="setSbSort('grade')">학년순</button>
      <button class="sb-sort-btn" id="sb-sort-name" onclick="setSbSort('name')">이름순</button>
    </div>
    <div class="sb-count" id="sb-count">학생 (0명)</div>
    <div class="sb-list" id="sb-list"></div>
    <div class="sb-bottom">
      <button class="sb-add-btn" onclick="openAddStudent()">＋ 학생 추가</button>
      <button class="sb-add-btn" onclick="openAddTeacher()">＋ 강사 추가</button>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <div>
        <div class="h-name" id="h-name">WAWA 코칭센터</div>
        <div class="h-meta" id="h-meta">강사 → 학생 → 과목을 선택하세요</div>
      </div>
      <div class="h-right">
        <div class="h-tabs" id="h-tabs" style="display:none;">
          <button class="h-tab on" id="tab-detail" onclick="setTab('detail')">상세</button>
          <button class="h-tab" id="tab-report" onclick="setTab('report')">보고서</button>
        </div>
        <button class="btn-save" id="save-btn" style="display:none;" onclick="saveReportImage()">📥 이미지 저장</button>
        <button class="btn-overview" onclick="showOverview()">👥 전체 현황</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="welcome"><div class="welcome-icon">📊</div><div class="welcome-text">왼쪽에서 학생과 과목을 선택하세요</div></div>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
// STATE
const S={
  teachers:JSON.parse(localStorage.getItem('wawa_teachers')||'[]'),
  students:JSON.parse(localStorage.getItem('wawa_students')||'[]'),
  exams:JSON.parse(localStorage.getItem('wawa_exams')||'[]'),
  sel:null,tab:'detail',chartInst:null,examFilter:'all',sbTab:'active',
};
const SB={teacherF:'all',subjF:'all',sort:'grade'};
const OV={gradeF:'all',subjF:'all',sort:{key:'grade',dir:1}};
let nextId=+localStorage.getItem('wawa_nid')||1;

function nid(){const i=nextId++;localStorage.setItem('wawa_nid',nextId);return i;}
function save(){
  localStorage.setItem('wawa_teachers',JSON.stringify(S.teachers));
  localStorage.setItem('wawa_students',JSON.stringify(S.students));
  localStorage.setItem('wawa_exams',JSON.stringify(S.exams));
}
function grade(v){if(v>=90)return'A';if(v>=80)return'B';if(v>=70)return'C';if(v>=60)return'D';return'F';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2300);}
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

const GRADE_ORDER=['초1','초2','초3','초4','초5','초6','중1','중2','중3','고1','고2','고3'];
function gradeOrder(g){const i=GRADE_ORDER.indexOf(g);return i>=0?i:99;}

// SIDEBAR TAB
function setSbTab(t){
  S.sbTab=t;
  document.getElementById('sb-tab-active').classList.toggle('on',t==='active');
  document.getElementById('sb-tab-paused').classList.toggle('on',t==='paused');
  document.getElementById('sb-tab-paused').classList.toggle('paused-on',t==='paused');
  renderSidebar();
}
function setSbSort(s){
  SB.sort=s;
  document.getElementById('sb-sort-grade').classList.toggle('on',s==='grade');
  document.getElementById('sb-sort-name').classList.toggle('on',s==='name');
  renderSidebar();
}

// SIDEBAR RENDER
function renderSidebar(){
  // 선생님 드롭다운
  const sel=document.getElementById('sb-teacher-sel');
  const prev=SB.teacherF;
  sel.innerHTML='<option value="all">전체 선생님</option>'+
    S.teachers.map(t=>`<option value="${t.id}"${String(t.id)===String(prev)?' selected':''}>${t.name} 선생님</option>`).join('');

  // 과목 버튼
  const allSubjs=[...new Set(S.students.flatMap(s=>(s.subjects||[]).map(x=>x.name)))];
  document.getElementById('sb-subj-btns').innerHTML=
    `<button class="sb-subj-btn${SB.subjF==='all'?' on':''}" onclick="SB.subjF='all';renderSidebar()">전체</button>`+
    allSubjs.map(s=>`<button class="sb-subj-btn${SB.subjF===s?' on':''}" onclick="SB.subjF='${s}';renderSidebar()">${s}</button>`).join('');

  // 학생-과목 아이템
  let items=[];
  S.students.forEach(st=>{
    const tc=S.teachers.find(t=>t.id===st.tid);
    (st.subjects||[]).forEach(subj=>{
      const isPaused=!!subj.paused;
      if(S.sbTab==='paused'&&!isPaused)return;
      if(S.sbTab==='active'&&isPaused)return;
      if(SB.teacherF!=='all'&&String(st.tid)!==String(SB.teacherF))return;
      if(SB.subjF!=='all'&&subj.name!==SB.subjF)return;
      const exams=S.exams.filter(e=>e.sid===st.id&&e.subj===subj.name&&(e.examType||'academy')==='academy');
      const avg=exams.length?Math.round(exams.reduce((a,e)=>a+e.score,0)/exams.length*10)/10:null;
      items.push({st,tc,subj,avg,isPaused});
    });
  });

  // 정렬
  items.sort((a,b)=>SB.sort==='name'?
    a.st.name.localeCompare(b.st.name):
    gradeOrder(a.st.grade||'')-gradeOrder(b.st.grade||''));

  document.getElementById('sb-count').textContent=`학생 (${items.length}명)`;
  const unit_=it=>it.subj.type==='count'?'개':'점';

  document.getElementById('sb-list').innerHTML=items.map(it=>{
    const isSel=S.sel&&S.sel.sid===it.st.id&&S.sel.subj===it.subj.name;
    return`<div class="sb-item${isSel?' sel':''}" onclick="selectSubj(${it.st.tid},${it.st.id},'${it.subj.name}')">
      <div class="sb-dot ${it.isPaused?'paused':'active'}"></div>
      <div class="sb-info">
        <div class="sb-name">${it.st.name}${it.isPaused?'<span style="font-size:9px;background:rgba(239,68,68,.2);color:#fca5a5;padding:1px 5px;border-radius:5px;margin-left:4px;">휴회</span>':''}</div>
        <div class="sb-meta">${it.st.grade||''} · ${it.subj.name}</div>
      </div>
      ${it.avg!=null?`<span class="sb-avg">${it.avg}${unit_(it)}</span>`:''}
      <button class="sb-more" onclick="event.stopPropagation();openItemMenu(${it.st.id},'${it.subj.name}',${it.isPaused})">···</button>
    </div>`;
  }).join('');
}

function openItemMenu(sid,subjName,isPaused){
  const st=S.students.find(s=>s.id===sid);
  showModal(`<div class="modal-title"><div class="modal-icon">⚙️</div>${st.name} · ${subjName}</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${isPaused
        ?`<button class="btn-primary" style="background:linear-gradient(135deg,#059669,#34d399);" onclick="resumeSubj(${sid},'${subjName}')">↩ 재원 복귀</button>`
        :`<button class="btn-primary" style="background:linear-gradient(135deg,#dc2626,#ef4444);" onclick="closeModal();openPauseSubj(${sid},'${subjName}')">⏸ 휴회 처리</button>`
      }
      <button class="btn-ghost" onclick="openAddSubj(${sid})">＋ 과목 추가</button>
      <button class="btn-ghost" style="color:#dc2626;border-color:#fca5a5;" onclick="if(confirm('${subjName} 과목을 삭제할까요?')){delSubj(${sid},'${subjName}');closeModal()}">🗑 과목 삭제</button>
      <button class="btn-danger" onclick="if(confirm('${st.name} 학생 전체를 삭제할까요?')){delStudent(${sid});closeModal()}">⚠️ 학생 전체 삭제</button>
      <button class="btn-ghost" onclick="closeModal()">취소</button>
    </div>`);
}

function selectSubj(tid,sid,subj){
  S.sel={tid,sid,subj};S.tab='detail';S.examFilter='all';
  renderSidebar();renderMain();
}

// MAIN
function renderMain(){
  if(!S.sel){
    document.getElementById('h-tabs').style.display='none';
    document.getElementById('save-btn').style.display='none';
    document.getElementById('h-name').textContent='WAWA 코칭센터';
    document.getElementById('h-meta').textContent='강사 → 학생 → 과목을 선택하세요';
    document.getElementById('content').innerHTML='<div class="welcome"><div class="welcome-icon">📊</div><div class="welcome-text">왼쪽에서 학생과 과목을 선택하세요</div></div>';
    return;
  }
  const st=S.students.find(s=>s.id===S.sel.sid);
  const tc=S.teachers.find(t=>t.id===S.sel.tid);
  const subj=(st.subjects||[]).find(s=>s.name===S.sel.subj)||{name:S.sel.subj,type:'score'};
  document.getElementById('h-tabs').style.display='flex';
  document.getElementById('save-btn').style.display=S.tab==='report'?'flex':'none';
  ['detail','report'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('on',S.tab===t));
  document.getElementById('h-name').textContent=st.name+' 학생';
  document.getElementById('h-meta').innerHTML=`${st.grade||''} · <strong>${S.sel.subj}</strong> · ${tc?tc.name+' 선생님':''}${st.school?' · '+st.school:''}`;
  S.tab==='detail'?renderDetail(st,subj):renderReport(st,subj,tc);
}
function setTab(t){S.tab=t;renderMain();}

// 시험 필터
function filteredExams(all){
  if(S.examFilter==='all')return all;
  return all.filter(e=>(e.examType||'academy')===S.examFilter);
}
function filterTabsHTML(){
  const f=S.examFilter;
  return`<div class="exam-filter">
    <button class="ef-btn${f==='all'?' on':''}" onclick="S.examFilter='all';renderMain()">전체</button>
    <button class="ef-btn academy${f==='academy'?' on':''}" onclick="S.examFilter='academy';renderMain()">학원</button>
    <button class="ef-btn school${f==='school'?' on':''}" onclick="S.examFilter='school';renderMain()">학교</button>
  </div>`;
}

// DETAIL
function renderDetail(st,subj){
  const allExams=S.exams.filter(e=>e.sid===st.id&&e.subj===subj.name).sort((a,b)=>a.date.localeCompare(b.date));
  const exams=filteredExams(allExams);
  const type=subj.type||'score';const vals=exams.map(e=>e.score);
  const latest=vals.length?vals[vals.length-1]:null;const max=vals.length?Math.max(...vals):null;
  const unit=type==='count'?'개':'점';
  const rows=[...exams].reverse().map(e=>{
    const g=type==='score'?grade(e.score):null;
    const et=e.examType||'academy';
    return`<div class="exam-item">
      <div class="exam-date">${e.date}</div>
      <div style="flex:1"><div class="exam-name">${e.name}</div><div class="exam-bar"><div class="exam-bar-fill" style="width:${Math.min(100,e.score)}%"></div></div></div>
      <span class="exam-type-badge ${et==='school'?'etb-school':'etb-academy'}">${et==='school'?'학교':'학원'}</span>
      <div><span class="exam-score">${e.score}</span><span class="exam-unit">${unit}</span></div>
      ${g?`<div class="grade-badge g${g}">${g}</div>`:''}
      <div class="exam-actions"><button class="exam-edit-btn" onclick="openEditExam(${e.id})">✏️</button><button class="exam-del-btn" onclick="delExam(${e.id})">🗑</button></div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="ci">
    <div class="score-grid">
      <div class="score-card sc-1"><div class="sc-label">최근 ${unit==='개'?'갯수':'점수'}</div><div class="sc-val">${latest??'—'}<span class="sc-unit">${unit}</span></div><div class="sc-sub">${exams.length?exams[exams.length-1].name:''}</div></div>
      <div class="score-card sc-2"><div class="sc-label">최고 ${unit==='개'?'갯수':'점수'}</div><div class="sc-val">${max??'—'}<span class="sc-unit">${unit}</span></div></div>
      <div class="score-card sc-3"><div class="sc-label">시험 횟수</div><div class="sc-val">${vals.length}<span class="sc-unit">회</span></div></div>
    </div>
    <div class="card">
      <div class="card-title">시험 기록</div>
      ${filterTabsHTML()}
      ${rows||'<div style="text-align:center;color:var(--muted);padding:28px;">아직 시험 기록이 없어요</div>'}
      <div class="add-form"><div class="form-row">
        <div class="form-group"><div class="form-label">구분</div><select class="form-select" id="ei-type" style="width:80px;"><option value="academy">학원</option><option value="school">학교</option></select></div>
        <div class="form-group"><div class="form-label">시험명</div><input class="form-input" id="ei-name" placeholder="예: 4월 단원평가" style="width:140px;"/></div>
        <div class="form-group"><div class="form-label">날짜</div><input class="form-input" id="ei-date" type="date" value="${new Date().toISOString().slice(0,10)}" style="width:130px;"/></div>
        <div class="form-group"><div class="form-label">${type==='count'?'갯수':'점수'}</div><input class="form-input" id="ei-score" type="number" min="0" placeholder="${type==='count'?'예:23':'예:85'}" style="width:80px;"/></div>
        <div class="form-group" style="justify-content:flex-end;"><button class="btn-primary" onclick="addExam()">+ 추가</button></div>
      </div></div>
    </div>
  </div>`;
}

// REPORT
function renderReport(st,subj,tc){
  const allExams=S.exams.filter(e=>e.sid===st.id&&e.subj===subj.name).sort((a,b)=>a.date.localeCompare(b.date));
  const exams=filteredExams(allExams);
  const type=subj.type||'score';const vals=exams.map(e=>e.score);
  const latest=vals.length?vals[vals.length-1]:null;const maxv=vals.length?Math.max(...vals):null;
  const unit=type==='count'?'개':'점';
  const today=new Date().toLocaleDateString('ko-KR');
  const rows=[...exams].reverse().map(e=>{
    const g=type==='score'?grade(e.score):null;
    const et=e.examType||'academy';
    return`<div class="re-item"><div style="flex:1"><div class="re-name">${e.name}</div><div class="re-meta">${e.date}</div></div>
      <span class="exam-type-badge ${et==='school'?'etb-school':'etb-academy'}" style="margin-right:8px;">${et==='school'?'학교':'학원'}</span>
      <div class="re-score">${e.score}${unit}</div>${g?`<div class="grade-badge g${g}">${g}</div>`:''}</div>`;
  }).join('');

  document.getElementById('content').innerHTML=`<div class="ci">
    <div class="report-hero">
      <div class="rh-g1"></div><div class="rh-g2"></div>
      <div class="rh-header">
        <div class="rh-logo"><div class="rh-logo-icon">W</div><div><div class="rh-logo-t1">WAWA</div><div class="rh-logo-t2">코 칭 센 터</div></div></div>
        <div class="rh-badge">✦ 학습 성과 리포트</div>
        <div class="rh-date">${today} 발행</div>
      </div>
      <div class="rh-name">${st.name} 학생</div>
      <div class="rh-sub">${st.grade||''} · ${subj.name} · ${tc?tc.name+' 선생님':''}</div>
      <div class="rh-scores">
        <div class="rh-box"><div class="rh-box-label">최근</div><div class="rh-box-val gold">${latest??'—'}${unit}</div></div>
        <div class="rh-box"><div class="rh-box-label">최고</div><div class="rh-box-val green">${maxv??'—'}${vals.length?unit:''}</div></div>
        <div class="rh-box"><div class="rh-box-label">시험 횟수</div><div class="rh-box-val blue">${vals.length}회</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">성적 추이</div>
      ${filterTabsHTML()}
      ${exams.length>=1?'<div class="chart-wrap"><canvas id="score-chart"></canvas></div>':'<div style="text-align:center;color:var(--muted);padding:24px;">시험 기록을 추가하면 그래프가 표시됩니다</div>'}
    </div>
    <div class="card">
      <div class="card-title">시험별 성적</div>
      ${rows||'<div style="text-align:center;color:var(--muted);padding:24px;">기록 없음</div>'}
    </div>
    <div class="card">
      <div class="card-title">학부모 안내 메시지</div>
      <div id="memo-section" style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
          <div style="font-size:12px;font-weight:700;color:#7c3aed;">✏️ 선생님 메모</div>
          <button onclick="toggleMemo()" id="memo-toggle-btn" style="background:none;border:1.5px solid #c4b5fd;border-radius:7px;padding:3px 10px;font-size:11px;color:#7c3aed;font-weight:600;cursor:pointer;">펼치기 ▼</button>
        </div>
        <div id="memo-box" style="display:none;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1.5px solid #c4b5fd;border-radius:12px;padding:14px 16px;">
          <textarea id="fb-memo" style="width:100%;min-height:100px;padding:10px 12px;border:1.5px solid #ddd6fe;border-radius:9px;font-size:13px;line-height:1.8;resize:vertical;outline:none;background:#fff;color:var(--text);font-family:inherit;" placeholder="잘한 점 / 아쉬운 점 / 앞으로의 방향을 자유롭게 적어주세요" oninput="saveMemo()">${getMemo()}</textarea>
        </div>
      </div>
      <div id="ai-btn-wrap" style="display:flex;justify-content:center;margin-bottom:14px;">
        <button class="msg-auto-btn" onclick="autoMsg()">✦ AI로 정리하기</button>
      </div>
      <div id="msg-result-box" style="${getMsg()?'':'display:none;'}">
        <div style="background:#fff;border:1.5px solid #e9d5ff;border-radius:14px;padding:20px 22px;margin-bottom:10px;">
          <div style="font-size:11px;font-weight:700;color:#7c3aed;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #ede9fe;">📋 학부모 안내 메시지</div>
          <div id="msg-rendered" style="font-size:13px;line-height:2;color:var(--text);">${getMsg()?`<div style="white-space:pre-wrap;">${getMsg()}</div>`:''}</div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;">
          <button class="msg-copy-btn" onclick="copyMsg()">📋 복사하기</button>
          <button class="msg-copy-btn" onclick="editMsg()" style="border-color:#c4b5fd;color:#7c3aed;">✏️ 직접 수정</button>
        </div>
      </div>
      <textarea class="msg-textarea" id="msg-area" style="${getMsg()?'display:none;':''}" placeholder="위에 메모를 입력하고 'AI로 정리하기'를 눌러보세요." oninput="saveMsg()">${getMsg()}</textarea>
    </div>
    <div class="report-footer">WAWA 코칭센터 · ${tc?tc.name+' 선생님':'담당 선생님'} · ${today}</div>
  </div>`;
  if(exams.length>=1)drawChart(exams,type);
}

// CHART
function drawChart(exams,type){
  if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
  const ctx=document.getElementById('score-chart');if(!ctx)return;
  const unit=type==='count'?'개':'점';
  const vals=exams.map(e=>e.score);
  const maxVal=Math.max(...vals);
  const pad=Math.max(2,Math.round(maxVal*0.1));
  const pc=exams.length<=3?1:0;
  const labels=[...Array(pc).fill(''),...exams.map(e=>e.name),...Array(pc).fill('')];
  const data=[...Array(pc).fill(null),...vals,...Array(pc).fill(null)];
  const colors=[...Array(pc).fill('transparent'),...exams.map(e=>(e.examType||'academy')==='school'?'rgba(37,99,235,.85)':'rgba(124,58,237,.85)'),...Array(pc).fill('transparent')];
  S.chartInst=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:'성적',data,backgroundColor:colors,borderWidth:0,borderRadius:8,borderSkipped:false,maxBarThickness:100,barPercentage:.7,categoryPercentage:.8}]},
    options:{
      layout:{padding:{right:20}},
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+unit},backgroundColor:'#111827',padding:10,cornerRadius:8}},
      scales:{y:{min:0,max:maxVal+pad,grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>v+unit,font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11},maxRotation:0}}}
    }
  });
}

// MEMO / MSG
function toggleMemo(){const b=document.getElementById('memo-box');const btn=document.getElementById('memo-toggle-btn');if(!b||!btn)return;const o=b.style.display==='block';b.style.display=o?'none':'block';btn.textContent=o?'펼치기 ▼':'접기 ▲';}
function memoKey(){return`memo_${S.sel?.sid}_${S.sel?.subj}`;}
function getMemo(){return S.sel?localStorage.getItem(memoKey())||''  :'';}
function saveMemo(){const a=document.getElementById('fb-memo');if(a)localStorage.setItem(memoKey(),a.value);}
function msgKey(){return`msg_${S.sel?.sid}_${S.sel?.subj}`;}
function getMsg(){return S.sel?localStorage.getItem(msgKey())||''  :'';}
function saveMsg(){const a=document.getElementById('msg-area');if(a)localStorage.setItem(msgKey(),a.value);}
function copyMsg(){const txt=document.getElementById('msg-rendered')?.textContent||document.getElementById('msg-area')?.value||'';if(!txt)return;navigator.clipboard.writeText(txt).then(()=>toast('📋 복사됐어요'));}
function editMsg(){const r=document.getElementById('msg-result-box');const t=document.getElementById('msg-area');if(r&&t){r.style.display='none';t.style.display='block';t.focus();}}

async function autoMsg(){
  const st=S.students.find(s=>s.id===S.sel.sid);
  const tc=S.teachers.find(t=>t.id===S.sel.tid);
  const subj=(st.subjects||[]).find(s=>s.name===S.sel.subj)||{type:'score'};
  const exams=S.exams.filter(e=>e.sid===st.id&&e.subj===S.sel.subj).sort((a,b)=>a.date.localeCompare(b.date));
  const unit=subj.type==='count'?'개':'점';
  const vals=exams.map(e=>e.score);const latest=vals.length?vals[vals.length-1]:null;
  const memo=document.getElementById('fb-memo')?.value||'';
  if(!memo.trim()){toast('선생님 메모를 먼저 입력해주세요!');return;}

// OVERVIEW
function showOverview(){
  S.sel=null;
  document.getElementById('h-tabs').style.display='none';
  document.getElementById('save-btn').style.display='none';
  document.getElementById('h-name').textContent='전체 학생 현황';
  document.getElementById('h-meta').textContent='모든 강사 · 학생 · 과목 통합 보기';
  OV.gradeF='all';OV.subjF='all';OV.sort={key:'grade',dir:1};
  renderOverview();
}
function renderOverview(){
  let studentRows=[];
  S.students.forEach(st=>{
    const tc=S.teachers.find(t=>t.id===st.tid);
    const activeSubjs=(st.subjects||[]).filter(s=>!s.paused);
    if(activeSubjs.length===0)return;
    const subjData=activeSubjs.map(subj=>{
      const exams=S.exams.filter(e=>e.sid===st.id&&e.subj===subj.name);
      const aEx=exams.filter(e=>(e.examType||'academy')==='academy');
      const sEx=exams.filter(e=>e.examType==='school');
      const avg=arr=>arr.length?Math.round(arr.reduce((a,e)=>a+e.score,0)/arr.length):null;
      return{subj,aEx,sEx,acAvg:avg(aEx),scAvg:avg(sEx)};
    });
    studentRows.push({st,tc,subjData,go:gradeOrder(st.grade||'')});
  });

  const gf=OV.gradeF;const sf=OV.subjF;
  let rows=studentRows.filter(r=>{
    if(gf!=='all'&&!(r.st.grade&&r.st.grade.startsWith(gf)))return false;
    if(sf!=='all'&&!r.subjData.find(s=>s.subj.name===sf))return false;
    return true;
  }).map(r=>({...r,subjData:sf==='all'?r.subjData:r.subjData.filter(s=>s.subj.name===sf)}));

  rows.sort((a,b)=>{
    const{key,dir}=OV.sort;
    if(key==='name')return dir*a.st.name.localeCompare(b.st.name);
    return dir*(a.go-b.go);
  });

  const total=rows.reduce((a,r)=>a+r.subjData.length,0);
  const allGrades=[...new Set(S.students.map(s=>s.grade||'').filter(Boolean))].sort((a,b)=>gradeOrder(a)-gradeOrder(b));
  const gradeGroups=[...new Set(allGrades.map(g=>g.replace(/[0-9]/g,'')))];
  const allSubjs=[...new Set(S.students.flatMap(s=>(s.subjects||[]).filter(x=>!x.paused).map(x=>x.name)))];
  const si=k=>OV.sort.key===k?(OV.sort.dir===1?'↑':'↓'):'<span style="color:#ddd;font-size:9px;">⇅</span>';

  const tableRows=rows.map(r=>r.subjData.map((sd,i)=>{
    const g=sd.acAvg!=null?grade(sd.acAvg):null;
    const diff=sd.acAvg!=null&&sd.scAvg!=null?sd.acAvg-sd.scAvg:null;
    const diffTxt=diff!=null?(diff>0?`+${diff}`:diff===0?'±0':`${diff}`):'—';
    const diffColor=diff==null?'#94a3b8':diff>0?'#059669':diff<0?'#dc2626':'#64748b';
    return`<tr>
      ${i===0?`<td rowspan="${r.subjData.length}" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;color:var(--muted);font-size:12px;">${r.st.grade||'—'}</td>
      <td rowspan="${r.subjData.length}" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;font-weight:700;">${r.st.name}</td>
      <td rowspan="${r.subjData.length}" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;font-size:12px;color:var(--muted);">${r.st.school||'—'}</td>
      <td rowspan="${r.subjData.length}" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;font-size:12px;color:var(--muted);">${r.tc?r.tc.name+' 선생님':'—'}</td>`:''}
      <td><span class="ov-subj-badge">${sd.subj.name}</span></td>
      <td><span class="ov-score">${sd.acAvg!=null?sd.acAvg+'점':'—'}</span><span class="ov-score-sub">${sd.aEx.length>0?'('+sd.aEx.length+'회)':''}</span></td>
      <td class="th-school"><span class="ov-score" style="color:#2563eb;">${sd.scAvg!=null?sd.scAvg+'점':'—'}</span><span class="ov-score-sub">${sd.sEx.length>0?'('+sd.sEx.length+'회)':''}</span></td>
      <td style="font-weight:700;color:${diffColor};">${diffTxt}</td>
      <td>${g?`<span class="ov-grade g${g}">${g}</span>`:'<span style="color:#ddd;">—</span>'}</td>
      ${i===0?`<td rowspan="${r.subjData.length}" style="vertical-align:middle;border-bottom:2px solid #e2e8f0;"><button class="ov-edit-btn" onclick="goToStudent(${r.st.tid},${r.st.id},'${r.subjData[0].subj.name}')">상세 →</button></td>`:''}
    </tr>`;
  }).join('')).join('');

  document.getElementById('content').innerHTML=`<div class="ci">
    <div style="font-size:14px;font-weight:700;margin-bottom:14px;">전체 학생 <span style="color:var(--muted);font-weight:400;font-size:12px;">(${total}건)</span></div>
    <div class="ov-filter-bar">
      <div class="ov-filter-group">
        <button class="ov-btn${OV.gradeF==='all'?' on':''}" onclick="setOvFilter('grade','all')">전체</button>
        ${gradeGroups.map(g=>`<button class="ov-btn${OV.gradeF===g?' on':''}" onclick="setOvFilter('grade','${g}')">${g==='초'?'초등':g==='중'?'중학':g==='고'?'고등':g}</button>`).join('')}
      </div>
      <div class="ov-filter-group">
        <button class="ov-btn${OV.subjF==='all'?' on':''}" onclick="setOvFilter('subj','all')">전체</button>
        ${allSubjs.map(s=>`<button class="ov-btn${OV.subjF===s?' on':''}" onclick="setOvFilter('subj','${s}')">${s}</button>`).join('')}
      </div>
    </div>
    ${rows.length===0?`<div class="ov-empty">📭 학생이 없어요<br><span style="font-size:11px;color:#94a3b8;display:block;margin-top:8px;">학생을 추가하거나 필터를 변경해보세요</span></div>`:`
    <table class="ov-table"><thead><tr>
      <th onclick="setOvSort('grade')">학년 ${si('grade')}</th>
      <th onclick="setOvSort('name')">이름 ${si('name')}</th>
      <th>학교</th><th>선생님</th><th>과목</th>
      <th>🏫 학원 평균</th>
      <th class="th-school">📚 학교 평균</th>
      <th>비교</th><th>등급</th><th></th>
    </tr></thead><tbody>${tableRows}</tbody></table>`}
  </div>`;
}
function setOvFilter(type,val){if(type==='grade')OV.gradeF=val;else OV.subjF=val;renderOverview();}
function setOvSort(k){if(OV.sort.key===k)OV.sort.dir*=-1;else{OV.sort.key=k;OV.sort.dir=1;}renderOverview();}
function goToStudent(tid,sid,subj){S.sel={tid,sid,subj};S.tab='detail';S.examFilter='all';renderSidebar();renderMain();}

// INIT
renderSidebar();renderMain();
</script>
</body>
</html>
